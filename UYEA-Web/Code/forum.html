<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>悠野社区 | UYEA | 悠野导航</title>
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ── 顶栏：精简为仅汉堡菜单 ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end; /* 按钮靠右 */
            padding: 0 24px;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1.5px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-toggle {
            display: flex;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            flex-direction: column;
            gap: 5px;
        }
        .menu-toggle span {
            display: block;
            width: 24px;
            height: 3px;
            background: var(--text-primary);
            border-radius: 2px;
        }

        /* ── 侧边栏样式 ── */
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: var(--radius-md);
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
        }

        /* 基础高亮：黑底白字 + 内阴影 */
        .nav-item.active {
            background: #000000 !important;
            color: #FFFFFF !important;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1);
        }

        /* 箭头样式：在本页（非首页）默认不显示 */
        .arrow-icon {
            display: none; 
            font-size: 10px;
            margin-left: auto;
            opacity: 0.6;
        }

        /* 侧边栏底部按钮：黑白配色 */
        .sidebar-footer {
            padding: 20px 16px;
            border-top: 1px solid var(--border);
            margin-top: auto; 
        }
        .auth-buttons {
            display: flex;
            gap: 10px;
        }
        .auth-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 38px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .login-btn {
            background: #FFFFFF;
            border: 1.5px solid #000000;
            color: #000000;
        }
        .register-btn {
            background: #000000;
            border: 1.5px solid #000000;
            color: #FFFFFF;
        }

        /* 社区页列表样式保留 */
        .post-item {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 20px;
            text-decoration: none;
            display: block;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-group">
                <span class="logo-text">UYEA</span>
                <span class="logo-sub">悠野</span>
            </div>
        </div>
        
        <nav class="nav-menu">
            <a href="index.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span class="nav-text">全部导航</span>
                <span class="arrow-icon">▼</span> 
            </a>

            <a href="tools.html" class="nav-item">
                <span class="nav-icon">🛠️</span>
                <span class="nav-text">实用工具</span>
            </a>
            
            <a href="forum.html" class="nav-item active">
                <span class="nav-icon">💬</span>
                <span class="nav-text">悠野社区</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="auth-buttons">
                <div class="auth-btn login-btn">登录</div>
                <div class="auth-btn register-btn">注册</div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <button class="menu-toggle" id="hamburgerBtn">
                <span></span><span></span><span></span>
            </button>
        </header>

        <div class="content-wrapper">
            <div class="section-header">
                <h2 class="section-title">悠野社区</h2>
            </div>

            <div class="post-list">
                <a href="#" class="post-item">
                    <div style="font-weight:700; color:var(--text-primary); margin-bottom:8px;">欢迎来到社区</div>
                    <div style="font-size:14px; color:var(--text-secondary);">侧边栏已恢复直接跳转模式，箭头已在当前页隐藏。</div>
                </a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
