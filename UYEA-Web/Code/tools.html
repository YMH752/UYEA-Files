<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>实用工具箱 | UYEA | 悠野导航</title>
    <meta name="description" content="悠野工作室(UYEA)实用工具箱，汇聚开发、设计、办公、多媒体等各类在线工具。">
    <meta name="theme-color" content="#000000">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://raw.githubusercontent.com">
    <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Lilita+One&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Lilita+One&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"></noscript>

    <link rel="stylesheet" href="style.css">
    
    <style>
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 24px;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1.5px solid rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            flex-direction: column;
            gap: 5px;
        }
        .menu-toggle span {
            display: block;
            width: 24px;
            height: 3px;
            background: var(--text-primary);
            border-radius: 2px;
        }

        @media (max-width: 1024px) {
            .menu-toggle { display: flex; }
        }

        @media (max-width: 768px) {
            .top-bar { padding: 0 12px; }
        }

        .nav-menu {
            padding: 16px 12px;
        }
        .nav-group {
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            margin: 6px 12px;
            border-radius: var(--radius-md);
            text-decoration: none;
            color: #FFFFFF;
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        .nav-item.active {
            background: #FFDD50 !important;
            /* [修改] color: #FFFFFF → #11a0ff
               修改前：白色文字
               修改后：亮蓝色，当前页面激活项文字颜色 */
            color: #11a0ff !important;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.15) !important;
        }

        .nav-item.menu-open {
            background: var(--primary) !important;
            color: #FFFFFF !important;
            box-shadow: 0 4px 12px rgba(166, 58, 38, 0.2);
        }

        .arrow-icon {
            font-size: 10px;
            margin-left: auto;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.6;
        }
        .nav-item.menu-open .arrow-icon {
            transform: rotate(180deg);
            opacity: 1;
        }

        .nav-icon {
            color: #FFFFFF;
            font-size: 14px;
        }

        .sub-menu {
            display: none; 
            padding-bottom: 10px;
            animation: fadeInSub 0.2s ease-out;
        }
        @keyframes fadeInSub {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .sub-nav-item {
            display: block;
            padding: 10px 16px 10px 56px;
            font-size: 14px;
            font-weight: 800; 
            color: #FFFFFF;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .sub-nav-item:hover {
            color: var(--primary);
            background: rgba(0,0,0,0.03);
        }

        .sidebar-footer {
            padding: 24px 16px;
            border-top: 1px solid rgba(255,255,255,0.12);
            margin-top: auto; 
        }
        .auth-buttons {
            display: flex;
            gap: 12px;
        }
        .auth-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 42px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* [修改] 统一登录注册按钮样式
           修改前：.login-btn 和 .register-btn 分别定义，样式完全相同，导致按钮可能尺寸不一致
           修改后：使用单一选择器 .login-btn, .register-btn 合并定义，确保完全等宽等高
           修改目的：PC端与手机端两按钮显示尺寸一致 */
        .login-btn,
        .register-btn {
            background: #FFDD50;
            border: 1.5px solid rgba(255,255,255,0.15);
            color: #0088FF;
            font-family: 'Lilita One', Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            font-weight: 700;
            letter-spacing: 1.5px;
        }

        .login-btn span, .register-btn span {
            display: inline-block;
            transform: scaleX(1.15);
            font-size: 18px;
            letter-spacing: 0.5px;
            /* [修改] 按钮文字效果改为蓝色标题风格并解决粘连
               修改前：蓝色多层阴影扩散光晕，13px继承字体
               修改后：18px，亮蓝(#11a0ff) + 1.5px深蓝描边 + 单层阴影，拉开字距
               修改目的：在按钮内清晰显示立体文字，不超出范围 */
            color: #11a0ff;
            -webkit-text-stroke: 1.5px #003D7A;
            text-shadow:
                2px 2px 0 rgba(0,0,0,0.25);
        }

        .tool-search-bar {
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 1.5px solid rgba(0,0,0,0.08);
            border-radius: var(--radius-md);
            height: 48px;
            gap: 12px;
            margin-bottom: 24px;
        }
        .tool-search-input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            font-size: 15px;
            color: var(--text-primary);
        }
        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .tab-item {
            padding: 8px 20px;
            background: var(--surface);
            border: 1.5px solid rgba(0,0,0,0.08);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .tab-item.active {
            background: #000000;
            color: #FFFFFF;
            border-color: transparent;
        }
        .tool-group-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            padding-left: 4px;
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-group">
                <span class="logo-text">UYEA</span>
                <span class="logo-sub">悠野</span>
            </div>
        </div>
        
        <nav class="nav-menu">
            <a href="index.html" class="nav-item">
                <span class="nav-icon">●</span>
                <!-- [修改] “全部导航” → “网站导航” -->
                <span class="nav-text">网站导航</span>
            </a>

            <div class="nav-group">
                <div class="nav-item active nav-dropdown-trigger" id="toolsNavTrigger">
                    <span class="nav-icon">●</span>
                    <!-- [修改] “实用工具” → “线上工具” -->
                    <span class="nav-text">线上工具</span>
                    <span class="arrow-icon">▼</span>
                </div>
                <div class="sub-menu" id="toolsSubMenu">
                    <a href="#dev-tools" class="sub-nav-item">开发者工具</a>
                    <a href="#design-tools" class="sub-nav-item">设计美化</a>
                    <a href="#office-tools" class="sub-nav-item">办公效率</a>
                    <a href="#media-tools" class="sub-nav-item">多媒体处理</a>
                </div>
            </div>
            
            <a href="forum.html" class="nav-item">
                <span class="nav-icon">●</span>
                <span class="nav-text">悠野社区</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="theme-toggle-wrapper">
                <div class="theme-toggle" role="button" tabindex="0" aria-label="切换主题">
                    <div class="theme-slider"></div>
                    <span class="theme-option light">☀️</span>
                    <span class="theme-option dark">🌙</span>
                </div>
            </div>
            <div class="auth-buttons">
                <div class="auth-btn login-btn" onclick="alert('登录功能开发中...')"><span>登录</span></div>
                <div class="auth-btn register-btn" onclick="alert('注册功能开发中...')"><span>注册</span></div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <button class="menu-toggle" id="hamburgerBtn">
                <span></span><span></span><span></span>
            </button>
        </header>

        <div class="content-wrapper">
            <div class="section-header">
                <h2 class="section-title">实用工具箱</h2>
            </div>

            <div class="tool-search-bar">
                <span style="font-size: 18px;">🔍</span>
                <input type="text" class="tool-search-input" id="toolSearchInput" placeholder="搜索在线工具...">
            </div>

            <div class="category-tabs" id="categoryTabs">
                <div class="tab-item active" data-category="all">全部</div>
                <div class="tab-item" data-category="dev">开发者工具</div>
                <div class="tab-item" data-category="design">设计美化</div>
                <div class="tab-item" data-category="office">办公效率</div>
                <div class="tab-item" data-category="media">多媒体处理</div>
            </div>

            <div id="toolsContainer">
                <div class="tool-group" data-category="dev" id="dev-tools">
                    <div class="tool-group-title"><span>💻</span> 开发者工具</div>
                    <div class="grid-container">
                        <a href="#" class="card-item"><div class="card-info"><div class="card-title">JSON 格式化</div></div></a>
                        <a href="#" class="card-item"><div class="card-info"><div class="card-title">Base64 编解码</div></div></a>
                        <a href="#" class="card-item"><div class="card-info"><div class="card-title">正则表达式测试</div></div></a>
                        <a href="#" class="card-item"><div class="card-info"><div class="card-title">时间戳转换</div></div></a>
                    </div>
                </div>

                <div class="tool-group" data-category="design" id="design-tools" style="margin-top: 40px;">
                    <div class="tool-group-title"><span>🎨</span> 设计美化</div>
                    <div class="grid-container">
                        <a href="#" class="card-item"><div class="card-info"><div class="card-title">在线调色板</div></div></a>
                        <a href="#" class="card-item"><div class="card-info"><div class="card-title">SVG 图标库</div></div></a>
                        <a href="#" class="card-item"><div class="card-info"><div class="card-title">渐变颜色生成</div></div></a>
                    </div>
                </div>

                <div class="tool-group" data-category="office" id="office-tools" style="margin-top: 40px;">
                    <div class="tool-group-title"><span>📂</span> 办公效率</div>
                    <div class="grid-container">
                        <a href="#" class="card-item"><div class="card-info"><div class="card-title">PDF 转 Word</div></div></a>
                        <a href="#" class="card-item"><div class="card-info"><div class="card-title">流程图绘制</div></div></a>
                    </div>
                </div>

                <div class="tool-group" data-category="media" id="media-tools" style="margin-top: 40px;">
                    <div class="tool-group-title"><span>🎥</span> 多媒体处理</div>
                    <div class="grid-container">
                        <a href="#" class="card-item"><div class="card-info"><div class="card-title">图片压缩</div></div></a>
                        <a href="#" class="card-item"><div class="card-info"><div class="card-title">视频转 GIF</div></div></a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js" defer></script>
    <script>
        const toolsNavTrigger = document.getElementById('toolsNavTrigger');
        const toolsSubMenu = document.getElementById('toolsSubMenu');

        toolsNavTrigger.addEventListener('click', function() {
            const isOpening = this.classList.toggle('menu-open');
            toolsSubMenu.style.display = isOpening ? 'block' : 'none';
        });

        document.querySelectorAll('.sub-nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                const targetId = this.getAttribute('href').substring(1);
                const targetEl = document.getElementById(targetId);
                if (targetEl) {
                    e.preventDefault();
                    targetEl.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });

        const toolSearchInput = document.getElementById('toolSearchInput');
        const toolCards = document.querySelectorAll('.card-item');
        const toolGroups = document.querySelectorAll('.tool-group');

        toolSearchInput.addEventListener('input', function() {
            const keyword = this.value.toLowerCase().trim();
            toolCards.forEach(card => {
                const title = card.querySelector('.card-title').textContent.toLowerCase();
                card.style.display = title.includes(keyword) ? 'flex' : 'none';
            });
            toolGroups.forEach(group => {
                const hasVisible = Array.from(group.querySelectorAll('.card-item')).some(c => c.style.display !== 'none');
                group.style.display = hasVisible ? 'block' : 'none';
            });
        });

        const tabItems = document.querySelectorAll('.tab-item');
        tabItems.forEach(tab => {
            tab.addEventListener('click', function() {
                tabItems.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const cat = this.dataset.category;
                toolGroups.forEach(g => {
                    g.style.display = (cat === 'all' || g.dataset.category === cat) ? 'block' : 'none';
                });
            });
        });
    </script>
</body>
</html>
