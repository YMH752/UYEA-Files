<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>实用工具箱 | UYEA | 悠野导航</title>
    <!-- [新增] 补充 description meta，原来缺失 -->
    <meta name="description" content="悠野工作室(UYEA)实用工具箱，汇聚开发、设计、办公、多媒体等各类在线工具。">
    <meta name="theme-color" content="#000000">

    <!-- [修改] 补全 fonts.gstatic.com preconnect，新增 GitHub CDN dns-prefetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://raw.githubusercontent.com">
    <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin>
    <!-- [修改] 字体改为异步加载，消除渲染阻塞 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"></noscript>

    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ── 顶栏：保持你要求的工具页布局 ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 24px;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1.5px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-toggle {
            /* [修改] display:flex → display:none 默认隐藏
               修改前：display:flex始终显示，桌面端出现异常黑色按钮
               修改后：默认隐藏，≤1024px媒体查询中再显示
               目的：正确控制汉堡按钮仅在移动端出现 */
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            flex-direction: column;
            gap: 5px;
        }
        .menu-toggle span {
            display: block;
            width: 24px;
            height: 3px;
            background: var(--text-primary);
            border-radius: 2px;
        }

        @media (max-width: 1024px) {
            /* [新增] ≤1024px时才显示汉堡菜单，与index.html逻辑一致 */
            .menu-toggle { display: flex; }
            .top-bar { justify-content: flex-start; padding-left: 56px; }
        }

        @media (max-width: 768px) {
            /* [新增] 小屏padding对齐index.html */
            .top-bar { padding: 0 12px; justify-content: space-between; }
        }

        /* ── 侧边栏菜单：像素级对齐首页 ── */
        .nav-menu {
            padding: 16px 12px;
        }
        .nav-group {
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            display: flex;
            align-items: center;
            /* ✅ 对齐首页：高度与内边距 */
            padding: 14px 18px;
            /* ✅ 对齐首页：完全一致的间距 */
            margin: 6px 12px;
            border-radius: var(--radius-md);
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        /* 基础高亮：黑底白字 */
        .nav-item.active {
            background: #000000 !important;
            color: #FFFFFF !important;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1) !important;
        }

        /* 展开态：铁锈红 */
        .nav-item.menu-open {
            background: var(--primary) !important;
            color: #FFFFFF !important;
            box-shadow: 0 4px 12px rgba(166, 58, 38, 0.2);
        }

        .arrow-icon {
            font-size: 10px;
            margin-left: auto;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.6;
        }
        .nav-item.menu-open .arrow-icon {
            transform: rotate(180deg);
            opacity: 1;
        }

        /* ── 子菜单：优化过渡感 ── */
        .sub-menu {
            display: none; 
            padding-bottom: 10px;
            /* 增加一个极其微小的淡入 */
            animation: fadeInSub 0.2s ease-out;
        }
        @keyframes fadeInSub {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sub-nav-item {
            display: block;
            /* ✅ 对齐首页：子项缩进与间距 */
            padding: 10px 16px 10px 56px;
            font-size: 14px;
            /* ✅ 对齐首页：800 极粗体 */
            font-weight: 800; 
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .sub-nav-item:hover {
            color: var(--primary);
            background: rgba(0,0,0,0.03);
        }

        /* 底部按钮：完全对齐首页 */
        .sidebar-footer {
            padding: 24px 16px;
            border-top: 1px solid var(--border);
            margin-top: auto; 
        }
        .auth-buttons {
            display: flex;
            gap: 12px;
        }
        .auth-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 42px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .login-btn {
            background: #FFFFFF;
            border: 1.5px solid #000000;
            color: #000000;
        }
        .register-btn {
            background: #000000;
            border: 1.5px solid #000000;
            color: #FFFFFF;
        }

        /* ── 工具页内容区 ── */
        .tool-search-bar {
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0 16px;
            height: 48px;
            gap: 12px;
            margin-bottom: 24px;
        }
        .tool-search-input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            font-size: 15px;
            color: var(--text-primary);
        }
        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .tab-item {
            padding: 8px 20px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .tab-item.active {
            background: #000000;
            color: #FFFFFF;
            border-color: #000000;
        }
        .tool-group-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            padding-left: 4px;
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-group">
                <span class="logo-text">UYEA</span>
                <span class="logo-sub">悠野</span>
            </div>
        </div>
        
        <nav class="nav-menu">
            <a href="index.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span class="nav-text">全部导航</span>
            </a>

            <div class="nav-group">
                <div class="nav-item active nav-dropdown-trigger" id="toolsNavTrigger">
                    <span class="nav-icon">🛠️</span>
                    <span class="nav-text">实用工具</span>
                    <span class="arrow-icon">▼</span>
                </div>
                <div class="sub-menu" id="toolsSubMenu">
                    <a href="#dev-tools" class="sub-nav-item">开发者工具</a>
                    <a href="#design-tools" class="sub-nav-item">设计美化</a>
                    <a href="#office-tools" class="sub-nav-item">办公效率</a>
                    <a href="#media-tools" class="sub-nav-item">多媒体处理</a>
                </div>
            </div>
            
            <a href="forum.html" class="nav-item">
                <span class="nav-icon">💬</span>
                <span class="nav-text">悠野社区</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <!-- [新增] 深色模式切换按钮，位于登录注册上方 -->
            <button class="theme-toggle-btn" id="themeToggleBtn">
                <span id="themeToggleLabel">切换深色</span>
                <span class="theme-toggle-icon" id="themeToggleIcon">🌙</span>
            </button>
            <div class="auth-buttons">
                <div class="auth-btn login-btn" onclick="alert('登录功能开发中...')">登录</div>
                <div class="auth-btn register-btn" onclick="alert('注册功能开发中...')">注册</div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <button class="menu-toggle" id="hamburgerBtn">
                <span></span><span></span><span></span>
            </button>
        </header>

        <div class="content-wrapper">
            <div class="section-header">
                <h2 class="section-title">实用工具箱</h2>
            </div>

            <div class="tool-search-bar">
                <span style="font-size: 18px;">🔍</span>
                <input type="text" class="tool-search-input" id="toolSearchInput" placeholder="搜索在线工具...">

            <div class="category-tabs" id="categoryTabs">
                <div class="tab-item active" data-category="all">全部</div>
                <div class="tab-item" data-category="dev">开发者工具</div>
                <div class="tab-item" data-category="design">设计美化</div>
                <div class="tab-item" data-category="office">办公效率</div>

            </div>

            <div id="toolsContainer">
                <div class="tool-group" data-category="dev" id="dev-tools">
                    <div class="tool-group-title"><span>💻</span> 开发者工具</div>
                    <div class="grid-container">
                        <a href="#" class="card-item"><div class="card-info"><div class="card-title">JSON 格式化</div></div></a>
                        <a href="#" class="card-item"><div class="card-info"><div class="card-title">Base64 编解码</div></div></a>
                        <a href="#" class="card-item"><div class="card-info"><div class="card-title">正则表达式测试</div></div></a>
                        <a href="#" class="card-item"><div class="card-info"><div class="card-title">时间戳转换</div></div></a>
                    </div>

                <div class="tool-group" data-category="design" id="design-tools" style="margin-top: 40px;">
                    <div class="tool-group-title"><span>🎨</span> 设计美化</div>
                    <div class="grid-container">
                        <a href="#" class="card-item"><div class="card-info"><div class="card-title">在线调色板</div></div></a>
                        <a href="#" class="card-item"><div class="card-info"><div class="card-title">SVG 图标库</div></div></a>

                    </div>

                <div class="tool-group" data-category="office" id="office-tools" style="margin-top: 40px;">
                    <div class="tool-group-title"><span>📂</span> 办公效率</div>
                    <div class="grid-container">
                        <a href="#" class="card-item"><div class="card-info"><div class="card-title">PDF 转 Word</div></div></a>

                <div class="tool-group" data-category="media" id="media-tools" style="margin-top: 40px;">

            </div>
        </div>
    </main>

    <!-- [修改] 加 defer，消除script阻塞HTML解析 -->
    <script src="script.js" defer></script>
    <script>
        // --- 核心交互逻辑修正 ---
        const toolsNavTrigger = document.getElementById('toolsNavTrigger');
        const toolsSubMenu = document.getElementById('toolsSubMenu');

        toolsNavTrigger.addEventListener('click', function() {
            // 切换 menu-open 状态（触发旋转箭头和颜色变化）
            const isOpening = this.classList.toggle('menu-open');
            
            // 使用 display 切换，配合 CSS 里的 fadeInSub 动画
            toolsSubMenu.style.display = isOpening ? 'block' : 'none';
        });

        // 锚点平滑滚动对齐首页体验
        document.querySelectorAll('.sub-nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                const targetId = this.getAttribute('href').substring(1);
                const targetEl = document.getElementById(targetId);
                if (targetEl) {
                    e.preventDefault();
                    targetEl.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });

        // --- 保持原有的工具页搜索/分类功能 ---
        const toolSearchInput = document.getElementById('toolSearchInput');
        const toolCards = document.querySelectorAll('.card-item');
        const toolGroups = document.querySelectorAll('.tool-group');

        toolSearchInput.addEventListener('input', function() {
            const keyword = this.value.toLowerCase().trim();
            toolCards.forEach(card => {
                const title = card.querySelector('.card-title').textContent.toLowerCase();
                card.style.display = title.includes(keyword) ? 'flex' : 'none';
            });
            toolGroups.forEach(group => {
                const hasVisible = Array.from(group.querySelectorAll('.card-item')).some(c => c.style.display !== 'none');
                group.style.display = hasVisible ? 'block' : 'none';
            });
        });

        const tabItems = document.querySelectorAll('.tab-item');
        tabItems.forEach(tab => {
            tab.addEventListener('click', function() {
                tabItems.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const cat = this.dataset.category;
                toolGroups.forEach(g => {
                    g.style.display = (cat === 'all' || g.dataset.category === cat) ? 'block' : 'none';
                });
            });
        });
    </script>
</body>
</html>
