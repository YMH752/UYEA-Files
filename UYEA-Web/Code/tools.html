<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>实用工具 | UYEA 悠野导航</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ── 侧边栏美化同步逻辑 ── */
        .nav-item {
            display: flex;
            align-items: center;
            /* ✅ 同步首页：加大内边距 */
            padding: 14px 18px;
            /* ✅ 同步首页：加大间距，解决空洞感 */
            margin: 6px 12px;
            border-radius: var(--radius-md);
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        /* 基础高亮：黑底白字内阴影 */
        .nav-item.active {
            background: #000000 !important;
            color: #FFFFFF !important;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1);
        }

        /* 展开态：铁锈红 */
        .nav-item.menu-open {
            background: var(--primary) !important;
            color: #FFFFFF !important;
        }

        .arrow-icon {
            font-size: 10px;
            transition: transform 0.3s ease;
            margin-left: auto;
            opacity: 0.6;
        }
        .nav-item.menu-open .arrow-icon { transform: rotate(180deg); opacity: 1; }

        .sub-menu {
            display: none; 
            padding-bottom: 10px;
        }

        .sub-nav-item {
            display: block;
            /* ✅ 同步首页：加大纵向间距 */
            padding: 10px 16px 10px 56px;
            font-size: 14px;
            /* ✅ 同步首页：800 极粗体副标题感 */
            font-weight: 800;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
        }
        .sub-nav-item:hover {
            color: var(--primary);
            background: rgba(0,0,0,0.03);
        }

        /* ── 底部按钮同步 ── */
        .sidebar-footer {
            padding: 24px 16px;
            border-top: 1px solid var(--border);
            margin-top: auto; 
        }

        .auth-buttons {
            display: flex;
            gap: 12px;
        }

        .auth-btn {
            flex: 1;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-btn {
            background: #FFFFFF;
            border: 1.5px solid #000000;
            color: #000000;
        }
        .register-btn {
            background: #000000;
            border: 1.5px solid #000000;
            color: #FFFFFF;
        }

        /* 工具页特有样式保持 */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-group">
                <span class="logo-text">UYEA</span>
                <span class="logo-sub">悠野</span>
            </div>
        </div>
        
        <nav class="nav-menu">
            <a href="index.html" class="nav-item">
                <span class="nav-icon">🏠</span><span class="nav-text">首页导航</span>
            </a>

            <div class="nav-group">
                <div class="nav-item active nav-dropdown-trigger" id="toolsTrigger">
                    <span class="nav-icon">🛠️</span>
                    <span class="nav-text">实用工具</span>
                    <span class="arrow-icon">▼</span>
                </div>
                <div class="sub-menu" id="toolsSubMenu" style="display: block;">
                    <a href="#media-tools" class="sub-nav-item">媒体处理</a>
                    <a href="#dev-tools" class="sub-nav-item">开发者工具</a>
                    <a href="#office-tools" class="sub-nav-item">办公效率</a>
                </div>
            </div>
            
            <a href="forum.html" class="nav-item">
                <span class="nav-icon">💬</span><span class="nav-text">悠野社区</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="auth-buttons">
                <div class="auth-btn login-btn" onclick="alert('登录跳转...')">登录</div>
                <div class="auth-btn register-btn" onclick="alert('注册跳转...')">注册</div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="section-header" style="margin: 0;"><h2 class="section-title">实用工具箱</h2></div>
            <div class="header-actions">
                <button class="menu-toggle" id="hamburgerBtn"><span></span><span></span><span></span></button>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="section-group" id="media-tools">
                <div class="section-header"><h3 class="section-title">媒体处理</h3></div>
                <div class="tool-grid">
                    <div class="card-item">
                        <div class="card-info">
                            <div class="card-title">图片压缩</div>
                            <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">在线无损压缩图片大小</div>
                        </div>
                    </div>
                    </div>
            </div>

            <div class="section-group" id="dev-tools" style="margin-top: 40px;">
                <div class="section-header"><h3 class="section-title">开发者工具</h3></div>
                <div class="tool-grid">
                    <div class="card-item">
                        <div class="card-info">
                            <div class="card-title">JSON 格式化</div>
                            <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">快速美化、校验 JSON 代码</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // 下拉逻辑
        const toolsTrigger = document.getElementById('toolsTrigger');
        const toolsSubMenu = document.getElementById('toolsSubMenu');

        toolsTrigger.addEventListener('click', function() {
            const isOpening = !this.classList.contains('menu-open');
            this.classList.toggle('menu-open', isOpening);
            toolsSubMenu.style.display = isOpening ? 'block' : 'none';
        });

        // 锚点平滑滚动
        document.querySelectorAll('.sub-nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                const targetId = this.getAttribute('href').substring(1);
                const targetEl = document.getElementById(targetId);
                if (targetEl) {
                    e.preventDefault();
                    targetEl.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    </script>
</body>
</html>
