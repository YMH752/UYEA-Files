<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UYEA | 悠野导航</title>
    
    <meta name="description" content="悠野工作室(UYEA)提供AI智能体导航、在线工具箱和技术社区。">
    <meta property="og:title" content="UYEA | 悠野工作室">
    <meta name="theme-color" content="#0078d4">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ── 首页顶栏布局逻辑 ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 0 24px;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1.5px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* 左侧 LOGO */
        .header-logo {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 24px;
            color: var(--primary);
            text-decoration: none;
            flex-shrink: 0; /* 防止LOGO被挤压 */
        }

        /* 中间搜索框容器 - 负责自适应和居中 */
        .search-container {
            flex: 1;
            display: flex;
            justify-content: center;
            max-width: 600px; /* 限制最大宽度，避免PC端过长 */
        }

        .header-search-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0 12px;
            height: 40px;
            transition: all var(--duration);
        }

        .header-search-wrapper:focus-within {
            border-color: var(--primary);
            background: var(--surface);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        #searchInput {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            padding: 0 8px;
            font-size: 14px;
            color: var(--text-primary);
        }

        /* 右侧按钮组 */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .login-btn {
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: opacity var(--duration);
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        /* 加粗的汉堡菜单图标 */
        .menu-toggle {
            display: none; /* 默认PC端隐藏 */
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            flex-direction: column;
            gap: 5px; /* 三条线的间距 */
        }

        .menu-toggle span {
            display: block;
            width: 24px;
            height: 3px; /* 线条加粗 */
            background: var(--text-primary);
            border-radius: 2px;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex; /* 移动端显示 */
            }
            .header-logo {
                font-size: 20px;
            }
            .login-btn {
                padding: 6px 12px;
                font-size: 13px;
            }
            .search-container {
                max-width: none; /* 移动端占满剩余空间 */
            }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-group">
                <span class="logo-text">UYEA</span>
                <span class="logo-sub">悠野工作室</span>
            </div>
        </div>
        
        <nav class="nav-menu">
            <div class="nav-item active" data-section="all">
                <span class="nav-icon">🏠</span>
                <span class="nav-text">全部导航</span>
            </div>
            <a href="tools.html" class="nav-item">
                <span class="nav-icon">🛠️</span>
                <span class="nav-text">实用工具</span>
            </a>
            <a href="forum.html" class="nav-item">
                <span class="nav-icon">💬</span>
                <span class="nav-text">悠野社区</span>
            </a>
            <div class="nav-separator">分类</div>
            <div class="nav-item" data-section="ai">
                <span class="nav-icon">🤖</span>
                <span class="nav-text">人工智能</span>
            </div>
            <div class="nav-item" data-section="dev">
                <span class="nav-icon">💻</span>
                <span class="nav-text">开发工具</span>
            </div>
            <div class="nav-item" data-section="design">
                <span class="nav-icon">🎨</span>
                <span class="nav-text">设计资源</span>
            </div>
            <div class="nav-item" data-section="social">
                <span class="nav-icon">📱</span>
                <span class="nav-text">社交媒体</span>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <a href="#" class="header-logo">UYEA</a>

            <div class="search-container">
                <div class="header-search-wrapper">
                    <select id="searchEngine" class="sr-only">
                        <option value="baidu">百度</option>
                    </select>
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="搜索你需要的资源..." autocomplete="off">
                </div>
            </div>

            <div class="header-actions">
                <a href="#" class="login-btn">登录 / 注册</a>
                <button class="menu-toggle" id="hamburgerBtn" aria-label="切换菜单">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="section-header">
                <h2 class="section-title">智能体导航</h2>
                <p class="section-desc">汇聚全球最顶尖的 AI 智能工具</p>
            </div>

            <div class="grid-container" id="cardGrid">
                <a href="https://www.deepseek.com/" target="_blank" class="card-item" data-category="ai">
                    <div class="card-icon">
                        <img src="https://www.deepseek.com/favicon.ico" alt="DeepSeek">
                    </div>
                    <div class="card-info">
                        <div class="card-title">DeepSeek</div>
                        <div class="card-desc">国产之光，极简高效的 AI 对话助手</div>
                    </div>
                </a>
                
                </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
    /* ── 首页专属交互逻辑 ── */
    
    /* ✅ 图片加载失败处理 */
    document.querySelectorAll('.card-icon img').forEach(img => {
        img.addEventListener('error', function() {
            this.style.display = 'none';
            const fallback = document.createElement('span');
            fallback.className = 'icon-fallback';
            fallback.textContent = '🔗';
            this.parentElement.appendChild(fallback);
        });
    });
    </script>
</body>
</html>
