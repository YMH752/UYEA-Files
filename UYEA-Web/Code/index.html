<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UYEA | 悠野导航</title>
    
    <meta name="description" content="悠野工作室(UYEA)提供AI智能体导航、在线工具箱和技术社区。">
    <meta name="theme-color" content="#0078d4">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ── 首页专属布局与卡片微调 ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 0 24px;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1.5px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 24px;
            color: var(--primary);
            text-decoration: none;
        }

        .search-container {
            flex: 1;
            display: flex;
            justify-content: center;
            max-width: 600px;
        }

        .header-search-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0 12px;
            height: 40px;
        }

        #searchInput {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            padding: 0 8px;
            font-size: 14px;
        }

        .header-actions { display: flex; align-items: center; gap: 12px; }

        .login-btn {
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        /* 汉堡菜单加粗 */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            flex-direction: column;
            gap: 5px;
        }
        .menu-toggle span {
            display: block;
            width: 24px;
            height: 3px;
            background: var(--text-primary);
            border-radius: 2px;
        }

        /* 公告栏区域 */
        .notice-board {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }
        .notice-card {
            flex: 1;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px;
        }

        /* ✅ 文字卡片：用于“每日推荐”尽请期待 */
        .text-status-card {
            background: var(--surface);
            border: 1.5px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 16px;
            grid-column: 1 / -1; /* 横跨整行 */
        }

        /* ✅ 图标样式：圆角，无背景，无阴影 */
        .card-icon {
            width: 40px;
            height: 40px;
            background: transparent !important; /* 移除背景 */
            box-shadow: none !important; /* 移除阴影 */
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .card-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 8px; /* 图标圆角 */
        }

        @media (max-width: 768px) {
            .menu-toggle { display: flex; }
            .notice-board { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-group">
                <span class="logo-text">UYEA</span>
                <span class="logo-sub">悠野工作室</span>
            </div>
        </div>
        <nav class="nav-menu">
            <div class="nav-item active"><span class="nav-icon">🏠</span><span class="nav-text">全部导航</span></div>
            <a href="tools.html" class="nav-item"><span class="nav-icon">🛠️</span><span class="nav-text">实用工具</span></a>
            <a href="forum.html" class="nav-item"><span class="nav-icon">💬</span><span class="nav-text">悠野社区</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <a href="#" class="header-logo">UYEA</a>
            <div class="search-container">
                <div class="header-search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="搜索你需要的资源...">
                </div>
            </div>
            <div class="header-actions">
                <a href="#" class="login-btn">登录 / 注册</a>
                <button class="menu-toggle" id="hamburgerBtn">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </header>

        <div class="content-wrapper">
            
            <section class="notice-board">
                <div class="notice-card"><strong>官方动态：</strong> UYEA 2.0 运行中</div>
                <div class="notice-card"><strong>今日更新：</strong> 新增 AI 工具分类</div>
            </section>

            <div class="section-header"><h2 class="section-title">每日推荐</h2></div>
            <div class="grid-container" style="margin-bottom: 40px;">
                <div class="text-status-card">☕ 尽请期待</div>
            </div>

            <div class="section-header"><h2 class="section-title">Ai</h2></div>
            <div class="grid-container" style="margin-bottom: 40px;">
                <a href="https://www.deepseek.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://www.deepseek.com/favicon.ico"></div>
                    <div class="card-info"><div class="card-title">DeepSeek</div><div class="card-desc">强力国产大模型</div></div>
                </a>
                <a href="https://chatgpt.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://openai.com/favicon.ico"></div>
                    <div class="card-info"><div class="card-title">ChatGPT</div><div class="card-desc">OpenAI 旗下产品</div></div>
                </a>
                <a href="https://claude.ai/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://claude.ai/images/apple-touch-icon.png"></div>
                    <div class="card-info"><div class="card-title">Claude</div><div class="card-desc">Anthropic 智能助手</div></div>
                </a>
                <a href="https://yiyan.baidu.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://yiyan.baidu.com/favicon.ico"></div>
                    <div class="card-info"><div class="card-title">文心一言</div><div class="card-desc">百度 AI 对话</div></div>
                </a>
                <a href="https://qianwen.aliyun.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://img.alicdn.com/imgextra/i4/O1CN01S99m9x1Wp9Fh9O9m9_!!6000000002830-2-tps-32-32.png"></div>
                    <div class="card-info"><div class="card-title">通义千问</div><div class="card-desc">阿里大模型</div></div>
                </a>
            </div>

            <div class="section-header"><h2 class="section-title">生活</h2></div>
            <div class="grid-container" style="margin-bottom: 40px;">
                <a href="https://www.xiaohongshu.com" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://www.xiaohongshu.com/favicon.ico"></div>
                    <div class="card-info"><div class="card-title">小红书</div><div class="card-desc">标记我的生活</div></div>
                </a>
                <a href="https://www.bilibili.com" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://www.bilibili.com/favicon.ico"></div>
                    <div class="card-info"><div class="card-title">Bilibili</div><div class="card-desc">弹幕视频网</div></div>
                </a>
            </div>

            <div class="section-header"><h2 class="section-title">工具</h2></div>
            <div class="grid-container">
                <a href="https://github.com" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://github.com/favicon.ico"></div>
                    <div class="card-info"><div class="card-title">GitHub</div><div class="card-desc">开源代码托管</div></div>
                </a>
                <a href="https://tinypng.com" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://tinypng.com/images/apple-touch-icon.png"></div>
                    <div class="card-info"><div class="card-title">TinyPNG</div><div class="card-desc">在线图片压缩</div></div>
                </a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
