<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UYEA | 悠野导航</title>
    
    <meta name="description" content="悠野工作室(UYEA)提供AI智能体导航、在线工具箱和技术社区。">
    <meta name="theme-color" content="#000000">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ── 首页顶栏布局 ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 0 16px;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1.5px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 22px;
            color: var(--primary);
            text-decoration: none;
            flex-shrink: 0;
        }

        /* ── 搜索容器：自适应居中 ── */
        .search-container {
            flex: 1;
            display: flex;
            justify-content: center;
            min-width: 0; 
            margin: 0 8px;
        }

        .header-search-wrapper {
            width: 100%;
            max-width: 550px;
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            height: 38px;
            transition: border-color 0.2s;
            overflow: visible;
        }

        .header-search-wrapper:focus-within {
            border-color: var(--secondary);
        }

        .engine-dropdown-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        .engine-trigger-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0 8px 0 10px;
            height: 38px;
            background: var(--secondary);
            color: #FFFFFF;
            border: none;
            border-radius: var(--radius-md) 0 0 var(--radius-md);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            outline: none;
        }

        .engine-trigger-arrow {
            font-size: 10px;
            transition: transform 0.25s ease;
        }

        .engine-dropdown-wrapper.open .engine-trigger-arrow {
            transform: rotate(180deg);
        }

        .engine-divider {
            width: 1.5px;
            height: 18px;
            background: var(--border);
            flex-shrink: 0;
        }

        .engine-dropdown-list {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            min-width: 120px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            z-index: 200;
            overflow: hidden;
        }

        .engine-dropdown-wrapper.open .engine-dropdown-list {
            display: block;
        }

        .engine-option-item {
            padding: 10px 14px;
            font-size: 12px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .engine-option-item:hover {
            background: var(--bg);
        }

        .engine-option-item.selected {
            color: var(--primary);
            font-weight: 700;
        }

        #searchInput {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            padding: 0 10px;
            font-size: 13px;
            color: var(--text-primary);
        }

        /* ── 右侧操作区 ── */
        .header-actions { 
            display: flex; 
            align-items: center; 
            flex-shrink: 0;
        }

        /* 汉堡按钮样式 */
        .menu-toggle {
            display: flex;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            flex-direction: column;
            gap: 4px;
        }
        .menu-toggle span {
            display: block;
            width: 20px;
            height: 2px;
            background: var(--text-primary);
            border-radius: 1px;
        }

        /* ── 侧边栏布局调整 ── */
        .sidebar {
            display: flex;
            flex-direction: column;
        }
        .nav-menu {
            flex: 1;
        }
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }
        .sidebar-login-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 10px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        /* ── 响应式自适应 ── */
        @media (min-width: 769px) {
            .menu-toggle { display: none; } /* PC端隐藏汉堡菜单 */
            .header-logo { display: none; } /* PC端隐藏顶栏Logo（侧栏已有） */
        }

        @media (max-width: 768px) {
            .header-logo { display: block; }
            .search-container { margin: 0; max-width: 60%; }
            .engine-trigger-btn span:not(.engine-trigger-arrow) {
                font-size: 11px;
            }
        }

        @media (max-width: 480px) {
            .engine-trigger-btn span:not(.engine-trigger-arrow) {
                display: none; /* 极窄屏隐藏“站内搜索”文字 */
            }
            .engine-trigger-btn::after {
                content: '站内';
                font-size: 11px;
            }
        }

        /* 其它基础样式 */
        .card-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .card-icon img { width: 100%; height: 100%; object-fit: contain; border-radius: 6px; }
        .text-status-card { background: var(--surface); border: 1.5px dashed var(--border); border-radius: var(--radius-md); padding: 40px; text-align: center; color: var(--text-muted); grid-column: 1 / -1; }
    </style>
</head>

    <script src="script.js"></script>
    <script>
        const searchInput = document.getElementById('searchInput');
        const engineSelector = document.getElementById('searchEngineSelector');
        const engineWrapper = document.getElementById('engineDropdownWrapper');
        const engineTriggerBtn = document.getElementById('engineTriggerBtn');
        const engineTriggerLabel = document.getElementById('engineTriggerLabel');
        const engineOptionItems = document.querySelectorAll('.engine-option-item');
        const cardItems = document.querySelectorAll('.card-item');
        const sections = document.querySelectorAll('.section-group');

        const engineUrls = {
            baidu: "https://www.baidu.com/s?wd=",
            google: "https://www.google.com/search?q=",
            bing: "https://cn.bing.com/search?q="
        };

        engineTriggerBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            engineWrapper.classList.toggle('open');
        });

        engineOptionItems.forEach(item => {
            item.addEventListener('click', function(e) {
                e.stopPropagation();
                const val = this.getAttribute('data-value');
                engineSelector.value = val;
                engineTriggerLabel.textContent = this.textContent.trim();
                engineOptionItems.forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                engineWrapper.classList.remove('open');
                if (val === 'site') searchInput.dispatchEvent(new Event('input'));
            });
        });

        document.addEventListener('click', () => engineWrapper.classList.remove('open'));

        searchInput.addEventListener('input', function() {
            if (engineSelector.value === 'site') {
                const keyword = this.value.toLowerCase().trim();
                cardItems.forEach(card => {
                    const title = card.querySelector('.card-title').textContent.toLowerCase();
                    card.style.display = title.includes(keyword) ? 'flex' : 'none';
                });
                sections.forEach(section => {
                    const hasVisible = Array.from(section.querySelectorAll('.card-item')).some(c => c.style.display !== 'none');
                    section.style.display = hasVisible ? 'block' : 'none';
                });
            }
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const type = engineSelector.value;
                const kw = searchInput.value.trim();
                if (type !== 'site' && kw !== '') window.open(engineUrls[type] + encodeURIComponent(kw), '_blank');
            }
        });
    </script>
