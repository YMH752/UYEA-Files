<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UYEA | 悠野导航</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* 针对首页顶栏的精准布局修复 */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-container {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 0 20px;
        }

        .header-search-wrapper {
            width: 100%;
            max-width: 500px;
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 0 16px;
            height: 42px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* 移动端汉堡菜单显示逻辑 */
        @media (max-width: 1024px) {
            .search-container { display: none; } /* 移动端隐藏中间搜索框，防止挤压 */
            .menu-toggle { display: flex !important; }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-group">
                <span class="logo-text">UYEA</span>
                <span class="logo-sub">悠野</span>
            </div>
        </div>
        <nav class="nav-menu">
            <div class="nav-item active">
                <span class="nav-icon">🏠</span>
                <span class="nav-text">全部导航</span>
            </div>
            <a href="tools.html" class="nav-item">
                <span class="nav-icon">🛠️</span>
                <span class="nav-text">实用工具</span>
            </a>
            <a href="forum.html" class="nav-item">
                <span class="nav-icon">💬</span>
                <span class="nav-text">悠野社区</span>
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <button class="menu-toggle" id="hamburgerBtn" style="display:none;">
                <span></span><span></span><span></span>
            </button>

            <div class="search-container">
                <div class="header-search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="搜索资源..." style="border:none; background:transparent; outline:none; width:100%; margin-left:8px;">
                </div>
            </div>

            <div class="header-actions">
                <a href="#" class="login-btn">登录 / 注册</a>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="section-header">
                <h2 class="section-title">每日推荐</h2>
            </div>
            <div class="grid-container" style="margin-bottom: 40px;">
                <div style="grid-column: 1/-1; padding: 40px; text-align: center; border: 2px dashed var(--border); border-radius: var(--radius-md); color: var(--text-muted); background: var(--surface);">
                    ☕ 暂无推荐，尽请期待
                </div>
            </div>

            <div class="section-header">
                <h2 class="section-title">Ai</h2>
            </div>
            <div class="grid-container" style="margin-bottom: 40px;">
                <a href="https://www.deepseek.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="" data-domain="deepseek.com" data-site-name="DeepSeek"></div>
                    <div class="card-info"><div class="card-title">DeepSeek</div></div>
                </a>
                <a href="https://chatgpt.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="" data-domain="chatgpt.com" data-site-name="ChatGPT"></div>
                    <div class="card-info"><div class="card-title">ChatGPT</div></div>
                </a>
                <a href="https://claude.ai/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="" data-domain="claude.ai" data-site-name="Claude"></div>
                    <div class="card-info"><div class="card-title">Claude</div></div>
                </a>
                <a href="https://yiyan.baidu.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="" data-domain="yiyan.baidu.com" data-site-name="文心一言"></div>
                    <div class="card-info"><div class="card-title">文心一言</div></div>
                </a>
                <a href="https://www.qianwen.aliyun.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="" data-domain="qianwen.aliyun.com" data-site-name="通义千问"></div>
                    <div class="card-info"><div class="card-title">通义千问</div></div>
                </a>
                <a href="https://www.kimi.ai/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="" data-domain="kimi.ai" data-site-name="Kimi"></div>
                    <div class="card-info"><div class="card-title">Kimi</div></div>
                </a>
                <a href="https://hunyuan.tencent.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="" data-domain="hunyuan.tencent.com" data-site-name="腾讯混元"></div>
                    <div class="card-info"><div class="card-title">腾讯混元</div></a>
                </a>
            </div>

            <div class="section-header">
                <h2 class="section-title">生活</h2>
            </div>
            <div class="grid-container" style="margin-bottom: 40px;">
                <a href="https://www.xiaohongshu.com" target="_blank" class="card-item">
                    <div class="card-icon"><img src="" data-domain="xiaohongshu.com" data-site-name="小红书"></div>
                    <div class="card-info"><div class="card-title">小红书</div></div>
                </a>
                <a href="https://www.bilibili.com" target="_blank" class="card-item">
                    <div class="card-icon"><img src="" data-domain="bilibili.com" data-site-name="Bilibili"></div>
                    <div class="card-info"><div class="card-title">Bilibili</div></div>
                </a>
                <a href="https://www.zhihu.com" target="_blank" class="card-item">
                    <div class="card-icon"><img src="" data-domain="zhihu.com" data-site-name="知乎"></div>
                    <div class="card-info"><div class="card-title">知乎</div></div>
                </a>
                <a href="https://www.douban.com" target="_blank" class="card-item">
                    <div class="card-icon"><img src="" data-domain="douban.com" data-site-name="豆瓣"></div>
                    <div class="card-info"><div class="card-title">豆瓣</div></div>
                </a>
            </div>

            <div class="section-header">
                <h2 class="section-title">工具</h2>
            </div>
            <div class="grid-container">
                <a href="https://github.com" target="_blank" class="card-item">
                    <div class="card-icon"><img src="" data-domain="github.com" data-site-name="GitHub"></div>
                    <div class="card-info"><div class="card-title">GitHub</div></div>
                </a>
                <a href="https://tinypng.com" target="_blank" class="card-item">
                    <div class="card-icon"><img src="" data-domain="tinypng.com" data-site-name="TinyPNG"></div>
                    <div class="card-info"><div class="card-title">TinyPNG</div></div>
                </a>
                <a href="https://v0.dev" target="_blank" class="card-item">
                    <div class="card-icon"><img src="" data-domain="v0.dev" data-site-name="v0.dev"></div>
                    <div class="card-info"><div class="card-title">v0.dev</div></div>
                </a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
