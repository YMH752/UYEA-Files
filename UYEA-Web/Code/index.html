<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UYEA | 悠野导航</title>
    
    <meta name="description" content="悠野工作室(UYEA)提供AI智能体导航、在线工具箱和技术社区。">
    <meta name="theme-color" content="#000000">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ── 首页顶栏布局 ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            /* ✅ 修改点 1：gap 从 20px 增加到 40px。
               理由：在搜索框与右侧登录按钮之间建立更宽的物理间距，产生不刻意的“呼吸感”。 */
            gap: 40px;
            padding: 0 24px;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1.5px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 24px;
            color: var(--primary);
            text-decoration: none;
        }

        /* ── 搜索容器居中布局 ── */
        .search-container {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            /* ✅ 修改点 2：将 max-width 从 650px 限制为 450px。
               理由：缩短搜索框在宽屏下的总长度。配合 flex-grow 让其在大屏下更精致、更居中。 */
            max-width: 450px;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        /* ── 搜索框整体包裹层 ── */
        .header-search-wrapper {
            width: 95%;
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0 4px 0 0; 
            height: 42px;
            pointer-events: auto;
            transition: border-color 0.2s;
            overflow: visible; 
        }

        .header-search-wrapper:focus-within {
            border-color: var(--secondary); 
        }

        /* ── 下拉菜单容器 ── */
        .engine-dropdown-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        /* ── 触发按钮 ── */
        .engine-trigger-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px 0 12px;
            height: 42px;
            background: var(--secondary); 
            color: #FFFFFF;              
            border: none;
            border-radius: var(--radius-md) 0 0 var(--radius-md); 
            font-size: 13px;
            font-weight: 600;
            font-family: 'Noto Sans SC', sans-serif;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s;
            outline: none;
        }

        .engine-trigger-btn:hover {
            opacity: 0.85; 
        }

        .engine-trigger-arrow {
            font-size: 10px;
            line-height: 1;
            transition: transform 0.25s ease; 
            display: inline-block;
        }

        .engine-dropdown-wrapper.open .engine-trigger-arrow {
            transform: rotate(180deg);
        }

        .engine-divider {
            width: 1.5px;
            height: 22px;
            background: var(--border);
            flex-shrink: 0;
        }

        .engine-dropdown-list {
            display: none; 
            position: absolute;
            top: calc(100% + 6px); 
            left: 0;
            min-width: 130px; 
            background: var(--surface); 
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md); 
            z-index: 200; 
            overflow: hidden;
        }

        .engine-dropdown-wrapper.open .engine-dropdown-list {
            display: block;
        }

        .engine-option-item {
            display: flex;
            align-items: center;
            padding: 11px 14px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: background 0.15s;
            border-left: 3px solid transparent; 
            background: var(--surface);
        }

        .engine-option-item:hover {
            background: var(--bg); 
        }

        .engine-option-item.selected {
            background: var(--primary-light); 
            border-left-color: var(--primary); 
            color: var(--primary);             
            font-weight: 700;
        }

        .engine-option-item + .engine-option-item {
            border-top: 1px solid var(--border);
        }

        #searchInput {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            padding: 0 8px;
            font-size: 14px;
            color: var(--text-primary);
        }

        .header-actions { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin-left: auto;
        }

        .login-btn {
            padding: 8px 16px;
            background: var(--secondary); 
            color: white;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            flex-direction: column;
            gap: 5px;
        }
        .menu-toggle span {
            display: block;
            width: 24px;
            height: 3px;
            background: var(--text-primary);
            border-radius: 2px;
        }

        @media (min-width: 1025px) {
            .header-logo {
                display: none;
            }
        }

        .text-status-card {
            background: var(--surface);
            border: 1.5px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 16px;
            grid-column: 1 / -1;
        }

        .card-icon {
            width: 32px;
            height: 32px;
            background: transparent !important;
            box-shadow: none !important;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .card-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 6px;
        }

        .card-icon .icon-emoji {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            user-select: none;
        }

        @media (max-width: 768px) {
            .menu-toggle { display: flex; }
            .search-container {
                /* ✅ 移动端保持相对合理的比例，不显突兀 */
                max-width: 55%; 
            }
            .engine-trigger-btn {
                font-size: 12px;
                padding: 0 8px 0 10px;
            }
        }
    </style>
</head>

    <script src="script.js"></script>
    <script>
        const searchInput      = document.getElementById('searchInput');
        const engineSelector   = document.getElementById('searchEngineSelector'); 
        const engineWrapper    = document.getElementById('engineDropdownWrapper'); 
        const engineTriggerBtn = document.getElementById('engineTriggerBtn');      
        const engineTriggerLabel = document.getElementById('engineTriggerLabel'); 
        const engineOptionItems  = document.querySelectorAll('.engine-option-item'); 
        const cardItems        = document.querySelectorAll('.card-item');
        const sections         = document.querySelectorAll('.section-group');

        const engineUrls = {
            baidu:  "https://www.baidu.com/s?wd=",
            google: "https://www.google.com/search?q=",
            bing:   "https://cn.bing.com/search?q="
        };

        engineTriggerBtn.addEventListener('click', function(e) {
            e.stopPropagation(); 
            const isOpen = engineWrapper.classList.toggle('open');
            engineTriggerBtn.setAttribute('aria-expanded', isOpen);
        });

        engineOptionItems.forEach(function(item) {
            item.addEventListener('click', function(e) {
                e.stopPropagation(); 
                const selectedValue = this.getAttribute('data-value'); 
                const selectedText  = this.textContent.trim();         
                engineSelector.value = selectedValue;
                engineTriggerLabel.textContent = selectedText;
                engineOptionItems.forEach(function(opt) {
                    opt.classList.remove('selected');
                });
                this.classList.add('selected');
                engineWrapper.classList.remove('open');
                engineTriggerBtn.setAttribute('aria-expanded', 'false');

                if (selectedValue === 'site') {
                    searchInput.dispatchEvent(new Event('input'));
                } else {
                    cardItems.forEach(function(card) { card.style.display = 'flex'; });
                    sections.forEach(function(section) { section.style.display = 'block'; });
                }
            });
        });

        document.addEventListener('click', function() {
            if (engineWrapper.classList.contains('open')) {
                engineWrapper.classList.remove('open');
                engineTriggerBtn.setAttribute('aria-expanded', 'false');
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && engineWrapper.classList.contains('open')) {
                engineWrapper.classList.remove('open');
                engineTriggerBtn.setAttribute('aria-expanded', 'false');
            }
        });

        searchInput.addEventListener('input', function() {
            if (engineSelector.value === 'site') {
                const keyword = this.value.toLowerCase().trim();
                cardItems.forEach(function(card) {
                    const title = card.querySelector('.card-title').textContent.toLowerCase();
                    card.style.display = title.includes(keyword) ? 'flex' : 'none';
                });
                sections.forEach(function(section) {
                    const hasVisibleCards = Array.from(section.querySelectorAll('.card-item'))
                                                 .some(function(card) { return card.style.display !== 'none'; });
                    section.style.display = hasVisibleCards ? 'block' : 'none';
                });
            }
        });

        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const type    = engineSelector.value;
                const keyword = this.value.trim();
                if (type !== 'site' && keyword !== '') {
                    window.open(engineUrls[type] + encodeURIComponent(keyword), '_blank');
                }
            }
        });
    </script>
