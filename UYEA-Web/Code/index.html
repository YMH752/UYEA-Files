<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UYEA | 悠野导航</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .top-bar { display: flex; align-items: center; justify-content: space-between; gap: 20px; padding: 0 24px; height: var(--header-h); background: var(--surface); border-bottom: 1.5px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .header-logo { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 24px; color: var(--primary); text-decoration: none; }
        .search-container { flex: 1; display: flex; justify-content: center; max-width: 600px; }
        .header-search-wrapper { width: 100%; display: flex; align-items: center; background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-md); padding: 0 12px; height: 40px; }
        #searchInput { border: none; background: transparent; outline: none; width: 100%; padding: 0 8px; font-size: 14px; }
        .text-status-card { background: var(--surface); border: 1.5px dashed var(--border); border-radius: var(--radius-md); padding: 40px; text-align: center; color: var(--text-muted); font-size: 16px; grid-column: 1 / -1; }
        
        /* ✅ 强制圆角、无阴影、背景透明 */
        .card-icon { width: 32px; height: 32px; background: transparent !important; box-shadow: none !important; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; border-radius: 6px; }
        .card-icon img { width: 100%; height: 100%; object-fit: contain; border-radius: 6px; }
        
        /* 兜底文字图标 */
        .icon-text-fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--primary-light); color: var(--primary); font-size: 14px; font-weight: bold; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><span class="logo-text">UYEA</span></div>
        <nav class="nav-menu">
            <div class="nav-item active">🏠 全部导航</div>
            <a href="tools.html" class="nav-item">🛠️ 实用工具</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <a href="#" class="header-logo">UYEA</a>
            <div class="search-container">
                <div class="header-search-wrapper">🔍<input type="text" id="searchInput" placeholder="搜索资源..."></div>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="section-header"><h2 class="section-title">每日推荐</h2></div>
            <div class="grid-container" style="margin-bottom: 30px;"><div class="text-status-card">☕ 尽请期待</div></div>

            <div class="section-header"><h2 class="section-title">Ai</h2></div>
            <div class="grid-container" style="margin-bottom: 30px;">
                <a href="https://www.deepseek.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://api.uomg.com/api/get.favicon?url=https://www.deepseek.com" data-name="D"></div>
                    <div class="card-info"><div class="card-title">DeepSeek</div></div>
                </a>
                <a href="https://chatgpt.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://api.uomg.com/api/get.favicon?url=https://chatgpt.com" data-name="C"></div>
                    <div class="card-info"><div class="card-title">ChatGPT</div></div>
                </a>
                <a href="https://claude.ai/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://api.uomg.com/api/get.favicon?url=https://claude.ai" data-name="C"></div>
                    <div class="card-info"><div class="card-title">Claude</div></div>
                </a>
                <a href="https://yiyan.baidu.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://api.uomg.com/api/get.favicon?url=https://yiyan.baidu.com" data-name="文"></div>
                    <div class="card-info"><div class="card-title">文心一言</div></div>
                </a>
                <a href="https://qianwen.aliyun.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://api.uomg.com/api/get.favicon?url=https://qianwen.aliyun.com" data-name="通"></div>
                    <div class="card-info"><div class="card-title">通义千问</div></div>
                </a>
                <a href="https://www.kimi.ai/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://api.uomg.com/api/get.favicon?url=https://www.kimi.ai" data-name="K"></div>
                    <div class="card-info"><div class="card-title">Kimi</div></div>
                </a>
                <a href="https://www.doubao.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://api.uomg.com/api/get.favicon?url=https://www.doubao.com" data-name="豆"></div>
                    <div class="card-info"><div class="card-title">豆包</div></div>
                </a>
                <a href="https://yuanbao.tencent.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://api.uomg.com/api/get.favicon?url=https://yuanbao.tencent.com" data-name="元"></div>
                    <div class="card-info"><div class="card-title">腾讯元宝</div></div>
                </a>
                <a href="https://www.perplexity.ai/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://api.uomg.com/api/get.favicon?url=https://www.perplexity.ai" data-name="P"></div>
                    <div class="card-info"><div class="card-title">Perplexity</div></div>
                </a>
                <a href="https://grok.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://api.uomg.com/api/get.favicon?url=https://grok.com" data-name="G"></div>
                    <div class="card-info"><div class="card-title">Grok</div></div>
                </a>
            </div>

            <div class="section-header"><h2 class="section-title">生活</h2></div>
            <div class="grid-container" style="margin-bottom: 30px;">
                <a href="https://www.xiaohongshu.com" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://api.uomg.com/api/get.favicon?url=https://www.xiaohongshu.com" data-name="红"></div>
                    <div class="card-info"><div class="card-title">小红书</div></div>
                </a>
                <a href="https://www.bilibili.com" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://api.uomg.com/api/get.favicon?url=https://www.bilibili.com" data-name="B"></div>
                    <div class="card-info"><div class="card-title">Bilibili</div></div>
                </a>
            </div>

            <div class="section-header"><h2 class="section-title">工具</h2></div>
            <div class="grid-container">
                <a href="https://github.com" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://api.uomg.com/api/get.favicon?url=https://github.com" data-name="G"></div>
                    <div class="card-info"><div class="card-title">GitHub</div></div>
                </a>
            </div>
        </div>
    </main>

    <script>
        /* ✅ 核心逻辑：失败自动降级显示首字母 */
        document.querySelectorAll('.card-icon img').forEach(img => {
            img.onerror = function() {
                const name = this.getAttribute('data-name') || '?';
                const parent = this.parentElement;
                this.remove();
                const fallback = document.createElement('div');
                fallback.className = 'icon-text-fallback';
                fallback.textContent = name;
                parent.appendChild(fallback);
            };
        });
    </script>
</body>
</html>
