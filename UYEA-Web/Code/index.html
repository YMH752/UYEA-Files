<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UYEA | 悠野导航</title>
    
    <meta name="description" content="悠野工作室(UYEA)提供AI智能体导航、在线工具箱和技术社区。">
    <meta name="theme-color" content="#000000">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ── 顶栏布局 ── */
        .top-bar {
            display: flex; align-items: center; justify-content: center;
            padding: 0 20px; height: var(--header-h); background: var(--surface);
            border-bottom: 1.5px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        .header-logo { display: none; }
        .search-container { width: 100%; max-width: 600px; display: flex; justify-content: center; }
        .header-search-wrapper {
            width: 100%; display: flex; align-items: center; background: var(--bg);
            border: 1.5px solid var(--border); border-radius: var(--radius-md); padding: 0 4px 0 0;
            height: 42px; transition: border-color 0.2s; overflow: visible;
        }
        .header-search-wrapper:focus-within { border-color: var(--secondary); }

        /* ── 下拉引擎 ── */
        .engine-dropdown-wrapper { position: relative; flex-shrink: 0; }
        .engine-trigger-btn {
            display: flex; align-items: center; gap: 6px; padding: 0 12px; height: 42px;
            background: var(--secondary); color: #FFFFFF; border: none;
            border-radius: var(--radius-md) 0 0 var(--radius-md); font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .engine-dropdown-list {
            display: none; position: absolute; top: calc(100% + 6px); left: 0; min-width: 80px; width: 100%;
            background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-md);
            box-shadow: var(--shadow-md); z-index: 200; padding: 0; overflow: hidden;
        }
        .engine-dropdown-wrapper.open .engine-dropdown-list { display: block; }
        .engine-option-item { padding: 10px 12px; font-size: 13px; cursor: pointer; text-align: center; border-bottom: 1px solid var(--border); }
        .engine-option-item:last-child { border-bottom: none; }

        #searchInput { border: none; background: transparent; outline: none; width: 100%; padding: 0 12px; font-size: 15px; color: var(--text-primary); }

        /* ── 侧边栏菜单样式 ── */
        .nav-group { display: flex; flex-direction: column; }
        .nav-item {
            display: flex; align-items: center; padding: 12px 16px; margin-bottom: 4px;
            border-radius: var(--radius-md); text-decoration: none; color: var(--text-primary);
            font-weight: 600; transition: all 0.2s; cursor: pointer;
            border: none; /* ✅ 彻底去掉边框 */
        }

        /* ✅ 基础高亮：颜色同步侧边栏底色 + 阴影反馈 */
        .nav-item.active {
            background: var(--bg); /* 同步侧边栏底色 */
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05), inset -1px -1px 2px rgba(255,255,255,0.5); /* 淡淡的内阴影 */
        }

        /* ✅ 展开态高亮：保持醒目铁锈红 */
        .nav-item.menu-open {
            background: var(--primary) !important;
            color: #FFFFFF !important;
            box-shadow: 0 4px 12px rgba(166, 58, 38, 0.2); /* 展开时加个外发光阴影 */
        }

        .arrow-icon { font-size: 10px; transition: transform 0.3s ease; margin-left: auto; opacity: 0.6; }
        .nav-item.menu-open .arrow-icon { transform: rotate(180deg); opacity: 1; }

        .sub-menu { display: none; padding-bottom: 8px; }
        .sub-nav-item {
            display: block; padding: 8px 16px 8px 52px; font-size: 13px; font-weight: 400;
            color: var(--text-secondary); text-decoration: none; transition: all 0.2s;
        }
        .sub-nav-item:hover { color: var(--primary); background: rgba(0,0,0,0.03); }

        /* ── 底部按钮 ── */
        .sidebar-footer { padding: 20px 16px; border-top: 1px solid var(--border); margin-top: auto; }
        .auth-buttons { display: flex; gap: 10px; }
        .auth-btn { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px 5px; border-radius: var(--radius-md); font-size: 13px; font-weight: 600; cursor: pointer; }
        .login-btn { background: var(--surface); border: 1.5px solid var(--border); color: var(--text-primary); }
        .register-btn { background: var(--primary); color: #FFFFFF; }

        @media (max-width: 1024px) { .menu-toggle { display: flex; } .top-bar { justify-content: flex-start; padding-left: 50px; } }
        .card-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .card-icon img { width: 100%; height: 100%; object-fit: contain; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-group"><span class="logo-text">UYEA</span><span class="logo-sub">悠野</span></div>
        </div>
        <nav class="nav-menu">
            <div class="nav-group">
                <div class="nav-item active nav-dropdown-trigger" id="allNavTrigger">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">全部导航</span>
                    <span class="arrow-icon">▼</span>
                </div>
                <div class="sub-menu" id="subNavMenu">
                    <a href="#ai-section" class="sub-nav-item">Ai</a>
                    <a href="#life-section" class="sub-nav-item">生活</a>
                    <a href="#tool-section" class="sub-nav-item">工具</a>
                </div>
            </div>
            <a href="tools.html" class="nav-item"><span class="nav-icon">🛠️</span><span class="nav-text">实用工具</span></a>
            <a href="forum.html" class="nav-item"><span class="nav-icon">💬</span><span class="nav-text">悠野社区</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="auth-buttons">
                <div class="auth-btn login-btn" onclick="alert('登录功能开发中...')">登录</div>
                <div class="auth-btn register-btn" onclick="alert('注册功能开发中...')">注册</div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="search-container">
                <div class="header-search-wrapper">
                    <div class="engine-dropdown-wrapper" id="engineDropdownWrapper">
                        <input type="hidden" id="searchEngineSelector" value="site">
                        <button class="engine-trigger-btn" id="engineTriggerBtn" type="button">
                            <span id="engineTriggerLabel">站内</span><span style="font-size:8px; margin-left:4px;">▼</span>
                        </button>
                        <div class="engine-dropdown-list" id="engineDropdownList">
                            <div class="engine-option-item selected" data-value="site">站内</div>
                            <div class="engine-option-item" data-value="google">谷歌</div>
                            <div class="engine-option-item" data-value="bing">必应</div>
                            <div class="engine-option-item" data-value="baidu">百度</div>
                        </div>
                    </div>
                    <div style="width:1.5px; height:20px; background:var(--border); margin:0 4px;"></div>
                    <input type="text" id="searchInput" placeholder="搜索关键词...">
                </div>
            </div>
            <div class="header-actions">
                <button class="menu-toggle" id="hamburgerBtn"><span></span><span></span><span></span></button>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="section-group" id="ai-section">
                <div class="section-header"><h2 class="section-title">Ai</h2></div>
                <div class="grid-container" style="margin-bottom: 40px;">
                    <a href="https://www.deepseek.com/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="deepseek.com" data-site-name="DeepSeek"></div>
                        <div class="card-info"><div class="card-title">DeepSeek</div></div>
                    </a>
                    </div>
            </div>
            </div>
    </main>

    <script src="script.js"></script>
    <script>
        const allNavTrigger = document.getElementById('allNavTrigger');
        const subNavMenu    = document.getElementById('subNavMenu');

        allNavTrigger.addEventListener('click', function() {
            const isHomePage = window.location.pathname.endsWith('index.html') || window.location.pathname === '/' || window.location.pathname.endsWith('/');
            if (isHomePage) {
                const isOpening = !this.classList.contains('menu-open');
                this.classList.toggle('menu-open', isOpening);
                subNavMenu.style.display = isOpening ? 'block' : 'none';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                window.location.href = 'index.html';
            }
        });

        document.querySelectorAll('.sub-nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                const targetId = this.getAttribute('href').substring(1);
                const targetEl = document.getElementById(targetId);
                if (targetEl) {
                    targetEl.scrollIntoView({ behavior: 'smooth' });
                    if (window.innerWidth <= 1024) {
                        document.getElementById('sidebar').classList.remove('active');
                        document.getElementById('sidebarOverlay').classList.remove('active');
                    }
                }
            });
        });

        // 搜索逻辑保持不变
        const searchInput = document.getElementById('searchInput');
        const engineWrapper = document.getElementById('engineDropdownWrapper');
        const engineTriggerBtn = document.getElementById('engineTriggerBtn');
        const engineOptionItems = document.querySelectorAll('.engine-option-item');
        const engineTriggerLabel = document.getElementById('engineTriggerLabel');

        engineTriggerBtn.addEventListener('click', (e) => { e.stopPropagation(); engineWrapper.classList.toggle('open'); });
        engineOptionItems.forEach(item => {
            item.addEventListener('click', function(e) {
                e.stopPropagation();
                engineTriggerLabel.textContent = this.textContent.trim();
                engineOptionItems.forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                engineWrapper.classList.remove('open');
            });
        });
        document.addEventListener('click', () => engineWrapper.classList.remove('open'));

        function initIcons() {
            document.querySelectorAll('.card-icon img').forEach(img => {
                const domain = img.getAttribute('data-domain');
                if (domain && !img.src) {
                    img.src = `https://favicon.splitbee.io/?url=${domain}`;
                    img.onerror = () => { img.style.display='none'; }; 
                }
            });
        }
        window.addEventListener('DOMContentLoaded', initIcons);
    </script>
</body>
</html>
