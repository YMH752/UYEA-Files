<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UYEA | 悠野导航</title>
    
    <meta name="description" content="悠野工作室(UYEA)提供AI智能体导航、在线工具箱和技术社区。">
    <meta name="theme-color" content="#000000">
    
    <!-- [修改] 补全 fonts.gstatic.com preconnect（字体文件实际所在域）
         修改前：只预连接了 fonts.googleapis.com，字体文件域未预连接
         修改后：两个域均预连接，减少字体加载延迟 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- [新增] GitHub Raw CDN dns-prefetch + preconnect，加速图标加载 -->
    <link rel="dns-prefetch" href="https://raw.githubusercontent.com">
    <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin>
    <!-- [修改] 字体改为异步加载，消除渲染阻塞
         修改前：<link rel="stylesheet"> 同步加载，阻塞首屏渲染
         修改后：media="print" onload 技巧异步加载，noscript保底 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"></noscript>
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ── 顶栏布局 (保持原样) ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1.5px solid rgba(0,0,0,0.08); /* [修改] var(--border) → rgba(0,0,0,0.08)，极淡灰边框 */
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo { display: none; }

        .search-container {
            width: 100%;
            max-width: 600px; 
            display: flex;
            justify-content: center;
        }

        .header-search-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1.5px solid rgba(0,0,0,0.08); /* [修改] var(--border) → rgba(0,0,0,0.08)，极淡灰边框 */
            border-radius: var(--radius-md);
            padding: 0 4px 0 0;
            height: 42px; 
            transition: border-color 0.2s;
            overflow: visible;
        }

        .header-search-wrapper:focus-within { border-color: rgba(0,0,0,0.18); } /* [修改] var(--secondary) → rgba(0,0,0,0.18)，极淡灰略加深 */

        /* ── 下拉引擎样式 (保持原样) ── */
        .engine-dropdown-wrapper { position: relative; flex-shrink: 0; }
        
        /* [修改] 搜索引擎下拉按钮背景色改为 #440003
           修改前：background: var(--secondary) #000000
           修改后：background: #440003（图一按钮颜色）
           修改目的：按用户要求所有按钮统一使用图一提供的 #440003 */
        .engine-trigger-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 12px;
            height: 42px;
            background: #440003;
            color: #FFFFFF;
            border: none;
            border-radius: var(--radius-md) 0 0 var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .engine-dropdown-list {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            min-width: 80px; 
            width: 100%; 
            background: var(--surface);
            border: 1.5px solid rgba(0,0,0,0.08); /* [修改] var(--border) → rgba(0,0,0,0.08)，极淡灰边框 */
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            z-index: 200;
            padding: 0;
            overflow: hidden;
        }
        
        .engine-dropdown-wrapper.open .engine-dropdown-list { display: block; }
        .engine-option-item {
            padding: 10px 12px;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.08); /* [修改] var(--border) → rgba(0,0,0,0.08)，极淡灰边框 */
            transition: background 0.2s;
        }
        .engine-option-item:last-child { border-bottom: none; }
        .engine-option-item:hover { background: var(--bg); }
        .engine-option-item.selected { color: var(--primary); font-weight: 700; }

        #searchInput {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            padding: 0 12px;
            font-size: 15px;
            color: var(--text-primary);
        }

        .header-actions { 
            position: absolute;
            right: 20px;
            display: flex; 
            align-items: center; 
        }

        .menu-toggle {
            display: none; 
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            flex-direction: column;
            gap: 5px;
        }
        .menu-toggle span {
            display: block;
            width: 24px;
            height: 3px;
            background: var(--text-primary);
            border-radius: 2px;
        }

        /* ── 优化后的侧边栏菜单样式 ── */
        /* ── 侧边栏菜单：像素级对齐工具页 ── */
        .nav-menu {
            padding: 16px 12px;
        }

        .nav-group {
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            display: flex;
            align-items: center;
            /* ✅ 对齐工具页：高度与内边距 */
            padding: 14px 18px;
            /* ✅ 对齐工具页：完全一致的间距 */
            margin: 6px 12px;
            border-radius: var(--radius-md);
            text-decoration: none;
            /* [修改] color: var(--text-primary) → #FFFFFF
               修改前：使用全局主文字色
               修改后：纯白，配合侧边栏字体全部白色指令
               修改目的：统一侧边栏所有文字为白色 */
            color: #FFFFFF;
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        /* ✅ 微调：补偿下半部分的累计误差 */
        .nav-menu > a:nth-of-type(2) {
            transform: translateY(5px);
        }

        /* 基础高亮：黑底白字 */
        .nav-item.active {
            /* [修改] background: #C9A15E → #FFD700
               修改前：柔和暗金
               修改后：明亮金，在亮蓝背景上更鲜艳、对比强烈
               修改目的：蓝金经典搭配，提升视觉焦点 */
            background: #FFD700 !important;
            /* [修改] color: #37474F → #005BBB
               修改前：深钢蓝色
               修改后：与侧边栏背景一致的蓝色，形成反色效果
               修改目的：统一色调，增强和谐感 */
            color: #005BBB !important;
            /* [修改] box-shadow: inset 2px 2px 5px rgba(26,32,80,0.15) !important → inset 2px 2px 5px rgba(0,0,0,0.1) !important
               修改前：深色半透明内阴影
               修改后：更通透的黑色阴影，适配明亮金背景
               修改目的：增强立体感和清晰度 */
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.1) !important;
        }

        /* 展开态：铁锈红 */
        .nav-item.menu-open {
            background: var(--primary) !important;
            color: #FFFFFF !important;
            box-shadow: 0 4px 12px rgba(166, 58, 38, 0.2);
        }

        .arrow-icon {
            font-size: 10px;
            margin-left: auto;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.6;
        }
        .nav-item.menu-open .arrow-icon { 
            transform: rotate(180deg);
            opacity: 1;
        }

        .sub-menu {
            /* [修改] display:none/block → max-height+opacity 过渡
               修改前：display:none 优先级高于.open的max-height规则，列表永远不显示
               修改后：默认max-height:0+opacity:0，.open时展开，彻底消除display冲突 */
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            padding-bottom: 0;
            transition:
                max-height 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                padding-bottom 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .sub-menu.open {
            max-height: 200px;
            opacity: 1;
            padding-bottom: 10px;
        }

        .sub-nav-item {
            display: block;
            /* ✅ 对齐工具页：子项缩进与间距 */
            padding: 10px 16px 10px 56px;
            font-size: 14px;
            /* ✅ 对齐工具页：800 极粗体 */
            font-weight: 800; 
            /* [修改] color: var(--text-secondary) → #FFFFFF
               修改前：使用全局次要文字色
               修改后：纯白，配合侧边栏字体全部白色指令
               修改目的：统一侧边栏所有文字为白色 */
            color: #FFFFFF;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .sub-nav-item:hover {
            color: var(--primary);
            background: rgba(0,0,0,0.03);
        }

        /* 底部按钮：完全对齐工具页 */
        .sidebar-footer {
            padding: 24px 16px;
            /* [修改] border-top: 1px solid rgba(255,255,255,0.10) → 1px solid rgba(255,255,255,0.12)
               修改前：10%白色分割线
               修改后：12%白色分割线，略微增强分隔感
               修改目的：适应亮蓝背景，确保边界清晰 */
            border-top: 1px solid rgba(255,255,255,0.12);
            margin-top: auto;
            /* ✅ 微调：补偿下半部分的累计误差 */
            transform: translateY(5px);
        }
        .auth-buttons {
            display: flex;
            gap: 12px;
        }

        .auth-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 42px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* [修改] 底部按钮配色匹配 #005BBB 侧边栏 */
        .login-btn {
            /* [修改] background: #C9A15E → #FFD700
               修改前：柔和暗金
               修改后：明亮金，与激活项背景统一
               修改目的：蓝金经典搭配，保持视觉一致性 */
            background: #FFD700;
            /* [修改] border: 1.5px solid rgba(255,255,255,0.10) → 1.5px solid rgba(255,255,255,0.12)
               修改前：10%白色边框
               修改后：12%白色边框，与分割线统一
               修改目的：增强按钮边界感，适应亮蓝背景 */
            border: 1.5px solid rgba(255,255,255,0.12);
            /* [修改] color: #37474F → #005BBB
               修改前：深钢蓝色
               修改后：与侧边栏一致的蓝色，反色文字
               修改目的：确保文字清晰，色调统一 */
            color: #005BBB;
        }

        .register-btn {
            /* [修改] background: #C9A15E → #FFD700
               修改前：柔和暗金
               修改后：明亮金，与激活项背景统一
               修改目的：蓝金经典搭配，保持视觉一致性 */
            background: #FFD700;
            /* [修改] border: 1.5px solid rgba(255,255,255,0.10) → 1.5px solid rgba(255,255,255,0.12)
               修改前：10%白色边框
               修改后：12%白色边框，与分割线统一
               修改目的：增强按钮边界感，适应亮蓝背景 */
            border: 1.5px solid rgba(255,255,255,0.12);
            /* [修改] color: #37474F → #005BBB
               修改前：深钢蓝色
               修改后：与侧边栏一致的蓝色，反色文字
               修改目的：确保文字清晰，色调统一 */
            color: #005BBB;
        }

        @media (max-width: 1024px) {
            .menu-toggle { display: flex; }
            /* [修改] padding-left: 50px → 56px
               修改前：50px与汉堡按钮宽度未对齐，搜索栏左侧空间不足
               修改后：56px与汉堡按钮实际占位对齐，搜索栏不被遮挡 */
            .top-bar { justify-content: flex-start; padding-left: 56px; }
            .search-container { max-width: none; }
        }
        
        @media (max-width: 768px) {
            .top-bar { padding: 0 12px; justify-content: space-between; }
            /* [修改] margin-right: 40px → 52px
               修改前：40px预留量在小屏下不足，搜索栏与汉堡菜单按钮重叠
               修改后：52px确保任意屏幕宽度下搜索栏右侧与汉堡按钮不重叠 */
            .search-container { margin-right: 52px; }
        }

        .card-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .card-icon img { width: 100%; height: 100%; object-fit: contain; border-radius: 6px; }
    </style>
</head>

    <!-- [修改] 加 defer，消除script阻塞HTML解析
         修改前：同步加载，浏览器解析到此处暂停解析HTML
         修改后：defer后台下载，HTML解析完成后才执行 -->
    <script src="script.js" defer></script>
    <script>
        /* ── 严格保留原有脚本逻辑 ── */
        const allNavTrigger = document.getElementById('allNavTrigger');
        const subNavMenu    = document.getElementById('subNavMenu');

        allNavTrigger.addEventListener('click', function() {
            const isHomePage = window.location.pathname.endsWith('index.html') || window.location.pathname === '/' || window.location.pathname.endsWith('/');
            if (isHomePage) {
                const isOpening = !this.classList.contains('menu-open');
                this.classList.toggle('menu-open', isOpening);
                /* [修改] display切换 → .open class切换，配合CSS max-height+opacity过渡 */
                subNavMenu.classList.toggle('open', isOpening);
                /* [修改] this.classList.toggle('active', isOpening) → this.classList.add('active')
                   修改前：点击切换 active 类，可能导致高亮无故消失
                   修改后：始终保留 active 类，确保当前页导航项保持高亮 */
                this.classList.add('active');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                window.location.href = 'index.html';
            }
        });

        document.querySelectorAll('.sub-nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                const targetId = this.getAttribute('href').substring(1);
                const targetEl = document.getElementById(targetId);
                if (targetEl) {
                    targetEl.scrollIntoView({ behavior: 'smooth' });
                    if (window.innerWidth <= 1024) {
                        document.getElementById('sidebar').classList.remove('active');
                        document.getElementById('sidebarOverlay').classList.remove('active');
                    }
                }
            });
        });

        const searchInput      = document.getElementById('searchInput');
        const engineSelector   = document.getElementById('searchEngineSelector');
        const engineWrapper    = document.getElementById('engineDropdownWrapper');
        const engineTriggerBtn = document.getElementById('engineTriggerBtn');
        const engineTriggerLabel = document.getElementById('engineTriggerLabel');
        const engineOptionItems  = document.querySelectorAll('.engine-option-item');
        const cardItems        = document.querySelectorAll('.card-item');
        const sections         = document.querySelectorAll('.section-group');

        const engineUrls = {
            baidu:  "https://www.baidu.com/s?wd=",
            google: "https://www.google.com/search?q=",
            bing:   "https://cn.bing.com/search?q="
        };

        engineTriggerBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            engineWrapper.classList.toggle('open');
        });

        engineOptionItems.forEach(item => {
            item.addEventListener('click', function(e) {
                e.stopPropagation();
                engineSelector.value = this.dataset.value;
                engineTriggerLabel.textContent = this.textContent.trim();
                engineOptionItems.forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                engineWrapper.classList.remove('open');
                if (engineSelector.value === 'site') searchInput.dispatchEvent(new Event('input'));
            });
        });

        document.addEventListener('click', () => engineWrapper.classList.remove('open'));

        searchInput.addEventListener('input', function() {
            if (engineSelector.value === 'site') {
                const keyword = this.value.toLowerCase().trim();
                cardItems.forEach(card => {
                    const title = card.querySelector('.card-title').textContent.toLowerCase();
                    card.style.display = title.includes(keyword) ? 'flex' : 'none';
                });
                sections.forEach(section => {
                    const hasVisibleCards = Array.from(section.querySelectorAll('.card-item')).some(c => c.style.display !== 'none');
                    section.style.display = hasVisibleCards ? 'block' : 'none';
                });
            }
        });

        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const type = engineSelector.value;
                const keyword = this.value.trim();
                if (type !== 'site' && keyword !== '') {
                    window.open(engineUrls[type] + encodeURIComponent(keyword), '_blank');
                }
            }
        });

        // [修改] 移除 initIcons（favicon.splitbee.io）
        // 修改前：与script.js的initializeIconLoading并存，对同一img元素双重加载图标
        // 修改后：统一由script.js的initializeIconLoading处理，消除重复请求
    </script>
</body>
</html>
