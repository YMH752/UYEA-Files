<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UYEA | 悠野导航</title>
    
    <meta name="description" content="悠野工作室(UYEA)提供AI智能体导航、在线工具箱和技术社区。">
    <meta name="theme-color" content="#000000">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- 优化项 5/5：将字体加载策略从 display=swap 改为 display=block，以减少布局偏移 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=block" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-group">
                <span class="logo-text">UYEA</span>
                <span class="logo-sub">悠野</span>
            </div>
        </div>
        
        <nav class="nav-menu">
        <div class="nav-group">
        <div class="nav-item active nav-dropdown-trigger" id="allNavTrigger">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">全部导航</span>
            <span class="arrow-icon">▼</span>
        </div>
        <div class="sub-menu" id="subNavMenu">
            <a href="#ai-section" class="sub-nav-item">Ai</a>
            <a href="#life-section" class="sub-nav-item">生活</a>
            <a href="#tool-section" class="sub-nav-item">工具</a>
        </div>
        </div>
            <a href="tools.html" class="nav-item">
                <span class="nav-icon">🛠️</span>
                <span class="nav-text">实用工具</span>
            </a>
            <a href="forum.html" class="nav-item">
                <span class="nav-icon">💬</span>
                <span class="nav-text">悠野社区</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="auth-buttons">
                <div class="auth-btn login-btn" onclick="alert('登录功能开发中...')">登录</div>
                <div class="auth-btn register-btn" onclick="alert('注册功能开发中...')">注册</div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <a href="#" class="header-logo">UYEA</a>
            
            <div class="search-container">
                <div class="header-search-wrapper">
                    <div class="engine-dropdown-wrapper" id="engineDropdownWrapper">
                        <input type="hidden" id="searchEngineSelector" value="site">
                        <button class="engine-trigger-btn" id="engineTriggerBtn" type="button">
                            <span id="engineTriggerLabel">站内</span>
                            <span class="engine-trigger-arrow">▼</span>
                        </button>
                        <div class="engine-dropdown-list" id="engineDropdownList">
                            <div class="engine-option-item selected" data-value="site">站内</div>
                            <div class="engine-option-item" data-value="google">谷歌</div>
                            <div class="engine-option-item" data-value="bing">必应</div>
                            <div class="engine-option-item" data-value="baidu">百度</div>
                        </div>
                    </div>
                    <div style="width:1.5px; height:20px; background:var(--border); margin:0 4px;"></div>
                    <input type="text" id="searchInput" placeholder="搜索关键词...">
                </div>
            </div>

            <div class="header-actions">
                <button class="menu-toggle" id="hamburgerBtn">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="section-header"><h2 class="section-title">每日推荐</h2></div>
            <div class="grid-container" style="margin-bottom: 40px;">
                <div class="text-status-card" style="background: var(--surface); border: 1.5px dashed var(--border); border-radius: var(--radius-md); padding: 40px; text-align: center; color: var(--text-muted); grid-column: 1 / -1;">☕ 尽请期待</div>
            </div>

            <div class="section-group" id="ai-section">
                <div class="section-header"><h2 class="section-title">Ai</h2></div>
                <div class="grid-container" style="margin-bottom: 40px;">
                    <a href="https://www.gemini.google.com/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="gemini.google.com" data-site-name="Google Gemini"></div>
                        <div class="card-info"><div class="card-title">Google Gemini</div></div>
                    </a>
                    <a href="https://chatgpt.com/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="chatgpt.com" data-site-name="ChatGPT"></div>
                        <div class="card-info"><div class="card-title">ChatGPT</div></div>
                    </a>
                    <a href="https://claude.ai/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="claude.ai" data-site-name="Claude"></div>
                        <div class="card-info"><div class="card-title">Claude</div></div>
                    </a>
                    <a href="https://www.deepseek.com/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="deepseek.com" data-site-name="DeepSeek"></div>
                        <div class="card-info"><div class="card-title">DeepSeek</div></div>
                    </a>
                    <a href="https://yiyan.baidu.com/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="yiyan.baidu.com" data-site-name="文心一言"></div>
                        <div class="card-info"><div class="card-title">文心一言</div></div>
                    </a>
                    <a href="https://www.qianwen.aliyun.com/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="qianwen.aliyun.com" data-site-name="通义千问"></div>
                        <div class="card-info"><div class="card-title">通义千问</div></div>
                    </a>
                    <a href="https://www.kimi.ai/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="kimi.ai" data-site-name="Kimi"></div>
                        <div class="card-info"><div class="card-title">Kimi</div></div>
                    </a>
                    <a href="https://www.doubao.com/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="doubao.com" data-site-name="豆包"></div>
                        <div class="card-info"><div class="card-title">豆包</div></div>
                    </a>
                    <a href="https://yuanbao.tencent.com/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="yuanbao.tencent.com" data-site-name="腾讯元宝"></div>
                        <div class="card-info"><div class="card-title">腾讯元宝</div></div>
                    </a>
                    <a href="https://www.perplexity.ai/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="perplexity.ai" data-site-name="Perplexity"></div>
                        <div class="card-info"><div class="card-title">Perplexity</div></div>
                    </a>
                    <a href="https://grok.com/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="grok.com" data-site-name="Grok"></div>
                        <div class="card-info"><div class="card-title">Grok</div></div>
                    </a>
                    <a href="https://copilot.cloud.microsoft/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="copilot.cloud.microsoft" data-site-name="Copilot"></div>
                        <div class="card-info"><div class="card-title">Microsoft 365 Copilot Chat</div></div>
                    </a>
                </div>
            </div>

            <div class="section-group" id="life-section">
                <div class="section-header"><h2 class="section-title">生活</h2></div>
                <div class="grid-container" style="margin-bottom: 40px;">
                    <a href="https://www.xiaohongshu.com" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="xiaohongshu.com" data-site-name="小红书"></div>
                        <div class="card-info"><div class="card-title">小红书</div></div>
                    </a>
                    <a href="https://www.bilibili.com" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="bilibili.com" data-site-name="Bilibili"></div>
                        <div class="card-info"><div class="card-title">Bilibili</div></div>
                    </a>
                    <a href="https://www.zhihu.com" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="zhihu.com" data-site-name="知乎"></div>
                        <div class="card-info"><div class="card-title">知乎</div></div>
                    </a>
                </div>
            </div>

            <div class="section-group" id="tool-section">
                <div class="section-header"><h2 class="section-title">工具</h2></div>
                <div class="grid-container">
                    <a href="https://github.com" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="github.com" data-site-name="GitHub"></div>
                        <div class="card-info"><div class="card-title">GitHub</div></div>
                    </a>
                    <a href="https://tinypng.com" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="tinypng.com" data-site-name="TinyPNG"></div>
                        <div class="card-info"><div class="card-title">TinyPNG</div></div>
                    </a>
                    <a href="https://v0.dev" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="v0.dev" data-site-name="v0.dev"></div>
                        <div class="card-info"><div class="card-title">v0.dev</div></div>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
