<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UYEA | 悠野导航</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .logo-text {
            font-family: 'Bebas Neue', sans-serif !important;
            font-style: normal !important;
            font-weight: 900 !important;
            font-size: 26px !important;
            letter-spacing: 1px !important;
            color: var(--primary) !important;
        }
        .logo-sub { font-style: normal !important; }
        .card-icon { background: transparent !important; box-shadow: none !important; }
        .card-icon img {
            width: 40px; height: 40px; object-fit: contain; border-radius: 10px;
            display: block; box-shadow: none !important;
            image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges;
        }
        .card-desc { display: none !important; }
        .bottom-nav { justify-content: space-around; }

        /* 搜索引擎下拉修复样式 */
        .search-engine-select {
            position: relative;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
            display: flex; /* 确保显示 */
            align-items: center;
        }
        .search-engine-select select { display: none !important; }
        .engine-btn {
            display: flex; align-items: center; gap: 4px; padding: 0 12px;
            height: 38px; background: transparent; border: none;
            cursor: pointer; font-size: 13px; color: var(--text-secondary);
        }
        .engine-btn .arrow { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; }
        .engine-btn.open .arrow { transform: rotate(180deg); }

        .engine-dropdown {
            display: none; position: absolute; top: calc(100% + 6px); left: 0;
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.10);
            min-width: 100px; z-index: 1000; overflow: hidden;
        }
        .engine-dropdown.open { display: block; animation: dropIn 0.18s ease both; }
        @keyframes dropIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .engine-option {
            display: flex; align-items: center; gap: 8px; padding: 10px 14px;
            font-size: 13px; color: var(--text-primary); cursor: pointer;
        }
        .engine-option:hover { background: var(--primary-light); color: var(--primary); }
        .engine-option.selected { color: var(--primary); font-weight: 600; }
        .engine-option .engine-dot { width: 7px; height: 7px; border-radius: 50%; background: transparent; }
        .engine-option.selected .engine-dot { background: var(--primary); }
    </style>
</head>
<body>

    <nav class="top-nav" id="topNav">
        <div class="nav-inner">
            <div class="logo">
                <span class="logo-text">UYEA</span>
                <span class="logo-sub">悠野工作室</span>
            </div>
            <div class="search-wrapper">
                <div class="search-engine-select" id="engineSelect">
                    <select id="searchEngine">
                        <option value="baidu">百度</option>
                        <option value="google">谷歌</option>
                        <option value="bing">必应</option>
                    </select>
                    <button class="engine-btn" id="engineBtn" type="button">
                        <span id="engineLabel">百度</span>
                        <span class="arrow">▾</span>
                    </button>
                    <div class="engine-dropdown" id="engineDropdown">
                        <div class="engine-option selected" data-value="baidu">
                            <span class="engine-dot"></span>百度
                        </div>
                        <div class="engine-option" data-value="google">
                            <span class="engine-dot"></span>谷歌
                        </div>
                        <div class="engine-option" data-value="bing">
                            <span class="engine-dot"></span>必应
                        </div>
                    </div>
                </div>
                <input type="text" id="searchInput" placeholder="搜索关键词..." autocomplete="off">
                <button class="search-btn" onclick="handleSearch()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </button>
            </div>
            <button class="hamburger" id="hamburgerBtn" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="layout-wrapper">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><span>导航分区</span></div>
            <nav class="sidebar-nav">
                <a href="#recommend" class="nav-item active" data-section="recommend">
                    <i class="nav-icon">🔥</i><span>每日推荐</span>
                </a>
                <a href="#ai" class="nav-item" data-section="ai">
                    <i class="nav-icon">🤖</i><span>Ai · 智能体</span>
                </a>
                <a href="#life" class="nav-item" data-section="life">
                    <i class="nav-icon">🌿</i><span>生活</span>
                </a>
                <a href="#tools" class="nav-item" data-section="tools">
                    <i class="nav-icon">🛠️</i><span>工具</span>
                </a>
                <a href="forum.html" class="nav-item" data-section="forum">
                    <i class="nav-icon">💬</i><span>悠野社区</span>
                </a>
            </nav>
            <div class="sidebar-footer"><span>© 2025 悠野工作室</span></div>
        </aside>

        <main class="main-content" id="mainContent">
            <div class="welcome-banner">
                <div class="banner-text">
                    <h1>悠野 · <strong>UYEA</strong></h1>
                    <p>大锅炖网站 · 导航 · 工具 · 社区</p>
                </div>
            </div>

            <section id="recommend" class="content-section">
                <div class="section-header"><span class="section-icon">🔥</span><h2>每日推荐</h2></div>
                <div class="card-grid">
                    <a href="https://github.com" target="_blank" class="card">
                        <div class="card-icon"><img src="https://icon.horse/icon/github.com"></div>
                        <div class="card-info"><span class="card-name">GitHub</span></div>
                        <div class="card-arrow">›</div>
                    </a>
                    <a href="https://bilibili.com" target="_blank" class="card">
                        <div class="card-icon"><img src="https://icon.horse/icon/bilibili.com"></div>
                        <div class="card-info"><span class="card-name">Bilibili</span></div>
                        <div class="card-arrow">›</div>
                    </a>
                </div>
            </section>
            
            <section id="ai" class="content-section">
                <div class="section-header"><span class="section-icon">🤖</span><h2>Ai · 智能体</h2></div>
                <div class="card-grid">
                    <a href="https://deepseek.com" target="_blank" class="card">
                        <div class="card-icon"><img src="https://icon.horse/icon/deepseek.com"></div>
                        <div class="card-info"><span class="card-name">DeepSeek</span></div>
                        <div class="card-arrow">›</div>
                    </a>
                </div>
            </section>
        </main>
    </div>

    <nav class="bottom-nav">
        <a href="#recommend" class="bottom-nav-item active" data-section="recommend">
            <span class="bottom-icon">🔥</span><span class="bottom-label">推荐</span>
        </a>
        <a href="#ai" class="bottom-nav-item" data-section="ai">
            <span class="bottom-icon">🤖</span><span class="bottom-label">AI</span>
        </a>
        <a href="tools.html" class="bottom-nav-item" data-section="tools">
            <span class="bottom-icon">🧰</span><span class="bottom-label">工具</span>
        </a>
        <a href="forum.html" class="bottom-nav-item" data-section="forum">
            <span class="bottom-icon">💬</span><span class="bottom-label">社区</span>
        </a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
