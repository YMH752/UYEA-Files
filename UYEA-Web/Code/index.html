<html lang="zh-CN">

    <style>
        /* ── 首页顶栏布局 ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 0 24px;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1.5px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 24px;
            color: var(--primary);
            text-decoration: none;
        }

        /* ✅ 任务二：重构搜索容器布局 */
        .search-container {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 650px; /* 略微加宽以容纳下拉框 */
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        .header-search-wrapper {
            width: 95%;
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0 4px 0 12px; /* 调整内边距 */
            height: 42px;
            pointer-events: auto;
            transition: border-color 0.2s;
        }

        .header-search-wrapper:focus-within {
            border-color: var(--secondary); /* 聚焦时边框变黑 */
        }

        /* ✅ 任务二：搜索引擎下拉框样式 */
        .search-engine-select {
            border: none;
            background: transparent;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
            padding-right: 8px;
            border-right: 1.5px solid var(--border);
            margin-right: 10px;
            height: 24px;
            -webkit-appearance: none; /* 隐藏原生箭头增强美观 */
            appearance: none;
        }

        #searchInput {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            padding: 0 8px;
            font-size: 14px;
            color: var(--text-primary);
        }

        .header-actions { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin-left: auto;
        }

        /* ✅ 任务一回顾：登录按钮保持黑色 */
        .login-btn {
            padding: 8px 16px;
            background: var(--secondary); 
            color: white;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            flex-direction: column;
            gap: 5px;
        }
        .menu-toggle span {
            display: block;
            width: 24px;
            height: 3px;
            background: var(--text-primary);
            border-radius: 2px;
        }

        @media (min-width: 1025px) {
            .header-logo {
                display: none;
            }
        }

        .text-status-card {
            background: var(--surface);
            border: 1.5px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 16px;
            grid-column: 1 / -1;
        }

        .card-icon {
            width: 32px;
            height: 32px;
            background: transparent !important;
            box-shadow: none !important;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .card-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 6px;
        }

        .card-icon .icon-emoji {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            user-select: none;
        }

        @media (max-width: 768px) {
            .menu-toggle { display: flex; }
            .search-container {
                max-width: 55%; 
            }
            .search-engine-select {
                font-size: 12px;
                padding-right: 4px;
                margin-right: 4px;
            }
        }
    </style>
</head>

    <script src="script.js"></script>
    <script>
        /* ════════════════════════════════════════════
           首页专属搜索交互逻辑
           ════════════════════════════════════════════ */
        const searchInput = document.getElementById('searchInput');
        const engineSelector = document.getElementById('searchEngineSelector');
        const cardItems = document.querySelectorAll('.card-item');
        const sections = document.querySelectorAll('.section-group');

        // 搜索引擎 URL 配置
        const engineUrls = {
            baidu: "https://www.baidu.com/s?wd=",
            google: "https://www.google.com/search?q=",
            bing: "https://cn.bing.com/search?q="
        };

        // 监听输入事件 - 实时过滤（站内搜索模式下）
        searchInput.addEventListener('input', function() {
            if (engineSelector.value === 'site') {
                const keyword = this.value.toLowerCase().trim();
                
                cardItems.forEach(card => {
                    const title = card.querySelector('.card-title').textContent.toLowerCase();
                    // ✅ 核心逻辑：不含关键词的卡片隐藏
                    if (title.includes(keyword)) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });

                // 隐藏没有卡片的分类标题
                sections.forEach(section => {
                    const hasVisibleCards = Array.from(section.querySelectorAll('.card-item'))
                                                 .some(card => card.style.display !== 'none');
                    section.style.display = hasVisibleCards ? 'block' : 'none';
                });
            }
        });

        // 监听回车事件 - 跳转搜索引擎
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const type = engineSelector.value;
                const keyword = this.value.trim();

                if (type !== 'site' && keyword !== '') {
                    window.open(engineUrls[type] + encodeURIComponent(keyword), '_blank');
                }
            }
        });

        // 切换下拉框时，如果是站内搜索，立即触发一次过滤逻辑
        engineSelector.addEventListener('change', function() {
            if (this.value === 'site') {
                searchInput.dispatchEvent(new Event('input'));
            } else {
                // 如果切到外部引擎，显示所有卡片
                cardItems.forEach(card => card.style.display = 'flex');
                sections.forEach(section => section.style.display = 'block');
            }
        });
    </script>
