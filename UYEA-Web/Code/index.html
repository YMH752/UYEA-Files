<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UYEA | 悠野导航</title>
    
    <meta name="description" content="悠野工作室(UYEA)提供AI智能体导航、在线工具箱和技术社区。">
    <meta name="theme-color" content="#000000">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ── 首页顶栏布局 ── */
        .top-bar {
            display: flex;
            align-items: center;
            /* ✅ 修改：使用 space-between 确保左中右布局平衡 */
            justify-content: space-between;
            gap: 12px;
            padding: 0 20px;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1.5px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 24px;
            color: var(--primary);
            text-decoration: none;
            flex-shrink: 0; 
            /* ✅ 修改：删除了原来在 PC 端隐藏 LOGO 的 display: none 逻辑 */
        }

        /* ── 搜索容器：居中处理 ── */
        .search-container {
            /* ✅ 修改：通过 flex: 1 和 justify-content 配合左右元素实现视觉居中 */
            flex: 1;
            display: flex;
            justify-content: center; 
            max-width: 550px; 
            margin: 0 10px;
        }

        .header-search-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0 4px 0 0;
            height: 40px;
            transition: border-color 0.2s;
            overflow: visible;
        }

        .header-search-wrapper:focus-within {
            border-color: var(--secondary);
        }

        /* ── 下拉引擎样式 ── */
        .engine-dropdown-wrapper { position: relative; flex-shrink: 0; }
        .engine-trigger-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px 0 12px;
            height: 40px;
            background: var(--secondary);
            color: #FFFFFF;
            border: none;
            border-radius: var(--radius-md) 0 0 var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .engine-dropdown-list {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            min-width: 130px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            z-index: 200;
        }
        .engine-dropdown-wrapper.open .engine-dropdown-list { display: block; }
        .engine-option-item {
            padding: 10px 14px;
            font-size: 13px;
            cursor: pointer;
        }
        .engine-option-item:hover { background: var(--bg); }
        .engine-option-item.selected { color: var(--primary); font-weight: 700; }

        #searchInput {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            padding: 0 8px;
            font-size: 14px;
            color: var(--text-primary);
        }

        /* ── 右侧操作区 ── */
        .header-actions { 
            display: flex; 
            align-items: center; 
            gap: 12px;
            flex-shrink: 0;
            /* ✅ 修改：为了让搜索框在视觉上绝对居中，右侧占位宽度需与左侧 LOGO 接近 */
            min-width: 80px; 
            justify-content: flex-end;
        }

        /* 汉堡菜单样式 */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            flex-direction: column;
            gap: 5px;
        }
        .menu-toggle span {
            display: block;
            width: 24px;
            height: 3px;
            background: var(--text-primary);
            border-radius: 2px;
        }

        /* ── 侧边栏布局 ── */
        .sidebar {
            display: flex;
            flex-direction: column;
        }
        .nav-menu {
            flex: 1;
        }
        .sidebar-footer {
            padding: 20px 16px;
            border-top: 1px solid var(--border);
            margin-top: auto; 
        }
        .sidebar-login-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .sidebar-login-btn:hover {
            background: var(--bg);
            border-color: var(--secondary);
        }

        /* ✅ 修改：移除了之前 @media (min-width: 1025px) 隐藏 LOGO 的规则 */

        /* ── 移动端响应式修正 ── */
        @media (max-width: 768px) {
            .menu-toggle { display: flex; }
            .top-bar { padding: 0 12px; gap: 8px; }
            .header-logo { font-size: 20px; }
            .search-container { margin: 0; }
            .engine-trigger-btn { font-size: 12px; padding: 0 6px 0 8px; }
            .header-actions { min-width: auto; } /* 移动端取消最小宽度限制 */
        }

        /* 卡片图标等原有样式 */
        .card-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .card-icon img { width: 100%; height: 100%; object-fit: contain; border-radius: 6px; }
        .text-status-card { background: var(--surface); border: 1.5px dashed var(--border); border-radius: var(--radius-md); padding: 40px; text-align: center; color: var(--text-muted); grid-column: 1 / -1; }
    </style>
</head>

    <script src="script.js"></script>
    <script>
        const searchInput      = document.getElementById('searchInput');
        const engineSelector   = document.getElementById('searchEngineSelector');
        const engineWrapper    = document.getElementById('engineDropdownWrapper');
        const engineTriggerBtn = document.getElementById('engineTriggerBtn');
        const engineTriggerLabel = document.getElementById('engineTriggerLabel');
        const engineOptionItems  = document.querySelectorAll('.engine-option-item');
        const cardItems        = document.querySelectorAll('.card-item');
        const sections         = document.querySelectorAll('.section-group');

        const engineUrls = {
            baidu:  "https://www.baidu.com/s?wd=",
            google: "https://www.google.com/search?q=",
            bing:   "https://cn.bing.com/search?q="
        };

        // 下拉菜单逻辑
        engineTriggerBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            engineWrapper.classList.toggle('open');
        });

        engineOptionItems.forEach(item => {
            item.addEventListener('click', function(e) {
                e.stopPropagation();
                engineSelector.value = this.dataset.value;
                engineTriggerLabel.textContent = this.textContent.trim();
                engineOptionItems.forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                engineWrapper.classList.remove('open');
                if (engineSelector.value === 'site') searchInput.dispatchEvent(new Event('input'));
            });
        });

        document.addEventListener('click', () => engineWrapper.classList.remove('open'));

        // 搜索逻辑
        searchInput.addEventListener('input', function() {
            if (engineSelector.value === 'site') {
                const keyword = this.value.toLowerCase().trim();
                cardItems.forEach(card => {
                    const title = card.querySelector('.card-title').textContent.toLowerCase();
                    card.style.display = title.includes(keyword) ? 'flex' : 'none';
                });
                sections.forEach(section => {
                    const hasVisibleCards = Array.from(section.querySelectorAll('.card-item')).some(c => c.style.display !== 'none');
                    section.style.display = hasVisibleCards ? 'block' : 'none';
                });
            }
        });

        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const type = engineSelector.value;
                const keyword = this.value.trim();
                if (type !== 'site' && keyword !== '') {
                    window.open(engineUrls[type] + encodeURIComponent(keyword), '_blank');
                }
            }
        });

        // 补全图标自动填充逻辑 (如果script.js里没写的话)
        function initIcons() {
            document.querySelectorAll('.card-icon img').forEach(img => {
                const domain = img.getAttribute('data-domain');
                if (domain && !img.src) {
                    img.src = `https://favicon.splitbee.io/?url=${domain}`;
                    img.onerror = () => { img.style.display='none'; }; 
                }
            });
        }
        window.addEventListener('DOMContentLoaded', initIcons);
    </script>
