<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UYEA | 悠野导航</title>
    
    <meta name="description" content="悠野工作室(UYEA)提供AI智能体导航、在线工具箱和技术社区。">
    <meta name="theme-color" content="#000000">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ── 顶栏布局 (保持原样) ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1.5px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-container {
            width: 100%;
            max-width: 600px; 
            display: flex;
            justify-content: center;
        }

        .header-search-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0 4px 0 0;
            height: 42px; 
            transition: border-color 0.2s;
            overflow: visible;
        }

        .header-search-wrapper:focus-within { border-color: var(--secondary); }

        /* ── 下拉引擎样式 (保持原样) ── */
        .engine-dropdown-wrapper { position: relative; flex-shrink: 0; }
        .engine-trigger-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 12px;
            height: 42px;
            background: var(--secondary);
            color: #FFFFFF;
            border: none;
            border-radius: var(--radius-md) 0 0 var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .engine-dropdown-list {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            min-width: 80px; 
            width: 100%; 
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            z-index: 200;
            padding: 0;
            overflow: hidden;
        }
        
        .engine-dropdown-wrapper.open .engine-dropdown-list { display: block; }
        .engine-option-item {
            padding: 10px 12px;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            border-bottom: 1px solid var(--border); 
            transition: background 0.2s;
        }
        .engine-option-item:last-child { border-bottom: none; }
        .engine-option-item:hover { background: var(--bg); }
        .engine-option-item.selected { color: var(--primary); font-weight: 700; }

        #searchInput {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            padding: 0 12px;
            font-size: 15px;
            color: var(--text-primary);
        }

        .header-actions { 
            position: absolute;
            right: 20px;
            display: flex; 
            align-items: center; 
        }

        .menu-toggle {
            display: none; 
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            flex-direction: column;
            gap: 5px;
        }
        .menu-toggle span {
            display: block;
            width: 24px;
            height: 3px;
            background: var(--text-primary);
            border-radius: 2px;
        }

        /* ── 优化后的侧边栏菜单样式 ── */
        /* ── 侧边栏菜单：像素级对齐工具页 ── */
        .nav-menu {
            padding: 16px 12px;
        }

        .nav-group {
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            display: flex;
            align-items: center;
            /* ✅ 对齐工具页：高度与内边距 */
            padding: 14px 18px;
            /* ✅ 对齐工具页：完全一致的间距 */
            margin: 6px 12px;
            border-radius: var(--radius-md);
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        /* ✅ 微调：补偿下半部分的累计误差 */
        .nav-menu > a:nth-of-type(2) {
            transform: translateY(5px);
        }

        /* 基础高亮：黑底白字 */
        .nav-item.active {
            background: #000000 !important;
            color: #FFFFFF !important;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1) !important;
        }

        /* 展开态：铁锈红 */
        .nav-item.menu-open {
            background: var(--primary) !important;
            color: #FFFFFF !important;
            box-shadow: 0 4px 12px rgba(166, 58, 38, 0.2);
        }

        .arrow-icon {
            font-size: 10px;
            margin-left: auto;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.6;
        }
        .nav-item.menu-open .arrow-icon { 
            transform: rotate(180deg);
            opacity: 1;
        }

        .sub-menu {
            display: none; 
            padding-bottom: 10px;
            /* 增加一个极其微小的淡入 */
            animation: fadeInSub 0.2s ease-out;
        }
        @keyframes fadeInSub {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sub-nav-item {
            display: block;
            /* ✅ 对齐工具页：子项缩进与间距 */
            padding: 10px 16px 10px 56px;
            font-size: 14px;
            /* ✅ 对齐工具页：800 极粗体 */
            font-weight: 800; 
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .sub-nav-item:hover {
            color: var(--primary);
            background: rgba(0,0,0,0.03);
        }

        /* 底部按钮：完全对齐工具页 */
        .sidebar-footer {
            padding: 24px 16px;
            border-top: 1px solid var(--border);
            margin-top: auto;
            /* ✅ 微调：补偿下半部分的累计误差 */
            transform: translateY(5px);
        }
        .auth-buttons {
            display: flex;
            gap: 12px;
        }

        .auth-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 42px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .login-btn {
            background: #FFFFFF;
            border: 1.5px solid #000000;
            color: #000000;
        }

        .register-btn {
            background: #000000;
            border: 1.5px solid #000000;
            color: #FFFFFF;
        }

        @media (max-width: 1024px) {
            .menu-toggle { display: flex; }
            .top-bar { justify-content: flex-start; padding-left: 50px; }
            .search-container { max-width: none; }
        }
        
        @media (max-width: 768px) {
            .top-bar { padding: 0 12px; justify-content: space-between; }
            .search-container { margin-right: 40px; }
        }

        .card-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .card-icon img { width: 100%; height: 100%; object-fit: contain; border-radius: 6px; }
    </style>
</head>
<body>

        <div class="nav-group">

        </div>

        <div class="sidebar-footer">
            <div class="auth-buttons">

        </div>
