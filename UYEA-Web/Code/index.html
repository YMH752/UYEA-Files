<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UYEA | 悠野导航</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-nav">
        <div class="logo">UYEA</div>
        <div class="search-wrapper">
            <select id="searchEngine">
                <option value="baidu">百度</option>
                <option value="google">谷歌</option>
            </select>
            <input type="text" id="searchInput" placeholder="搜索关键词...">
            <button onclick="handleSearch()">搜索</button>
        </div>
    </nav>

    <div class="container">
        <aside class="sidebar">
            <a href="#recommend" class="nav-item active"><i>🔥</i><span>常用推荐</span></a>
            <a href="#ai" class="nav-item"><i>🤖</i><span>AI工具</span></a>
            <a href="#dev" class="nav-item"><i>🔧</i><span>开发者</span></a>
            <a href="forum.html" class="nav-item"><i>💬</i><span>社区</span></a>
        </aside>

        <main class="main">
            <section id="recommend">
                <div class="section-header"><h2>常用推荐</h2></div>
                <div class="grid">
                    <a href="https://github.com" class="card"><span class="icon">🚀</span><span>GitHub</span><p>代码托管</p></a>
                    <a href="https://bilibili.com" class="card"><span class="icon">📺</span><span>Bilibili</span><p>视频社区</p></a>
                </div>
            </section>

            <section id="ai">
                <div class="section-header"><h2>AI工具</h2></div>
                <div class="grid">
                    <a href="https://chat.openai.com" class="card"><span class="icon">🤖</span><span>ChatGPT</span><p>智能对话</p></a>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
