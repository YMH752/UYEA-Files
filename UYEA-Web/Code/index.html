    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* ── 首页顶栏布局 ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 0 24px;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1.5px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 24px;
            color: var(--primary);
            text-decoration: none;
        }

        /* ── 搜索容器居中布局 ── */
        .search-container {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 650px;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        /* ── 搜索框整体包裹层 ── */
        .header-search-wrapper {
            width: 95%;
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0 4px 0 0; /* 左边由触发按钮自带padding */
            height: 42px;
            pointer-events: auto;
            /* [修改内容]：增加过渡效果，使高亮阴影显示更平滑 */
            transition: border-color 0.2s, box-shadow 0.2s;
            overflow: visible; /* 允许下拉菜单溢出 */
        }

        /* [修改内容]：搜索框聚焦时，增加红色柔和光晕阴影 */
        .header-search-wrapper:focus-within {
            border-color: var(--primary); 
            box-shadow: 0 0 12px rgba(166, 58, 38, 0.2); 
        }

        /* ════════════════════════════════════════════
           自定义搜索引擎下拉菜单
           替换原来的原生 <select> 标签
           ════════════════════════════════════════════ */

        /* ── 下拉菜单容器（相对定位，用于定位展开列表） ── */
        .engine-dropdown-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        /* ── 触发按钮：黑色背景 + 白色文字 + 箭头 ── */
        .engine-trigger-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px 0 12px;
            height: 42px;
            background: var(--secondary); /* 黑色背景 */
            color: #FFFFFF;              /* 白色文字，与黑色形成对比 */
            border: none;
            border-radius: var(--radius-md) 0 0 var(--radius-md); /* 左侧圆角与搜索框一致 */
            font-size: 13px;
            font-weight: 600;
            font-family: 'Noto Sans SC', sans-serif;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s;
            outline: none;
        }

        .engine-trigger-btn:hover {
            opacity: 0.85; /* 悬浮时轻微透明反馈 */
        }

        /* ── 触发按钮右侧的箭头图标 ── */
        .engine-trigger-arrow {
            font-size: 10px;
            line-height: 1;
            transition: transform 0.25s ease; /* 展开/收起时旋转动画 */
            display: inline-block;
        }

        /* ── 展开状态：箭头旋转180°朝上 ── */
        .engine-dropdown-wrapper.open .engine-trigger-arrow {
            transform: rotate(180deg);
        }

        /* ── 触发按钮与搜索输入框之间的分隔线 ── */
        .engine-divider {
            width: 1.5px;
            height: 22px;
            background: var(--border);
            flex-shrink: 0;
        }

        /* ── 下拉列表面板 ── */
        .engine-dropdown-list {
            display: none; /* 默认隐藏 */
            position: absolute;
            top: calc(100% + 6px); /* 在按钮正下方，留6px间距 */
            left: 0;
            min-width: 130px; /* 不太窄也不太宽 */
            background: var(--surface); /* 白色表面背景 #FCFBF9 */
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md); /* 阴影增强层次感 */
            z-index: 200; /* 确保在顶栏之上 */
            overflow: hidden;
        }

        /* ── 展开状态：显示下拉列表 ── */
        .engine-dropdown-wrapper.open .engine-dropdown-list {
            display: block;
        }

        /* ── 每个下拉选项 ── */
        .engine-option-item {
            display: flex;
            align-items: center;
            padding: 11px 14px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: background 0.15s;
            border-left: 3px solid transparent; /* 预留高亮竖线位置 */
            background: var(--surface);
        }

        /* ── 选项悬浮效果：米色背景 ── */
        .engine-option-item:hover {
            background: var(--bg); /* 复古米色 #EEEAE3，与白色表面形成区分但不显眼 */
        }

        /* ── 当前选中项高亮：浅红背景 + 左侧红色竖线 ── */
        .engine-option-item.selected {
            background: var(--primary-light); /* 极浅红 #F7EFED */
            border-left-color: var(--primary); /* 铁锈红竖线 */
            color: var(--primary);             /* 文字也变红 */
            font-weight: 700;
        }

        /* ── 选项之间的细分隔线 ── */
        .engine-option-item + .engine-option-item {
            border-top: 1px solid var(--border);
        }

        /* ── 搜索输入框 ── */
        #searchInput {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            padding: 0 8px;
            font-size: 14px;
            color: var(--text-primary);
        }

        /* ── 右侧操作区 ── */
        .header-actions { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin-left: auto;
        }

        /* ── 登录按钮（保持黑色） ── */
        .login-btn {
            padding: 8px 16px;
            background: var(--secondary); 
            color: white;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        /* [新增内容]：侧边栏底部容器，用于实现登录按钮置底且靠左 */
        .sidebar-footer {
            margin-top: auto; /* 利用 Flex 将其推到底部 */
            padding: 24px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-start; /* 按钮靠左 */
        }

        /* ── 移动端汉堡菜单按钮 ── */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            flex-direction: column;
            gap: 5px;
        }
        .menu-toggle span {
            display: block;
            width: 24px;
            height: 3px;
            background: var(--text-primary);
            border-radius: 2px;
        }

        /* ── 桌面端隐藏 header-logo（侧边栏已有LOGO） ── */
        @media (min-width: 1025px) {
            .header-logo {
                display: none;
            }
        }

        /* ── 空状态占位卡片 ── */
        .text-status-card {
            background: var(--surface);
            border: 1.5px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 16px;
            grid-column: 1 / -1;
        }

        /* ── 卡片图标容器 ── */
        .card-icon {
            width: 32px;
            height: 32px;
            background: transparent !important;
            box-shadow: none !important;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .card-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 6px;
        }

        /* ── emoji备用图标样式 ── */
        .card-icon .icon-emoji {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            user-select: none;
        }

        /* ── 移动端响应式 ── */
        @media (max-width: 768px) {
            .menu-toggle { display: flex; }
            .search-container {
                max-width: 55%; 
            }
            /* 移动端触发按钮文字字号略小 */
            .engine-trigger-btn {
                font-size: 12px;
                padding: 0 8px 0 10px;
            }
        }
    </style>

    <script>
        /* ════════════════════════════════════════════
           首页专属搜索交互逻辑
           包含：自定义下拉菜单交互 + 站内搜索过滤 + 外部引擎跳转
           ════════════════════════════════════════════ */

        /* ── 获取DOM元素引用 ── */
        const searchInput      = document.getElementById('searchInput');
        const engineSelector   = document.getElementById('searchEngineSelector'); // 隐藏的input，存储当前引擎值
        const engineWrapper    = document.getElementById('engineDropdownWrapper'); // 下拉菜单容器
        const engineTriggerBtn = document.getElementById('engineTriggerBtn');      // 触发按钮
        const engineTriggerLabel = document.getElementById('engineTriggerLabel'); // 触发按钮上的文字
        const engineOptionItems  = document.querySelectorAll('.engine-option-item'); // 所有选项
        const cardItems        = document.querySelectorAll('.card-item');
        const sections         = document.querySelectorAll('.section-group');

        /* ── 搜索引擎跳转 URL 配置 ── */
        const engineUrls = {
            baidu:  "https://www.baidu.com/s?wd=",
            google: "https://www.google.com/search?q=",
            bing:   "https://cn.bing.com/search?q="
        };

        /* ════════════════════════════════════════════
           自定义下拉菜单交互逻辑
           ════════════════════════════════════════════ */

        /* ── 点击触发按钮：切换展开/收起状态 ── */
        engineTriggerBtn.addEventListener('click', function(e) {
            e.stopPropagation(); // 阻止冒泡，防止立即触发document的关闭逻辑
            const isOpen = engineWrapper.classList.toggle('open');
            // 同步更新 aria-expanded 无障碍属性
            engineTriggerBtn.setAttribute('aria-expanded', isOpen);
        });

        /* ── 点击某个选项：更新选中状态并关闭列表 ── */
        engineOptionItems.forEach(function(item) {
            item.addEventListener('click', function(e) {
                e.stopPropagation(); // 阻止冒泡

                const selectedValue = this.getAttribute('data-value'); // 获取选项值
                const selectedText  = this.textContent.trim();         // 获取选项显示文字

                /* 更新隐藏input的值，供搜索逻辑读取 */
                engineSelector.value = selectedValue;

                /* 更新触发按钮上显示的文字 */
                engineTriggerLabel.textContent = selectedText;

                /* 移除所有选项的 selected 高亮，再给当前项加上 */
                engineOptionItems.forEach(function(opt) {
                    opt.classList.remove('selected');
                });
                this.classList.add('selected');

                /* 关闭下拉列表 */
                engineWrapper.classList.remove('open');
                engineTriggerBtn.setAttribute('aria-expanded', 'false');

                /* 切换到站内搜索时，立即触发一次过滤逻辑 */
                if (selectedValue === 'site') {
                    searchInput.dispatchEvent(new Event('input'));
                } else {
                    /* 切到外部引擎时，恢复显示所有卡片 */
                    cardItems.forEach(function(card) { card.style.display = 'flex'; });
                    sections.forEach(function(section) { section.style.display = 'block'; });
                }
            });
        });

        /* ── 点击页面其他区域：关闭下拉列表 ── */
        document.addEventListener('click', function() {
            if (engineWrapper.classList.contains('open')) {
                engineWrapper.classList.remove('open');
                engineTriggerBtn.setAttribute('aria-expanded', 'false');
            }
        });

        /* ── ESC键：关闭下拉列表 ── */
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && engineWrapper.classList.contains('open')) {
                engineWrapper.classList.remove('open');
                engineTriggerBtn.setAttribute('aria-expanded', 'false');
            }
        });

        /* ════════════════════════════════════════════
           站内搜索：实时过滤卡片
           ════════════════════════════════════════════ */
        searchInput.addEventListener('input', function() {
            /* 只在站内搜索模式下过滤 */
            if (engineSelector.value === 'site') {
                const keyword = this.value.toLowerCase().trim();
                
                /* 遍历所有卡片，判断标题是否包含关键词 */
                cardItems.forEach(function(card) {
                    const title = card.querySelector('.card-title').textContent.toLowerCase();
                    card.style.display = title.includes(keyword) ? 'flex' : 'none';
                });

                /* 隐藏所有卡片都被过滤掉的分类标题 */
                sections.forEach(function(section) {
                    const hasVisibleCards = Array.from(section.querySelectorAll('.card-item'))
                                                 .some(function(card) { return card.style.display !== 'none'; });
                    section.style.display = hasVisibleCards ? 'block' : 'none';
                });
            }
        });

        /* ════════════════════════════════════════════
           回车键：跳转到外部搜索引擎
           ════════════════════════════════════════════ */
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const type    = engineSelector.value;
                const keyword = this.value.trim();

                /* 非站内搜索且有关键词时，在新标签页打开搜索结果 */
                if (type !== 'site' && keyword !== '') {
                    window.open(engineUrls[type] + encodeURIComponent(keyword), '_blank');
                }
            }
        });
    </script>
</body>
</html>
