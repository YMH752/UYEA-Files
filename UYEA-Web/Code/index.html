<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UYEA | 悠野导航</title>
    
    <meta name="description" content="悠野工作室(UYEA)提供AI智能体导航、在线工具箱和技术社区。">
    <meta name="theme-color" content="#000000">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ── 顶栏布局 ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1.5px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo { display: none; }

        .search-container {
            width: 100%;
            max-width: 600px; 
            display: flex;
            justify-content: center;
        }

        .header-search-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0 4px 0 0;
            height: 42px; 
            transition: border-color 0.2s;
        }

        .header-search-wrapper:focus-within { border-color: var(--secondary); }

        .engine-dropdown-wrapper { position: relative; flex-shrink: 0; }
        .engine-trigger-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 12px;
            height: 42px;
            background: var(--secondary);
            color: #FFFFFF;
            border: none;
            border-radius: var(--radius-md) 0 0 var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .engine-dropdown-list {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            min-width: 80px; 
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            z-index: 200;
        }
        
        .engine-dropdown-wrapper.open .engine-dropdown-list { display: block; }

        #searchInput {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            padding: 0 12px;
            font-size: 15px;
            color: var(--text-primary);
        }

        /* ── 侧边栏：同步登录按钮位置 ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1.5px solid var(--border);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Logo和登录分居两侧 */
            padding: 20px 24px 10px 24px; 
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            color: var(--secondary);
            text-decoration: none;
        }

        .login-btn {
            background: var(--secondary);
            color: #FFFFFF;
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .nav-menu { flex: 1; padding: 10px 0; overflow-y: auto; }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            margin: 6px 12px;
            border-radius: var(--radius-md);
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
        }
        .nav-item.active { background: #000000; color: #FFFFFF; }

        .sub-menu { display: none; padding-bottom: 10px; }
        .sub-nav-item {
            display: block;
            padding: 10px 16px 10px 56px;
            font-size: 14px;
            font-weight: 800;
            color: var(--text-secondary);
            text-decoration: none;
        }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .menu-toggle { display: flex; }
        }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="#" class="logo-text">UYEA.</a>
            <a href="login.html" class="login-btn">登录</a>
        </div>
        
        <nav class="nav-menu">
            <div class="nav-group">
                <div class="nav-item active nav-dropdown-trigger" id="allNavTrigger">
                    <span>🏠 全部导航</span>
                </div>
                <div class="sub-menu" id="subNavMenu">
                    <a href="#ai-section" class="sub-nav-item">Ai</a>
                    <a href="#life-section" class="sub-nav-item">生活</a>
                    <a href="#tool-section" class="sub-nav-item">工具</a>
                </div>
            </div>
            <a href="tools.html" class="nav-item"><span>🛠️ 实用工具</span></a>
            <a href="forum.html" class="nav-item"><span>💬 悠野社区</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="search-container">
                <div class="header-search-wrapper">
                    <div class="engine-dropdown-wrapper" id="engineDropdownWrapper">
                        <input type="hidden" id="searchEngineSelector" value="site">
                        <button class="engine-trigger-btn" id="engineTriggerBtn">站内</button>
                    </div>
                    <input type="text" id="searchInput" placeholder="搜索关键词...">
                </div>
            </div>
        </header>

        <div class="content-wrapper" style="padding: 40px;">
            <div class="section-group" id="ai-section">
                <div class="section-header"><h2 class="section-title">Ai</h2></div>
                <div class="grid-container">
                    <a href="https://www.gemini.google.com/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="gemini.google.com"></div><div class="card-title">Google Gemini</div></a>
                    <a href="https://chatgpt.com/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="chatgpt.com"></div><div class="card-title">ChatGPT</div></a>
                    <a href="https://claude.ai/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="claude.ai"></div><div class="card-title">Claude</div></a>
                    <a href="https://www.deepseek.com/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="deepseek.com"></div><div class="card-title">DeepSeek</div></a>
                    <a href="https://yiyan.baidu.com/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="yiyan.baidu.com"></div><div class="card-title">文心一言</div></a>
                    <a href="https://www.qianwen.aliyun.com/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="qianwen.aliyun.com"></div><div class="card-title">通义千问</div></a>
                    <a href="https://www.kimi.ai/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="kimi.ai"></div><div class="card-title">Kimi</div></a>
                    <a href="https://www.doubao.com/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="doubao.com"></div><div class="card-title">豆包</div></a>
                    <a href="https://yuanbao.tencent.com/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="yuanbao.tencent.com"></div><div class="card-title">腾讯元宝</div></a>
                    <a href="https://www.perplexity.ai/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="perplexity.ai"></div><div class="card-title">Perplexity</div></a>
                    <a href="https://grok.com/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="grok.com"></div><div class="card-title">Grok</div></a>
                    <a href="https://copilot.cloud.microsoft/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="copilot.cloud.microsoft"></div><div class="card-title">Microsoft Copilot</div></a>
                </div>
            </div>

            <div class="section-group" id="life-section" style="margin-top: 40px;">
                <div class="section-header"><h2 class="section-title">生活</h2></div>
                <div class="grid-container">
                    <a href="https://www.xiaohongshu.com" target="_blank" class="card-item"><div class="card-title">小红书</div></a>
                    <a href="https://www.bilibili.com" target="_blank" class="card-item"><div class="card-title">Bilibili</div></a>
                    <a href="https://www.zhihu.com" target="_blank" class="card-item"><div class="card-title">知乎</div></a>
                </div>
            </div>

            <div class="section-group" id="tool-section" style="margin-top: 40px;">
                <div class="section-header"><h2 class="section-title">工具</h2></div>
                <div class="grid-container">
                    <a href="https://github.com" target="_blank" class="card-item"><div class="card-title">GitHub</div></a>
                    <a href="https://tinypng.com" target="_blank" class="card-item"><div class="card-title">TinyPNG</div></a>
                    <a href="https://v0.dev" target="_blank" class="card-item"><div class="card-title">v0.dev</div></a>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        const allNavTrigger = document.getElementById('allNavTrigger');
        const subNavMenu = document.getElementById('subNavMenu');
        allNavTrigger.addEventListener('click', () => {
            subNavMenu.style.display = subNavMenu.style.display === 'block' ? 'none' : 'block';
        });

        function initIcons() {
            document.querySelectorAll('.card-icon img').forEach(img => {
                const domain = img.getAttribute('data-domain');
                if (domain) img.src = `https://favicon.splitbee.io/?url=${domain}`;
            });
        }
        window.addEventListener('DOMContentLoaded', initIcons);
    </script>
</body>
</html>
