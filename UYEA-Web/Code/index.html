<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UYEA | 悠野导航</title>
    
    <meta name="description" content="悠野工作室(UYEA)提供AI智能体导航、在线工具箱和技术社区。">
    <meta name="theme-color" content="#000000">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ── 修改1：补充CSS变量定义，确保无外部依赖时样式正常 (同意项2) ── */
        :root {
            --header-h: 64px;
            --surface: #FFFFFF;
            --bg: #F9FAFB;
            --border: #E5E7EB;
            --text-primary: #1F2937;
            --text-secondary: #6B7280;
            --text-muted: #9CA3AF;
            --primary: #A63A26;
            --secondary: #1F2937;
            --radius-md: 12px;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* ── 修改2：添加系统字体回退，提升加载体验 (同意项12) ── */
        body {
            font-family: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
        }

        /* ── 顶栏布局 (保持原样) ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1.5px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* ── 修改3：删除.header-logo样式 (同意项7) ── */

        .search-container {
            width: 100%;
            max-width: 600px; 
            display: flex;
            justify-content: center;
        }

        .header-search-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0 4px 0 0;
            height: 42px; 
            transition: border-color 0.2s;
            overflow: visible;
        }

        .header-search-wrapper:focus-within { border-color: var(--secondary); }

        /* ── 下拉引擎样式 (保持原样) ── */
        .engine-dropdown-wrapper { position: relative; flex-shrink: 0; }
        .engine-trigger-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 12px;
            height: 42px;
            background: var(--secondary);
            /* ── 修改4：明确设置白色文字并增强对比度 (同意项11) ── */
            color: #FFFFFF;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            border: none;
            border-radius: var(--radius-md) 0 0 var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .engine-dropdown-list {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            min-width: 80px; 
            width: 100%; 
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            z-index: 200;
            padding: 0;
            overflow: hidden;
        }
        
        .engine-dropdown-wrapper.open .engine-dropdown-list { display: block; }
        .engine-option-item {
            padding: 10px 12px;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            border-bottom: 1px solid var(--border); 
            transition: background 0.2s;
        }
        .engine-option-item:last-child { border-bottom: none; }
        .engine-option-item:hover { background: var(--bg); }
        .engine-option-item.selected { color: var(--primary); font-weight: 700; }

        #searchInput {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            padding: 0 12px;
            font-size: 15px;
            color: var(--text-primary);
        }

        .header-actions { 
            position: absolute;
            right: 20px;
            display: flex; 
            align-items: center; 
        }

        .menu-toggle {
            display: none; 
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            flex-direction: column;
            gap: 5px;
        }
        .menu-toggle span {
            display: block;
            width: 24px;
            height: 3px;
            background: var(--text-primary);
            border-radius: 2px;
        }

        /* ── 优化后的侧边栏菜单样式 ── */
        /* ── 侧边栏菜单：像素级对齐工具页 ── */
        .nav-menu {
            padding: 16px 12px;
        }

        .nav-group {
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            display: flex;
            align-items: center;
            /* ✅ 对齐工具页：高度与内边距 */
            padding: 14px 18px;
            /* ✅ 对齐工具页：完全一致的间距 */
            margin: 6px 12px;
            border-radius: var(--radius-md);
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        /* ✅ 微调：补偿下半部分的累计误差 */
        .nav-menu > a:nth-of-type(2) {
            transform: translateY(5px);
        }

        /* 基础高亮：黑底白字 */
        .nav-item.active {
            background: #000000 !important;
            color: #FFFFFF !important;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1) !important;
        }

        /* 展开态：铁锈红 */
        .nav-item.menu-open {
            background: var(--primary) !important;
            color: #FFFFFF !important;
            box-shadow: 0 4px 12px rgba(166, 58, 38, 0.2);
        }

        .arrow-icon {
            font-size: 10px;
            margin-left: auto;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.6;
        }
        .nav-item.menu-open .arrow-icon { 
            transform: rotate(180deg);
            opacity: 1;
        }

        /* ── 修改5：子菜单添加平滑展开/收起动画 (同意项10) ── */
        .sub-menu {
            max-height: 0;
            opacity: 0;
            visibility: hidden;
            overflow: hidden;
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out, visibility 0.3s ease-in-out;
            padding-bottom: 0;
        }
        .nav-item.menu-open + .sub-menu {
            max-height: 300px; /* 足够显示子项 */
            opacity: 1;
            visibility: visible;
            padding-bottom: 10px;
        }

        .sub-nav-item {
            display: block;
            /* ✅ 对齐工具页：子项缩进与间距 */
            padding: 10px 16px 10px 56px;
            font-size: 14px;
            /* ✅ 对齐工具页：800 极粗体 */
            font-weight: 800; 
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .sub-nav-item:hover {
            color: var(--primary);
            background: rgba(0,0,0,0.03);
        }

        /* 底部按钮：完全对齐工具页 */
        .sidebar-footer {
            padding: 24px 16px;
            border-top: 1px solid var(--border);
            margin-top: auto;
            /* ✅ 微调：补偿下半部分的累计误差 */
            transform: translateY(5px);
        }
        .auth-buttons {
            display: flex;
            gap: 12px;
        }

        .auth-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 42px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .login-btn {
            background: #FFFFFF;
            border: 1.5px solid #000000;
            color: #000000;
        }

        .register-btn {
            background: #000000;
            border: 1.5px solid #000000;
            color: #FFFFFF;
        }

        /* ── 修改6：统一grid容器底部间距，替代内联样式 (同意项6) ── */
        .section-group .grid-container {
            margin-bottom: 40px;
        }

        @media (max-width: 1024px) {
            .menu-toggle { display: flex; }
            /* ── 修改7：优化移动端顶栏布局，防止重叠 (同意项13) ── */
            .top-bar { 
                justify-content: flex-start; 
                padding-left: 16px;
                padding-right: 60px; /* 为汉堡按钮留出空间 */
            }
            .search-container { max-width: none; }
        }
        
        @media (max-width: 768px) {
            .top-bar { 
                padding: 0 12px; 
                justify-content: space-between; 
            }
            .search-container { 
                margin-right: 48px; /* 避免与汉堡按钮重叠 */
                width: 100%;
            }
            .header-actions { right: 12px; }
        }

        .card-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .card-icon img { width: 100%; height: 100%; object-fit: contain; border-radius: 6px; }
    </style>
</head>

    <script>
        /* ── 严格保留原有脚本逻辑，并实施同意项3、4 ── */
        const allNavTrigger = document.getElementById('allNavTrigger');
        const subNavMenu    = document.getElementById('subNavMenu');

        allNavTrigger.addEventListener('click', function() {
            const isHomePage = window.location.pathname.endsWith('index.html') || window.location.pathname === '/' || window.location.pathname.endsWith('/');
            if (isHomePage) {
                const isOpening = !this.classList.contains('menu-open');
                this.classList.toggle('menu-open', isOpening);
                // 配合CSS动画，无需手动设置display
                subNavMenu.style.display = isOpening ? 'block' : 'none';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                window.location.href = 'index.html';
            }
        });

        document.querySelectorAll('.sub-nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                const targetId = this.getAttribute('href').substring(1);
                const targetEl = document.getElementById(targetId);
                if (targetEl) {
                    targetEl.scrollIntoView({ behavior: 'smooth' });
                    if (window.innerWidth <= 1024) {
                        document.getElementById('sidebar').classList.remove('active');
                        document.getElementById('sidebarOverlay').classList.remove('active');
                    }
                }
            });
        });

        const searchInput      = document.getElementById('searchInput');
        const engineSelector   = document.getElementById('searchEngineSelector');
        const engineWrapper    = document.getElementById('engineDropdownWrapper');
        const engineTriggerBtn = document.getElementById('engineTriggerBtn');
        const engineTriggerLabel = document.getElementById('engineTriggerLabel');
        const engineOptionItems  = document.querySelectorAll('.engine-option-item');
        const cardItems        = document.querySelectorAll('.card-item');
        const sections         = document.querySelectorAll('.section-group');

        const engineUrls = {
            baidu:  "https://www.baidu.com/s?wd=",
            google: "https://www.google.com/search?q=",
            bing:   "https://cn.bing.com/search?q="
        };

        // ── 修改12：引擎切换时重置卡片过滤状态 (同意项3) ──
        function resetCardFilter() {
            searchInput.value = ''; // 清空输入框
            cardItems.forEach(card => card.style.display = 'flex');
            sections.forEach(section => section.style.display = 'block');
        }

        engineTriggerBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            engineWrapper.classList.toggle('open');
        });

        engineOptionItems.forEach(item => {
            item.addEventListener('click', function(e) {
                e.stopPropagation();
                const newEngine = this.dataset.value;
                engineSelector.value = newEngine;
                engineTriggerLabel.textContent = this.textContent.trim();
                engineOptionItems.forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                engineWrapper.classList.remove('open');
                
                // 修改点：切换引擎时若不为site，重置过滤
                if (newEngine !== 'site') {
                    resetCardFilter();
                } else {
                    // 切换回站内时，触发一次过滤以显示当前输入关键词的结果
                    searchInput.dispatchEvent(new Event('input'));
                }
            });
        });

        document.addEventListener('click', () => engineWrapper.classList.remove('open'));

        searchInput.addEventListener('input', function() {
            if (engineSelector.value === 'site') {
                const keyword = this.value.toLowerCase().trim();
                cardItems.forEach(card => {
                    const title = card.querySelector('.card-title').textContent.toLowerCase();
                    card.style.display = title.includes(keyword) ? 'flex' : 'none';
                });
                sections.forEach(section => {
                    const hasVisibleCards = Array.from(section.querySelectorAll('.card-item')).some(c => c.style.display !== 'none');
                    section.style.display = hasVisibleCards ? 'block' : 'none';
                });
            }
        });

        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const type = engineSelector.value;
                const keyword = this.value.trim();
                if (type !== 'site' && keyword !== '') {
                    window.open(engineUrls[type] + encodeURIComponent(keyword), '_blank');
                }
            }
        });

        // ── 修改13：优化图标错误处理，提取单一函数 (同意项4) ──
        function handleIconError(img) {
            img.style.display = 'none';
        }

        function initIcons() {
            document.querySelectorAll('.card-icon img').forEach(img => {
                const domain = img.getAttribute('data-domain');
                if (domain && !img.src) {
                    img.src = `https://favicon.splitbee.io/?url=${domain}`;
                    img.onerror = () => handleIconError(img);
                }
            });
        }
        window.addEventListener('DOMContentLoaded', initIcons);
    </script>
</body>
