    <script src="script.js"></script>
    <script>
    /* ── ✅ 主页独有交互逻辑 ── */
    (function() {
        // 自定义下拉引擎
        const select = document.getElementById('searchEngine');
        const trigger = document.querySelector('.select-trigger');
        const dropdown = document.querySelector('.select-options');
        const options = document.querySelectorAll('.option');
        const label = document.getElementById('currentEngineLabel');
        const btn = document.querySelector('.custom-select');

        trigger.addEventListener('click', function(e) {
            e.stopPropagation();
            const isNowOpen = dropdown.classList.toggle('open');
            btn.classList.toggle('open', isNowOpen);
        });

        options.forEach(opt => {
            opt.addEventListener('click', function(e) {
                e.stopPropagation();
                const val = this.dataset.value;
                select.value = val;
                label.textContent = this.textContent.trim();
                options.forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                dropdown.classList.remove('open');
                btn.classList.remove('open');
                localStorage.setItem('uyea_preferred_search_engine', val);
            });
        });

        document.addEventListener('click', () => {
            dropdown.classList.remove('open');
            btn.classList.remove('open');
        });
    })();
    </script>
