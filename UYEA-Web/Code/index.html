    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ── UYEA Logo：Bebas Neue，加粗，不斜体 ── */
        .logo-text {
            font-family: 'Bebas Neue', sans-serif !important;
            font-style: normal !important;
            font-weight: 900 !important;
            font-size: 26px !important;
            letter-spacing: 1px !important;
            color: var(--primary) !important;
        }
        .logo-sub {
            font-style: normal !important;
        }

        /* ── 卡片图标：无背景、无阴影 ── */
        .card-icon {
            background: transparent !important;
            box-shadow: none !important;
        }
        /* ── favicon图片：更大尺寸、清晰渲染 ── */
        .card-icon img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            image-rendering: -webkit-optimize-contrast;
        }

        /* ── 搜索引擎切换器样式修复 ── */
        .search-engine-select {
            position: relative;
            display: flex;
            align-items: center;
            height: 100%;
        }

        .engine-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 12px;
            height: 100%;
            background: none;
            border: none;
            border-right: 1.5px solid var(--border);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .engine-btn:hover {
            background: var(--bg);
        }

        .engine-btn .arrow {
            font-size: 10px;
            transition: transform 0.3s;
            opacity: 0.6;
        }

        /* 当展开时箭头旋转 */
        .engine-btn.open .arrow {
            transform: rotate(180deg);
        }

        /* 下拉列表基础样式 */
        .engine-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 120px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg);
            padding: 6px;
            display: none; /* 默认隐藏 */
            flex-direction: column;
            gap: 4px;
            z-index: 1000; /* 确保在最顶层 */
            animation: dropdownFade 0.2s ease-out;
        }

        /* 当父级或自身拥有 open 类时显示 */
        .engine-dropdown.open {
            display: flex;
        }

        @keyframes dropdownFade {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .engine-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .engine-option:hover {
            background: var(--primary-light);
            color: var(--primary);
        }

        .engine-option.selected {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 600;
        }

        .engine-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: transparent;
        }

        .engine-option.selected .engine-dot {
            background: var(--primary);
        }
    </style>
</head>

    <script src="script.js"></script>
    <script>
    /* ── 搜索引擎下拉交互逻辑 ── */
    (function() {
        const btn      = document.getElementById('engineBtn');
        const dropdown = document.getElementById('engineDropdown');
        const label    = document.getElementById('engineLabel');
        const select   = document.getElementById('searchEngine');
        const options  = dropdown.querySelectorAll('.engine-option');

        // 切换下拉列表显示/隐藏
        btn.addEventListener('click', function(e) {
            // 阻止冒泡防止立即被document点击事件关闭
            e.stopPropagation(); 
            const isOpen = dropdown.classList.toggle('open');
            btn.classList.toggle('open', isOpen);
        });

        // 选项点击逻辑
        options.forEach(opt => {
            opt.addEventListener('click', function(e) {
                e.stopPropagation();
                const val = this.dataset.value;
                
                // 1. 同步更新隐藏的真实select组件的值
                select.value = val;
                
                // 2. 更新按钮上显示的文字（去除多余空格）
                label.textContent = this.textContent.trim();
                
                // 3. 视觉反馈：更新选中样式
                options.forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                
                // 4. 选择后自动关闭下拉框
                dropdown.classList.remove('open');
                btn.classList.remove('open');
            });
        });

        // 点击页面其他位置时自动收起下拉框
        document.addEventListener('click', function() {
            dropdown.classList.remove('open');
            btn.classList.remove('open');
        });
    })();
    </script>
