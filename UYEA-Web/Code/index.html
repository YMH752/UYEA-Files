<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UYEA | 悠野导航</title>
    
    <meta name="description" content="悠野工作室(UYEA)提供AI智能体导航、在线工具箱和技术社区。">
    <meta name="theme-color" content="#0078d4">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ── 顶栏布局 ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 0 24px;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1.5px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 24px;
            color: var(--primary);
            text-decoration: none;
        }

        .search-container {
            flex: 1;
            display: flex;
            justify-content: center;
            max-width: 600px;
        }

        .header-search-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0 12px;
            height: 40px;
        }

        #searchInput {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            padding: 0 8px;
            font-size: 14px;
        }

        .header-actions { display: flex; align-items: center; gap: 12px; }

        .login-btn {
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            flex-direction: column;
            gap: 5px;
        }
        .menu-toggle span {
            display: block;
            width: 24px;
            height: 3px;
            background: var(--text-primary);
            border-radius: 2px;
        }

        /* 尽请期待卡片 */
        .text-status-card {
            background: var(--surface);
            border: 1.5px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 16px;
            grid-column: 1 / -1;
        }

        /* ✅ 图标样式优化：解决加载失败问题 */
        .card-icon {
            width: 32px;
            height: 32px;
            background: transparent !important;
            box-shadow: none !important;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .card-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 6px;
        }
        .icon-fallback {
            font-size: 20px;
        }

        @media (max-width: 768px) {
            .menu-toggle { display: flex; }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-group">
                <span class="logo-text">UYEA</span>
                <span class="logo-sub">悠野工作室</span>
            </div>
        </div>
        <nav class="nav-menu">
            <div class="nav-item active"><span class="nav-icon">🏠</span><span class="nav-text">全部导航</span></div>
            <a href="tools.html" class="nav-item"><span class="nav-icon">🛠️</span><span class="nav-text">实用工具</span></a>
            <a href="forum.html" class="nav-item"><span class="nav-icon">💬</span><span class="nav-text">悠野社区</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <a href="#" class="header-logo">UYEA</a>
            <div class="search-container">
                <div class="header-search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="搜索你需要的资源...">
                </div>
            </div>
            <div class="header-actions">
                <a href="#" class="login-btn">登录 / 注册</a>
                <button class="menu-toggle" id="hamburgerBtn">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </header>

        <div class="content-wrapper">
            
            <div class="section-header"><h2 class="section-title">每日推荐</h2></div>
            <div class="grid-container" style="margin-bottom: 40px;">
                <div class="text-status-card">☕ 尽请期待</div>
            </div>

            <div class="section-header"><h2 class="section-title">Ai</h2></div>
            <div class="grid-container" style="margin-bottom: 40px;">
                <a href="https://www.deepseek.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://icons.duckduckgo.com/ip3/www.deepseek.com.ico"></div>
                    <div class="card-info"><div class="card-title">DeepSeek</div></div>
                </a>
                <a href="https://chatgpt.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://icons.duckduckgo.com/ip3/chatgpt.com.ico"></div>
                    <div class="card-info"><div class="card-title">ChatGPT</div></div>
                </a>
                <a href="https://claude.ai/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://icons.duckduckgo.com/ip3/claude.ai.ico"></div>
                    <div class="card-info"><div class="card-title">Claude</div></div>
                </a>
                <a href="https://yiyan.baidu.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://icons.duckduckgo.com/ip3/yiyan.baidu.com.ico"></div>
                    <div class="card-info"><div class="card-title">文心一言</div></div>
                </a>
                <a href="https://qianwen.aliyun.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://icons.duckduckgo.com/ip3/qianwen.aliyun.com.ico"></div>
                    <div class="card-info"><div class="card-title">通义千问</div></div>
                </a>
                <a href="https://www.kimi.ai/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://icons.duckduckgo.com/ip3/www.kimi.ai.ico"></div>
                    <div class="card-info"><div class="card-title">Kimi</div></div>
                </a>
                <a href="https://www.doubao.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://icons.duckduckgo.com/ip3/www.doubao.com.ico"></div>
                    <div class="card-info"><div class="card-title">豆包</div></div>
                </a>
                <a href="https://yuanbao.tencent.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://icons.duckduckgo.com/ip3/yuanbao.tencent.com.ico"></div>
                    <div class="card-info"><div class="card-title">腾讯元宝</div></div>
                </a>
                <a href="https://www.perplexity.ai/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://icons.duckduckgo.com/ip3/www.perplexity.ai.ico"></div>
                    <div class="card-info"><div class="card-title">Perplexity</div></div>
                </a>
                <a href="https://grok.com/" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://icons.duckduckgo.com/ip3/grok.com.ico"></div>
                    <div class="card-info"><div class="card-title">Grok</div></div>
                </a>
            </div>

            <div class="section-header"><h2 class="section-title">生活</h2></div>
            <div class="grid-container" style="margin-bottom: 40px;">
                <a href="https://www.xiaohongshu.com" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://icons.duckduckgo.com/ip3/www.xiaohongshu.com.ico"></div>
                    <div class="card-info"><div class="card-title">小红书</div></div>
                </a>
                <a href="https://www.bilibili.com" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://icons.duckduckgo.com/ip3/www.bilibili.com.ico"></div>
                    <div class="card-info"><div class="card-title">Bilibili</div></div>
                </a>
                <a href="https://www.zhihu.com" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://icons.duckduckgo.com/ip3/www.zhihu.com.ico"></div>
                    <div class="card-info"><div class="card-title">知乎</div></div>
                </a>
            </div>

            <div class="section-header"><h2 class="section-title">工具</h2></div>
            <div class="grid-container">
                <a href="https://github.com" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://icons.duckduckgo.com/ip3/github.com.ico"></div>
                    <div class="card-info"><div class="card-title">GitHub</div></div>
                </a>
                <a href="https://tinypng.com" target="_blank" class="card-item">
                    <div class="card-icon"><img src="https://icons.duckduckgo.com/ip3/tinypng.com.ico"></div>
                    <div class="card-info"><div class="card-title">TinyPNG</div></div>
                </a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        /* ✅ 最终降级逻辑：如果API也挂了，显示首字母或占位符 */
        document.querySelectorAll('.card-icon img').forEach(img => {
            img.onerror = function() {
                const parent = this.parentElement;
                this.remove();
                const span = document.createElement('span');
                span.className = 'icon-fallback';
                span.textContent = '🌐'; // 如果API加载失败，统一显示漂亮的地球
                parent.appendChild(span);
            };
        });
    </script>
</body>
</html>
