<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UYEA | 悠野导航</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ── 侧边栏菜单美化逻辑：仅调整尺寸与间距 ── */
        .nav-item {
            display: flex;
            align-items: center;
            /* 调整高度与内边距，让菜单更饱满 */
            padding: 14px 18px; 
            /* 增加外边距，解决空洞感 */
            margin: 8px 12px;   
            border-radius: var(--radius-md);
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        /* 选中态：黑底白字+内阴影 */
        .nav-item.active {
            background: #000000 !important;
            color: #FFFFFF !important;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1) !important;
        }

        /* 展开态：铁锈红 */
        .nav-item.menu-open {
            background: var(--primary) !important;
            color: #FFFFFF !important;
        }

        .arrow-icon {
            font-size: 10px;
            margin-left: auto;
            transition: transform 0.3s;
            opacity: 0.6;
        }

        .nav-item.menu-open .arrow-icon {
            transform: rotate(180deg);
            opacity: 1;
        }

        /* 子菜单：文字加粗副标题感 */
        .sub-menu {
            display: none;
            padding-bottom: 8px;
        }

        .sub-nav-item {
            display: block;
            padding: 12px 16px 12px 58px; 
            font-size: 14px;
            /* 极粗体副标题感 */
            font-weight: 800; 
            color: var(--text-secondary);
            text-decoration: none;
            transition: 0.2s;
        }

        .sub-nav-item:hover {
            color: var(--primary);
            background: rgba(0,0,0,0.03);
        }

        /* 底部按钮：同步工具页黑白配色 */
        .sidebar-footer {
            padding: 24px 16px;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        .auth-buttons {
            display: flex;
            gap: 12px;
        }

        .auth-btn {
            flex: 1;
            height: 44px; 
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-btn {
            background: #FFFFFF;
            border: 1.5px solid #000000;
            color: #000000;
        }

        .register-btn {
            background: #000000;
            border: 1.5px solid #000000;
            color: #FFFFFF;
        }

        /* 保持原有的顶栏及卡片样式不动 */
        .top-bar {
            display: flex; align-items: center; justify-content: center;
            padding: 0 20px; height: var(--header-h); background: var(--surface);
            border-bottom: 1.5px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        .search-container { width: 100%; max-width: 600px; display: flex; justify-content: center; }
        .header-search-wrapper {
            width: 100%; display: flex; align-items: center; background: var(--bg);
            border: 1.5px solid var(--border); border-radius: var(--radius-md); padding: 0 4px 0 0;
            height: 42px; transition: border-color 0.2s;
        }
        .header-actions { position: absolute; right: 20px; }
        .menu-toggle { display: flex; background: none; border: none; cursor: pointer; padding: 8px; flex-direction: column; gap: 5px; }
        .menu-toggle span { display: block; width: 24px; height: 3px; background: var(--text-primary); border-radius: 2px; }
        .card-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .card-icon img { width: 100%; height: 100%; object-fit: contain; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-group">
                <span class="logo-text">UYEA</span>
                <span class="logo-sub">悠野</span>
            </div>
        </div>
        
        <nav class="nav-menu">
            <div class="nav-group">
                <div class="nav-item active nav-dropdown-trigger" id="allNavTrigger">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">全部导航</span>
                    <span class="arrow-icon">▼</span>
                </div>
                <div class="sub-menu" id="subNavMenu">
                    <a href="#ai-section" class="sub-nav-item">Ai</a>
                    <a href="#life-section" class="sub-nav-item">生活</a>
                    <a href="#tool-section" class="sub-nav-item">工具</a>
                </div>
            </div>

            <a href="tools.html" class="nav-item">
                <span class="nav-icon">🛠️</span>
                <span class="nav-text">实用工具</span>
            </a>
            
            <a href="forum.html" class="nav-item">
                <span class="nav-icon">💬</span>
                <span class="nav-text">悠野社区</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="auth-buttons">
                <div class="auth-btn login-btn">登录</div>
                <div class="auth-btn register-btn">注册</div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="search-container">
                <div class="header-search-wrapper">
                    <input type="text" id="searchInput" placeholder="搜索关键词...">
                </div>
            </div>
            <div class="header-actions">
                <button class="menu-toggle" id="hamburgerBtn">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="section-header">
                <h2 class="section-title">每日推荐</h2>
            </div>
            <div class="grid-container" style="margin-bottom: 40px;">
                <div class="text-status-card" style="background: var(--surface); border: 1.5px dashed var(--border); border-radius: var(--radius-md); padding: 40px; text-align: center; color: var(--text-muted); grid-column: 1 / -1;">
                    ☕ 今日暂无更新，休息一下吧
                </div>
            </div>

            <div class="section-group" id="ai-section">
                <div class="section-header">
                    <h2 class="section-title">Ai</h2>
                </div>
                <div class="grid-container" style="margin-bottom: 40px;">
                    <a href="https://www.gemini.google.com/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="gemini.google.com"></div>
                        <div class="card-info"><div class="card-title">Google Gemini</div></div>
                    </a>
                    <a href="https://chatgpt.com/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="chatgpt.com"></div>
                        <div class="card-info"><div class="card-title">ChatGPT</div></div>
                    </a>
                    <a href="https://claude.ai/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="claude.ai"></div>
                        <div class="card-info"><div class="card-title">ClaudeAI</div></div>
                    </a>
                    <a href="https://www.deepseek.com/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="deepseek.com"></div>
                        <div class="card-info"><div class="card-title">DeepSeek</div></div>
                    </a>
                    <a href="https://kimi.moonshot.cn/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="kimi.moonshot.cn"></div>
                        <div class="card-info"><div class="card-title">Kimi</div></div>
                    </a>
                    <a href="https://tongyi.aliyun.com/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="tongyi.aliyun.com"></div>
                        <div class="card-info"><div class="card-title">通义千问</div></div>
                    </a>
                </div>
            </div>

            <div class="section-group" id="life-section">
                <div class="section-header">
                    <h2 class="section-title">生活</h2>
                </div>
                <div class="grid-container" style="margin-bottom: 40px;">
                    <a href="https://www.douban.com/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="douban.com"></div>
                        <div class="card-info"><div class="card-title">豆瓣</div></div>
                    </a>
                    <a href="https://www.xiaohongshu.com/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="xiaohongshu.com"></div>
                        <div class="card-info"><div class="card-title">小红书</div></div>
                    </a>
                </div>
            </div>

            <div class="section-group" id="tool-section">
                <div class="section-header">
                    <h2 class="section-title">工具</h2>
                </div>
                <div class="grid-container">
                    <a href="https://github.com/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="github.com"></div>
                        <div class="card-info"><div class="card-title">GitHub</div></div>
                    </a>
                    <a href="https://stackoverflow.com/" target="_blank" class="card-item">
                        <div class="card-icon"><img src="" data-domain="stackoverflow.com"></div>
                        <div class="card-info"><div class="card-title">StackOverflow</div></div>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // 侧边栏交互逻辑
        const allNavTrigger = document.getElementById('allNavTrigger');
        const subNavMenu = document.getElementById('subNavMenu');
        
        allNavTrigger.addEventListener('click', function() {
            const isOpening = !this.classList.contains('menu-open');
            this.classList.toggle('menu-open', isOpening);
            subNavMenu.style.display = isOpening ? 'block' : 'none';
        });

        // 自动图标逻辑
        function initIcons() {
            document.querySelectorAll('.card-icon img').forEach(img => {
                const domain = img.getAttribute('data-domain');
                if (domain) img.src = `https://favicon.splitbee.io/?url=${domain}`;
            });
        }
        window.addEventListener('DOMContentLoaded', initIcons);
    </script>
</body>
</html>
