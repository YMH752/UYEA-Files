<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UYEA | 悠野导航</title>
    
    <meta name="description" content="悠野工作室(UYEA)提供AI智能体导航、在线工具箱和技术社区。">
    <meta name="theme-color" content="#000000">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ── 顶栏布局 (保持原样) ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1.5px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-logo { display: none; }
        .search-container {
            width: 100%;
            max-width: 600px; 
            display: flex;
            justify-content: center;
        }
        .header-search-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0 4px 0 0;
            height: 42px; 
            transition: border-color 0.2s;
            overflow: visible;
        }
        .header-search-wrapper:focus-within { border-color: var(--secondary); }
        /* ── 下拉引擎样式 (保持原样) ── */
        .engine-dropdown-wrapper { position: relative; flex-shrink: 0; }
        .engine-trigger-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 12px;
            height: 42px;
            background: var(--secondary);
            color: #FFFFFF;
            border: none;
            border-radius: var(--radius-md) 0 0 var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .engine-dropdown-list {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            min-width: 80px; 
            width: 100%; 
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            z-index: 200;
            padding: 0;
            overflow: hidden;
        }
        
        .engine-dropdown-wrapper.open .engine-dropdown-list { display: block; }
        .engine-option-item {
            padding: 10px 12px;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            border-bottom: 1px solid var(--border); 
            transition: background 0.2s;
        }
        .engine-option-item:last-child { border-bottom: none; }
        .engine-option-item:hover { background: var(--bg); }
        .engine-option-item.selected { color: var(--primary); font-weight: 700; }
        #searchInput {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            padding: 0 12px;
            font-size: 15px;
            color: var(--text-primary);
        }
        .header-actions { 
            position: absolute;
            right: 20px;
            display: flex; 
            align-items: center; 
        }
        @media (max-width: 1024px) {
            .top-bar { justify-content: flex-start; padding-left: 50px; }
            .search-container { max-width: none; }
        }
        
        @media (max-width: 768px) {
            .top-bar { padding: 0 12px; justify-content: space-between; }
            .search-container { margin-right: 40px; }
        }
    </style>
</head>
<body>

        </div>

    <!-- ✅ 新增：回到顶部按钮 -->
    <button class="back-to-top" id="backToTopBtn">↑</button>
    
    <script src="script.js"></script>
    <script>
        /* ── 严格保留原有脚本逻辑（首页专属） ── */
        const allNavTrigger = document.getElementById('allNavTrigger');
        const subNavMenu    = document.getElementById('subNavMenu');
        allNavTrigger.addEventListener('click', function() {
            const isHomePage = window.location.pathname.endsWith('index.html') || window.location.pathname === '/' || window.location.pathname.endsWith('/');
            if (isHomePage) {
                const isOpening = !this.classList.contains('menu-open');
                this.classList.toggle('menu-open', isOpening);
                subNavMenu.style.display = isOpening ? 'block' : 'none';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                window.location.href = 'index.html';
            }
        });
        // ✅ 首页站内搜索功能（保留原有逻辑）
        const searchInput      = document.getElementById('searchInput');
        const engineSelector   = document.getElementById('searchEngineSelector');
        const cardItems        = document.querySelectorAll('.card-item');
        const sections         = document.querySelectorAll('.section-group');
        searchInput.addEventListener('input', function() {
            if (engineSelector.value === 'site') {
                const keyword = this.value.toLowerCase().trim();
                cardItems.forEach(card => {
                    const title = card.querySelector('.card-title').textContent.toLowerCase();
                    card.style.display = title.includes(keyword) ? 'flex' : 'none';
                });
                sections.forEach(section => {
                    const hasVisibleCards = Array.from(section.querySelectorAll('.card-item')).some(c => c.style.display !== 'none');
                    section.style.display = hasVisibleCards ? 'block' : 'none';
                });
            }
        });
    </script>
