    <script src="script.js"></script>
    <script>
    /* ── 搜索引擎切换逻辑 ── */
    (function() {
        const btn      = document.getElementById('engineBtn');
        const dropdown = document.getElementById('engineDropdown');
        const label    = document.getElementById('engineLabel');
        const select   = document.getElementById('searchEngine');
        const options  = dropdown.querySelectorAll('.engine-option');

        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            const isNowOpen = dropdown.classList.toggle('open');
            btn.classList.toggle('open', isNowOpen);
        });

        options.forEach(opt => {
            opt.addEventListener('click', function(e) {
                e.stopPropagation();
                const val = this.dataset.value;
                select.value = val;
                label.textContent = this.textContent.trim();
                options.forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                dropdown.classList.remove('open');
                btn.classList.remove('open');
            });
        });

        document.addEventListener('click', () => {
            dropdown.classList.remove('open');
            btn.classList.remove('open');
        });
    })();
    </script>
