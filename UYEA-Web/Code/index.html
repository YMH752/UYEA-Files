<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UYEA | 悠野导航</title>
    
    <meta name="description" content="悠野工作室(UYEA)提供AI智能体导航、在线工具箱和技术社区。">
    <meta name="theme-color" content="#000000">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ── 顶栏布局优化（极简模式） ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1.5px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo { display: none; }

        /* ── 搜索容器 ── */
        .search-container {
            width: 100%;
            max-width: 600px; 
            display: flex;
            justify-content: center;
        }

        .header-search-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0 4px 0 0;
            height: 42px; 
            transition: border-color 0.2s;
            overflow: visible;
        }

        .header-search-wrapper:focus-within { border-color: var(--secondary); }

        /* ── 下拉引擎样式 ── */
        .engine-dropdown-wrapper { position: relative; flex-shrink: 0; }
        .engine-trigger-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 12px;
            height: 42px;
            background: var(--secondary);
            color: #FFFFFF;
            border: none;
            border-radius: var(--radius-md) 0 0 var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .engine-dropdown-list {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            min-width: 80px; 
            width: 100%; 
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            z-index: 200;
            padding: 0;
            overflow: hidden;
        }
        
        .engine-dropdown-wrapper.open .engine-dropdown-list { display: block; }
        .engine-option-item {
            padding: 10px 12px;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            border-bottom: 1px solid var(--border); 
            transition: background 0.2s;
        }
        .engine-option-item:last-child { border-bottom: none; }
        .engine-option-item:hover { background: var(--bg); }
        .engine-option-item.selected { color: var(--primary); font-weight: 700; }

        #searchInput {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            padding: 0 12px;
            font-size: 15px;
            color: var(--text-primary);
        }

        /* ── 右侧操作区 ── */
        .header-actions { 
            position: absolute;
            right: 20px;
            display: flex; 
            align-items: center; 
        }

        .menu-toggle {
            display: none; 
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            flex-direction: column;
            gap: 5px;
        }
        .menu-toggle span {
            display: block;
            width: 24px;
            height: 3px;
            background: var(--text-primary);
            border-radius: 2px;
        }

        /* ── 侧边栏菜单：下拉增强 ── */
        .nav-group {
            display: flex;
            flex-direction: column;
        }

        /* ✅ 全部导航整行容器 */
        .nav-dropdown-trigger {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }

        /* ✅ 小三角动画样式 */
        .arrow-icon {
            font-size: 10px;
            transition: transform 0.3s ease;
            margin-right: 15px;
            opacity: 0.6;
        }
        .nav-item.active .arrow-icon {
            transform: rotate(180deg); /* ✅ 180度翻转 */
        }

        /* ✅ 下拉子项容器 */
        .sub-menu {
            display: none; /* 默认隐藏 */
            background: rgba(0,0,0,0.02);
            padding: 5px 0;
        }
        /* 当父级 active 时显示（可通过 JS 控制此逻辑） */
        .nav-item.open + .sub-menu {
            display: block;
        }

        /* ✅ 子项文字样式：细一点、小一点、缩进 */
        .sub-nav-item {
            display: block;
            padding: 8px 16px 8px 52px; /* 增加左缩进 */
            font-size: 13px; /* ✅ 小一点 */
            font-weight: 400; /* ✅ 细一点 */
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
        }
        .sub-nav-item:hover {
            color: var(--primary);
            background: var(--primary-light);
        }

        /* ── 侧边栏底部按钮 ── */
        .sidebar-footer { padding: 20px 16px; border-top: 1px solid var(--border); margin-top: auto; }
        .auth-buttons { display: flex; gap: 10px; }
        .auth-btn { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px 5px; border-radius: var(--radius-md); font-size: 13px; font-weight: 600; text-decoration: none; transition: all 0.2s; cursor: pointer; }
        .login-btn { background: var(--surface); border: 1.5px solid var(--border); color: var(--text-primary); }
        .register-btn { background: var(--primary); border: 1.5px solid var(--primary); color: #FFFFFF; }

        /* ── 响应式 ── */
        @media (max-width: 1024px) {
            .menu-toggle { display: flex; }
            .top-bar { justify-content: flex-start; padding-left: 50px; }
            .search-container { max-width: none; }
        }
        @media (max-width: 768px) {
            .top-bar { padding: 0 12px; justify-content: space-between; }
            .search-container { margin-right: 40px; }
        }
        .card-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .card-icon img { width: 100%; height: 100%; object-fit: contain; border-radius: 6px; }
    </style>
</head>

    <script src="script.js"></script>
    <script>
        /* ── 下拉导航控制逻辑 ── */
        const allNavTrigger = document.getElementById('allNavTrigger');
        const subNavMenu    = document.getElementById('subNavMenu');

        allNavTrigger.addEventListener('click', function(e) {
            // ✅ 判断是否在首页 (检查路径名或是否有首页特定元素)
            const isHomePage = window.location.pathname.endsWith('index.html') || window.location.pathname === '/' || window.location.pathname.endsWith('/');
            
            if (isHomePage) {
                // 如果在首页：收起/展开下拉菜单
                const isOpen = subNavMenu.style.display === 'block';
                subNavMenu.style.display = isOpen ? 'none' : 'block';
                this.classList.toggle('active', !isOpen);
                
                // 平滑回到顶部
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                // 如果在其他页面：直接跳转回首页
                window.location.href = 'index.html';
            }
        });

        // ✅ 点击子项锚点平滑滚动
        document.querySelectorAll('.sub-nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                const targetId = this.getAttribute('href').substring(1);
                const targetEl = document.getElementById(targetId);
                if (targetEl) {
                    targetEl.scrollIntoView({ behavior: 'smooth' });
                    // 如果在手机端，点击后自动关闭侧边栏（可选，调用 script.js 中的 toggle）
                    if (window.innerWidth <= 1024) {
                        document.getElementById('sidebar').classList.remove('active');
                        document.getElementById('sidebarOverlay').classList.remove('active');
                    }
                }
            });
        });

        /* ── 原有搜索及引擎逻辑 ── */
        const searchInput      = document.getElementById('searchInput');
        const engineSelector   = document.getElementById('searchEngineSelector');
        const engineWrapper    = document.getElementById('engineDropdownWrapper');
        const engineTriggerBtn = document.getElementById('engineTriggerBtn');
        const engineTriggerLabel = document.getElementById('engineTriggerLabel');
        const engineOptionItems  = document.querySelectorAll('.engine-option-item');
        const cardItems        = document.querySelectorAll('.card-item');
        const sections         = document.querySelectorAll('.section-group');

        const engineUrls = {
            baidu:  "https://www.baidu.com/s?wd=",
            google: "https://www.google.com/search?q=",
            bing:   "https://cn.bing.com/search?q="
        };

        engineTriggerBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            engineWrapper.classList.toggle('open');
        });

        engineOptionItems.forEach(item => {
            item.addEventListener('click', function(e) {
                e.stopPropagation();
                engineSelector.value = this.dataset.value;
                engineTriggerLabel.textContent = this.textContent.trim();
                engineOptionItems.forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                engineWrapper.classList.remove('open');
                if (engineSelector.value === 'site') searchInput.dispatchEvent(new Event('input'));
            });
        });

        document.addEventListener('click', () => engineWrapper.classList.remove('open'));

        searchInput.addEventListener('input', function() {
            if (engineSelector.value === 'site') {
                const keyword = this.value.toLowerCase().trim();
                cardItems.forEach(card => {
                    const title = card.querySelector('.card-title').textContent.toLowerCase();
                    card.style.display = title.includes(keyword) ? 'flex' : 'none';
                });
                sections.forEach(section => {
                    const hasVisibleCards = Array.from(section.querySelectorAll('.card-item')).some(c => c.style.display !== 'none');
                    section.style.display = hasVisibleCards ? 'block' : 'none';
                });
            }
        });

        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const type = engineSelector.value;
                const keyword = this.value.trim();
                if (type !== 'site' && keyword !== '') {
                    window.open(engineUrls[type] + encodeURIComponent(keyword), '_blank');
                }
            }
        });

        function initIcons() {
            document.querySelectorAll('.card-icon img').forEach(img => {
                const domain = img.getAttribute('data-domain');
                if (domain && !img.src) {
                    img.src = `https://favicon.splitbee.io/?url=${domain}`;
                    img.onerror = () => { img.style.display='none'; }; 
                }
            });
        }
        window.addEventListener('DOMContentLoaded', initIcons);
    </script>
