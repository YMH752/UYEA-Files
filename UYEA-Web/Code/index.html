    <!-- ✅ 日历内联脚本（使用内置精确农历表） -->
    <script>
        (function() {
            // 日历全局变量
            let currentCalendarYear = 2026;
            let currentCalendarMonth = 1;
            let selectedDate = new Date(2026, 0, 1);
            let isAnimating = false;
            let touchStartY = 0;
            let touchEndY = 0;
            let holidayData = {};
            let fetchLock = false;

            // ✅ 内置精确农历数据：每年 [正月初一公历Date对象, 每月天数数组(12个月)]
            const LUNAR_DATA = {
                2026: [new Date(2026, 1, 17), [30, 29, 30, 29, 30, 29, 30, 29, 30, 29, 30, 30]],
                2027: [new Date(2027, 1, 5),  [30, 30, 29, 30, 29, 30, 29, 30, 29, 30, 29, 30]],
                2028: [new Date(2028, 0, 26), [30, 30, 30, 29, 30, 29, 30, 29, 30, 29, 30, 29]]  // 预备
            };

            const LUNAR_DAYS = [
                '初一', '初二', '初三', '初四', '初五', '初六', '初七', '初八', '初九', '初十',
                '十一', '十二', '十三', '十四', '十五', '十六', '十七', '十八', '十九', '二十',
                '廿一', '廿二', '廿三', '廿四', '廿五', '廿六', '廿七', '廿八', '廿九', '三十'
            ];

            // 修改位置：添加API获取节假日函数
            async function fetchHolidaysByYear(year) {
                try {
                    const response = await fetch(`https://www.mxnzp.com/api/holiday/list?year=${year}`);
                    const result = await response.json();
                    if (result.code === 0 && result.data) {
                        const holidays = {};
                        result.data.forEach(holiday => {
                            const dateKey = holiday.chineseDate;
                            if (!holidays[dateKey]) {
                                holidays[dateKey] = [];
                            }
                            holidays[dateKey].push({
                                name: holiday.name,
                                isRest: holiday.isRest === 1
                            });
                        });
                        return holidays;
                    }
                } catch (error) {
                    console.warn('节假日API获取失败，使用空数据');
                }
                return {};
            }

            async function initializeHolidayData() {
                const skeleton = document.getElementById('calendarSkeleton');
                const grid = document.getElementById('calendarGrid');
                if (skeleton) skeleton.classList.remove('hidden');
                if (grid) grid.style.display = 'none';

                holidayData = await fetchHolidaysByYear(currentCalendarYear);
                renderCalendar(currentCalendarYear, currentCalendarMonth);
                renderHolidayBar(currentCalendarYear, currentCalendarMonth);

                if (skeleton) skeleton.classList.add('hidden');
                if (grid) grid.style.display = 'grid';
            }

            // ✅ 精确农历转换（内置表，无依赖）
            function solarToLunar(year, month, day) {
                const info = LUNAR_DATA[year];
                if (info) {
                    const baseDate = info[0];
                    const monthDays = info[1];
                    const targetDate = new Date(year, month - 1, day);
                    const diffDays = Math.round((targetDate - baseDate) / (1000 * 60 * 60 * 24));
                    if (diffDays >= 0) {
                        let remaining = diffDays;
                        for (let m = 0; m < 12; m++) {
                            if (remaining < monthDays[m]) {
                                return LUNAR_DAYS[remaining]; // remaining 是 0-index 的天数
                            }
                            remaining -= monthDays[m];
                        }
                        // 如果超出当年，顺延到下一年（可能用于12月底跨年）
                    } else {
                        // 日期在当年正月初一之前，属于上一农历年
                        // 尝试查找上一年的数据
                        const prevYearInfo = LUNAR_DATA[year - 1];
                        if (prevYearInfo) {
                            const prevBase = prevYearInfo[0];
                            const prevMonthDays = prevYearInfo[1];
                            const prevDiff = Math.round((targetDate - prevBase) / (1000 * 60 * 60 * 24));
                            if (prevDiff >= 0) {
                                let remaining = prevDiff;
                                for (let m = 0; m < 12; m++) {
                                    if (remaining < prevMonthDays[m]) {
                                        return LUNAR_DAYS[remaining];
                                    }
                                    remaining -= prevMonthDays[m];
                                }
                            }
                        }
                    }
                }
                // 回退：使用简单线性估算（极少执行）
                const baseDate = new Date(2026, 1, 17);
                const targetDate = new Date(year, month - 1, day);
                const diffDays = Math.round((targetDate - baseDate) / (1000 * 60 * 60 * 24));
                let lunarDay = ((diffDays % 30) + 30) % 30;
                return LUNAR_DAYS[lunarDay];
            }

            function renderCalendar(year, month) {
                const firstDay = new Date(year, month - 1, 1).getDay();
                const daysInMonth = new Date(year, month, 0).getDate();
                const daysInPrevMonth = new Date(year, month - 1, 0).getDate();
                const grid = document.getElementById('calendarGrid');
                if (!grid) return;
                grid.innerHTML = '';

                // 上个月日期
                for (let i = firstDay - 1; i >= 0; i--) {
                    const cell = document.createElement('div');
                    cell.className = 'calendar-cell other-month';
                    cell.innerHTML = `<div class="cell-solar">${daysInPrevMonth - i}</div>`;
                    grid.appendChild(cell);
                }

                // 当月日期
                const today = new Date();
                for (let day = 1; day <= daysInMonth; day++) {
                    const cell = document.createElement('div');
                    cell.className = 'calendar-cell';
                    const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const isToday = today.getFullYear() === year && today.getMonth() === month - 1 && today.getDate() === day;
                    if (isToday) cell.classList.add('today');

                    let cellHTML = `<div class="cell-solar">${day}</div>`;

                    const holidays = holidayData[dateStr];
                    if (holidays && holidays.length > 0) {
                        const firstHoliday = holidays[0];
                        if (firstHoliday.isRest && !isFirstDayOfHoliday(dateStr, holidays)) {
                            cellHTML += `<div class="cell-rest">休</div>`;
                        } else {
                            cellHTML += `<div class="cell-holiday">${firstHoliday.name}</div>`;
                        }
                    }

                    const lunarStr = solarToLunar(year, month, day);
                    if (lunarStr) {
                        cellHTML += `<div class="cell-lunar">${lunarStr}</div>`;
                    }

                    cell.innerHTML = cellHTML;
                    cell.addEventListener('click', () => {
                        const alreadySelected = cell.classList.contains('selected');
                        document.querySelectorAll('.calendar-cell.selected').forEach(c => c.classList.remove('selected'));
                        if (!alreadySelected && !cell.classList.contains('other-month')) {
                            cell.classList.add('selected');
                            selectedDate = new Date(year, month - 1, day);
                        }
                    });
                    grid.appendChild(cell);
                }

                // 下个月日期
                const totalCells = grid.children.length;
                const remainingCells = 42 - totalCells;
                for (let day = 1; day <= remainingCells; day++) {
                    const cell = document.createElement('div');
                    cell.className = 'calendar-cell other-month';
                    cell.innerHTML = `<div class="cell-solar">${day}</div>`;
                    grid.appendChild(cell);
                }

                const calendarTitle = document.getElementById('calendarTitle');
                if (calendarTitle) {
                    calendarTitle.textContent = `${year}年${month}月`;
                }
            }

            function isFirstDayOfHoliday(dateStr, holidays) {
                const [year, month, day] = dateStr.split('-').map(Number);
                let prevYear = year, prevMonth = month, prevDay = day - 1;
                if (prevDay < 1) {
                    prevMonth -= 1;
                    if (prevMonth < 1) { prevMonth = 12; prevYear -= 1; }
                    prevDay = new Date(prevYear, prevMonth, 0).getDate();
                }
                const prevDateStr = `${prevYear}-${String(prevMonth).padStart(2, '0')}-${String(prevDay).padStart(2, '0')}`;
                const prevHolidays = holidayData[prevDateStr];
                if (!prevHolidays) return true;
                return !prevHolidays.some(h => h.name === holidays[0].name);
            }

            function renderHolidayBar(year, month) {
                const holidayBar = document.getElementById('holidayBar');
                if (!holidayBar) return;
                holidayBar.innerHTML = '';
                const daysInMonth = new Date(year, month, 0).getDate();
                const addedNames = new Set();
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const holidays = holidayData[dateStr];
                    if (holidays && holidays.length > 0) {
                        const h = holidays[0];
                        if (!addedNames.has(h.name)) {
                            addedNames.add(h.name);
                            const tag = document.createElement('div');
                            tag.className = 'holiday-tag';
                            tag.textContent = `${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')} ${h.name}${h.isRest ? ' · 休' : ''}`;
                            holidayBar.appendChild(tag);
                        }
                    }
                }
                if (addedNames.size === 0) holidayBar.classList.add('empty');
                else holidayBar.classList.remove('empty');
            }

            const clockDisplay = document.getElementById('clockDisplay');
            if (clockDisplay) clockDisplay.style.display = 'flex';

            const changeMonth = (delta) => {
                if (isAnimating) return;
                isAnimating = true;
                const grid = document.getElementById('calendarGrid');
                if (grid) {
                    grid.style.transition = 'all 0.2s ease-out';
                    grid.style.opacity = '0';
                    grid.style.transform = `translateY(${delta > 0 ? '-20px' : '20px'})`;
                }
                setTimeout(() => {
                    currentCalendarMonth += delta;
                    if (currentCalendarMonth > 12) {
                        currentCalendarMonth = 1;
                        currentCalendarYear++;
                    } else if (currentCalendarMonth < 1) {
                        currentCalendarMonth = 12;
                        currentCalendarYear--;
                    }
                    (async () => {
                        if (fetchLock) return;
                        fetchLock = true;
                        try {
                            holidayData = await fetchHolidaysByYear(currentCalendarYear);
                            renderCalendar(currentCalendarYear, currentCalendarMonth);
                            renderHolidayBar(currentCalendarYear, currentCalendarMonth);
                        } finally {
                            fetchLock = false;
                        }
                    })();
                    if (grid) {
                        grid.style.transition = 'none';
                        grid.style.transform = `translateY(${delta > 0 ? '20px' : '-20px'})`;
                        requestAnimationFrame(() => {
                            grid.style.transition = 'all 0.2s ease-out';
                            grid.style.opacity = '1';
                            grid.style.transform = 'translateY(0)';
                            setTimeout(() => { isAnimating = false; }, 200);
                        });
                    } else {
                        isAnimating = false;
                    }
                    const skeleton = document.getElementById('calendarSkeleton');
                    if (skeleton) skeleton.classList.add('hidden');
                }, 200);
            };

            document.getElementById('prevMonth').addEventListener('click', () => changeMonth(-1));
            document.getElementById('nextMonth').addEventListener('click', () => changeMonth(1));

            // 触摸滑动
            const calendarContainer = document.querySelector('.calendar-container');
            if (calendarContainer) {
                calendarContainer.addEventListener('touchstart', (e) => {
                    touchStartY = e.changedTouches[0].screenY;
                }, {passive: true});
                calendarContainer.addEventListener('touchend', (e) => {
                    touchEndY = e.changedTouches[0].screenY;
                    const diff = touchStartY - touchEndY;
                    if (Math.abs(diff) > 50) changeMonth(diff > 0 ? 1 : -1);
                }, {passive: true});
            }

            // 模态框
            const modalOverlay = document.getElementById('modalOverlay');
            const modalJump = document.getElementById('modalJump');
            function openModal() {
                if (modalOverlay) modalOverlay.classList.add('show');
                if (modalJump) modalJump.classList.add('show');
            }
            function closeModal() {
                if (modalOverlay) modalOverlay.classList.remove('show');
                if (modalJump) modalJump.classList.remove('show');
            }
            document.getElementById('jumpBtnHeader').addEventListener('click', openModal);
            document.getElementById('modalCancel').addEventListener('click', closeModal);
            document.getElementById('modalConfirm').addEventListener('click', () => {
                const type = document.querySelector('input[name="calendarType"]:checked').value;
                const y = parseInt(document.getElementById('jumpYear').value, 10);
                const m = parseInt(document.getElementById('jumpMonth').value, 10);
                const d = parseInt(document.getElementById('jumpDay').value, 10);
                if (!y || !m || !d) { alert('请输入完整的年月日'); return; }
                let targetYear = y, targetMonth = m, targetDay = d;
                if (type === 'lunar') {
                    // 使用内置数据反向查找
                    const info = LUNAR_DATA[y];
                    if (!info) { alert('暂不支持该年份的农历跳转'); return; }
                    const base = info[0];
                    const monthDays = info[1];
                    let offset = -1;
                    for (let i = 0; i < m - 1; i++) offset += monthDays[i];
                    offset += d;
                    const targetDate = new Date(base.getTime() + offset * 24 * 60 * 60 * 1000);
                    targetYear = targetDate.getFullYear();
                    targetMonth = targetDate.getMonth() + 1;
                    targetDay = targetDate.getDate();
                }
                const maxDay = new Date(targetYear, targetMonth, 0).getDate();
                if (targetDay < 1 || targetDay > maxDay) { alert(`${targetMonth}月最多有${maxDay}天`); return; }
                currentCalendarYear = targetYear;
                currentCalendarMonth = targetMonth;
                selectedDate = new Date(targetYear, targetMonth - 1, targetDay);
                (async () => {
                    if (fetchLock) return;
                    fetchLock = true;
                    try {
                        holidayData = await fetchHolidaysByYear(currentCalendarYear);
                        renderCalendar(currentCalendarYear, currentCalendarMonth);
                        renderHolidayBar(currentCalendarYear, currentCalendarMonth);
                    } finally {
                        fetchLock = false;
                        const skeleton = document.getElementById('calendarSkeleton');
                        if (skeleton) skeleton.classList.add('hidden');
                    }
                })();
                setTimeout(() => {
                    document.querySelectorAll('.calendar-cell').forEach(cell => {
                        const solarEl = cell.querySelector('.cell-solar');
                        if (solarEl && parseInt(solarEl.textContent) === targetDay && !cell.classList.contains('other-month')) {
                            document.querySelectorAll('.calendar-cell.selected').forEach(el => el.classList.remove('selected'));
                            cell.classList.add('selected');
                        }
                    });
                }, 50);
                closeModal();
            });
            if (modalOverlay) modalOverlay.addEventListener('click', closeModal);

            // 初始化
            initializeHolidayData();
        })();
    </script>
</body>
</html>
