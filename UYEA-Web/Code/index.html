<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UYEA | 悠野导航</title>
    
    <meta name="description" content="悠野工作室(UYEA)提供AI智能体导航、在线工具箱和技术社区。">
    <meta name="theme-color" content="#000000">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1.5px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo { display: none; }

        .search-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            align-items: center;
            background: var(--bg);
            border-radius: var(--radius-md);
            padding: 4px 8px;
            border: 1.5px solid var(--border);
            transition: border-color var(--duration);
        }

        .search-container:focus-within {
            border-color: var(--secondary);
        }

        .engine-selector {
            background: none;
            border: none;
            padding: 8px;
            font-weight: 700;
            color: var(--secondary);
            cursor: pointer;
            outline: none;
            font-family: inherit;
        }

        .search-input {
            flex: 1;
            background: none;
            border: none;
            padding: 10px 12px;
            font-size: 15px;
            outline: none;
            color: var(--text-primary);
            font-family: inherit;
        }

        .menu-toggle {
            display: none;
            position: absolute;
            right: 20px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            flex-direction: column;
            gap: 5px;
            z-index: 1001;
        }

        .menu-toggle span {
            display: block;
            width: 24px;
            height: 3px;
            background: var(--secondary);
            border-radius: 2px;
            transition: 0.3s;
        }

        .sidebar {
            width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1.5px solid var(--border);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: transform var(--duration);
        }

        /* ✅ 严格同步工具页：登录按钮位置 */
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px 10px 24px; 
            border-bottom: none;
        }

        .logo-text {
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: var(--secondary);
            letter-spacing: -1px;
            text-decoration: none;
        }

        .login-btn {
            background: var(--secondary);
            color: #FFFFFF;
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: opacity var(--duration);
        }

        .sidebar-nav {
            flex: 1;
            padding: 10px 16px; 
            overflow-y: auto;
        }

        .nav-group { margin-bottom: 24px; }
        
        .nav-label {
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 12px 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            transition: all var(--duration);
            margin-bottom: 4px;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--primary-light);
            color: var(--primary);
        }

        .arrow-icon {
            font-size: 12px;
            transition: transform 0.3s;
            opacity: 0.5;
        }
        .nav-item.active .arrow-icon {
            transform: rotate(180deg);
            opacity: 1;
        }

        .main-content {
            margin-left: var(--sidebar-w);
            padding: 40px;
            max-width: 1400px;
        }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 24px; }
            .menu-toggle { display: flex; }
        }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="#" class="logo-text">UYEA.</a>
            <a href="login.html" class="login-btn">登录</a>
        </div>
        
        <nav class="sidebar-nav">
            <div class="nav-group">
                <div class="nav-label">主要导航</div>
                <div class="nav-item active" data-section="ai-tools">
                    <span>🤖 AI 智能体</span>
                    <span class="arrow-icon">▼</span>
                </div>
                <div class="nav-item" data-section="life-tech">
                    <span>🌱 生活 & 技术</span>
                    <span class="arrow-icon">▼</span>
                </div>
                <div class="nav-item" data-section="useful-tools">
                    <span>🛠️ 常用工具</span>
                    <span class="arrow-icon">▼</span>
                </div>
            </div>

            <div class="nav-group">
                <div class="nav-label">更多服务</div>
                <a href="tools.html" class="nav-item">
                    <span>🧰 实用工具箱</span>
                </a>
                <a href="forum.html" class="nav-item">
                    <span>💬 悠野社区</span>
                </a>
            </div>
        </nav>
    </aside>

    <header class="top-bar">
        <div class="search-container">
            <select class="engine-selector" id="engineSelector">
                <option value="baidu">百度</option>
                <option value="google">谷歌</option>
                <option value="bing">必应</option>
                <option value="site">站内</option>
            </select>
            <input type="text" class="search-input" id="searchInput" placeholder="搜索资源或发起网页搜索...">
        </div>
        <button class="menu-toggle" id="hamburgerBtn">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <main class="main-content">
        <section class="section-container" id="ai-tools">
            <div class="section-header">
                <h2 class="section-title">Ai</h2>
            </div>
            <div class="grid-container">
                <a href="https://www.gemini.google.com/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="gemini.google.com"></div><div class="card-title">Google Gemini</div></a>
                <a href="https://chatgpt.com/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="chatgpt.com"></div><div class="card-title">ChatGPT</div></a>
                <a href="https://claude.ai/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="claude.ai"></div><div class="card-title">Claude</div></a>
                <a href="https://www.deepseek.com/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="deepseek.com"></div><div class="card-title">DeepSeek</div></a>
                <a href="https://yiyan.baidu.com/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="yiyan.baidu.com"></div><div class="card-title">文心一言</div></a>
                <a href="https://www.qianwen.aliyun.com/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="qianwen.aliyun.com"></div><div class="card-title">通义千问</div></a>
                <a href="https://www.kimi.ai/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="kimi.ai"></div><div class="card-title">Kimi</div></a>
                <a href="https://www.doubao.com/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="doubao.com"></div><div class="card-title">豆包</div></a>
                <a href="https://yuanbao.tencent.com/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="yuanbao.tencent.com"></div><div class="card-title">腾讯元宝</div></a>
                <a href="https://www.perplexity.ai/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="perplexity.ai"></div><div class="card-title">Perplexity</div></a>
                <a href="https://grok.com/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="grok.com"></div><div class="card-title">Grok</div></a>
                <a href="https://copilot.cloud.microsoft/" target="_blank" class="card-item"><div class="card-icon"><img data-domain="copilot.cloud.microsoft"></div><div class="card-title">Microsoft Copilot</div></a>
            </div>
        </section>

        <section class="section-container" id="life-tech" style="margin-top: 50px;">
            <div class="section-header">
                <h2 class="section-title">生活</h2>
            </div>
            <div class="grid-container">
                <a href="https://www.xiaohongshu.com" target="_blank" class="card-item"><div class="card-icon"><img data-domain="xiaohongshu.com"></div><div class="card-title">小红书</div></a>
                <a href="https://www.bilibili.com" target="_blank" class="card-item"><div class="card-icon"><img data-domain="bilibili.com"></div><div class="card-title">Bilibili</div></a>
                <a href="https://www.zhihu.com" target="_blank" class="card-item"><div class="card-icon"><img data-domain="zhihu.com"></div><div class="card-title">知乎</div></a>
            </div>
        </section>

        <section class="section-container" id="useful-tools" style="margin-top: 50px;">
            <div class="section-header">
                <h2 class="section-title">工具</h2>
            </div>
            <div class="grid-container">
                <a href="https://github.com" target="_blank" class="card-item"><div class="card-icon"><img data-domain="github.com"></div><div class="card-title">GitHub</div></a>
                <a href="https://tinypng.com" target="_blank" class="card-item"><div class="card-icon"><img data-domain="tinypng.com"></div><div class="card-title">TinyPNG</div></a>
                <a href="https://v0.dev" target="_blank" class="card-item"><div class="card-icon"><img data-domain="v0.dev"></div><div class="card-title">v0.dev</div></a>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
    <script>
        const engineSelector = document.getElementById('engineSelector');
        const searchInput = document.getElementById('searchInput');
        const cardItems = document.querySelectorAll('.card-item');
        const sections = document.querySelectorAll('.section-container');
        const engineUrls = { baidu: 'https://www.baidu.com/s?wd=', google: 'https://www.google.com/search?q=', bing: 'https://cn.bing.com/search?q=' };

        searchInput.addEventListener('input', function() {
            if (engineSelector.value === 'site') {
                const keyword = this.value.toLowerCase().trim();
                cardItems.forEach(card => {
                    const title = card.querySelector('.card-title').textContent.toLowerCase();
                    card.style.display = title.includes(keyword) ? 'flex' : 'none';
                });
                sections.forEach(section => {
                    const hasVisibleCards = Array.from(section.querySelectorAll('.card-item')).some(c => c.style.display !== 'none');
                    section.style.display = hasVisibleCards ? 'block' : 'none';
                });
            }
        });

        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const type = engineSelector.value;
                const keyword = this.value.trim();
                if (type !== 'site' && keyword !== '') window.open(engineUrls[type] + encodeURIComponent(keyword), '_blank');
            }
        });

        function initIcons() {
            document.querySelectorAll('.card-icon img').forEach(img => {
                const domain = img.getAttribute('data-domain');
                if (domain) img.src = `https://favicon.splitbee.io/?url=${domain}`;
            });
        }
        window.addEventListener('DOMContentLoaded', initIcons);
    </script>
</body>
</html>
