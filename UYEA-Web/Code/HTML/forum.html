<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>论坛测试</title>
</head>

<body>

<h1>论坛测试页面</h1>

<div id="postList">加载中...</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

    alert("① JS开始运行");

    try {
        const resp = await fetch('/Data/JSON/posts.json');
        alert("② fetch成功");

        const text = await resp.text();
        alert("③ 拿到原始数据");

        console.log("原始内容：", text);

        const posts = JSON.parse(text);
        alert("④ JSON解析成功");

        console.log("解析后数据：", posts);

        const postList = document.getElementById('postList');
        postList.innerHTML = "成功加载：" + posts.length + " 条数据";

    } catch (e) {
        alert("❌ 出错了");
        console.error(e);
    }

});
</script>

</body>
</html>
