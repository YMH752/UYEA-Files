<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>悠野社区 | UYEA</title>

    <link rel="stylesheet" href="/Code/CSS/style.css">
</head>

<body>

    <header class="top-header">
        <div class="header-container">
            <div class="logo-section">
                <a href="index.html" class="logo-text">UYEA</a>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="content-wrapper">

            <div class="section-header">
                <h1 class="section-title">悠野社区</h1>
            </div>

            <div class="forum-toolbar">
                <button class="post-btn">＋ 发布新帖子</button>

                <div class="forum-search">
                    <span>🔍</span>
                    <input type="text" id="forumSearchInput" placeholder="搜索帖子...">
                </div>
            </div>

            <div class="post-list" id="postList"></div>

            <div class="no-results" id="noResults">
                <div>🔍 未找到匹配的帖子</div>
            </div>

        </div>
    </main>

    <script>
    document.addEventListener("DOMContentLoaded", async () => {

        console.log("论坛页面已加载");

        try {
            const resp = await fetch('/Data/JSON/posts.json');
            const posts = await resp.json();

            console.log("获取到数据：", posts);

            const postList = document.getElementById('postList');
            const noResults = document.getElementById('noResults');

            // ===== 渲染帖子 =====
            postList.innerHTML = posts.map(post => `
                <a href="${post.url}" class="post-item">
                    <div class="post-meta">
                        <span class="post-tag">${post.tag}</span>
                        <span>• ${post.author}</span>
                        <span>• ${post.time}</span>
                    </div>
                    <div class="post-title">${post.title}</div>
                    <div class="post-excerpt">${post.excerpt}</div>
                </a>
            `).join('');

            // 默认隐藏“无结果”
            noResults.style.display = "none";

            // ===== 搜索功能 =====
            const input = document.getElementById('forumSearchInput');

            input.addEventListener('input', function () {

                const keyword = this.value.toLowerCase().trim();
                const items = postList.querySelectorAll('.post-item');

                let hasVisible = false;

                items.forEach(post => {
                    const title = post.querySelector('.post-title').textContent.toLowerCase();
                    const excerpt = post.querySelector('.post-excerpt').textContent.toLowerCase();

                    const match = title.includes(keyword) || excerpt.includes(keyword);

                    post.style.display = match ? "block" : "none";

                    if (match) hasVisible = true;
                });

                noResults.style.display = hasVisible ? "none" : "block";
            });

        } catch (e) {
            console.error("加载失败：", e);
        }

    });
    </script>

</body>
</html>
