<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>悠野社区 | UYEA</title>
    <link rel="stylesheet" href="/Code/CSS/style.css?v=0.0.1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body data-lang="zh-CN">
    <header class="top-header">
        <div class="header-container">
            <a href="index.html" class="logo-text">UYEA</a>
            <div class="header-right">
                <div class="lang-selector" id="langSelector">
                    <div class="lang-highlight" id="langHighlight"></div>
                    <button class="lang-btn active" data-lang="zh-CN">中文</button>
                    <button class="lang-btn" data-lang="zh-TW">繁中</button>
                    <button class="lang-btn" data-lang="en">English</button>
                </div>
                <button class="menu-toggle" id="menuToggleBtn"><span></span><span></span><span></span></button>
            </div>
        </div>
    </header>
    <div class="dropdown-menu" id="dropdownMenu">
        <nav class="menu-nav">
            <a href="index.html" class="menu-item" data-i18n="nav.home">网站导航</a>
            <div class="menu-divider"></div>
            <a href="tools.html" class="menu-item" data-i18n="nav.tools">线上工具</a>
            <div class="menu-divider"></div>
            <a href="forum.html" class="menu-item active" data-i18n="nav.forum">悠野社区</a>
        </nav>
        <div class="menu-auth-section"><button class="register-btn" onclick="alert('注册功能开发中...')"><span data-i18n="btn.register">注册</span></button></div>
    </div>

    <main class="main-content">
        <div class="content-wrapper">
            <div class="section-header"><h1 class="section-title" data-i18n="nav.forum">悠野社区</h1></div>
            <div class="forum-toolbar">
                <button class="post-btn" onclick="alert('发帖功能开发中...')">＋ 发布新帖子</button>
                <div class="forum-search">
                    <span>🔍</span>
                    <input type="text" id="forumSearchInput" placeholder="搜索帖子、话题或用户...">
                </div>
            </div>
            <div class="post-list" id="postList"></div>
            <div class="no-results" id="noResults">
                <div class="no-results-icon">🔍</div>
                <div class="no-results-text">未找到匹配的帖子</div>
            </div>
        </div>
    </main>
    <script src="JS/script.js" defer></script>
    <script>
        async function loadPosts(){
            const list = document.getElementById('postList');
            try{
                const res = await fetch('/Data/JSON/posts.json');
                if(!res.ok) throw new Error('Network response was not ok');
                const posts = await res.json();
                list.innerHTML = posts.map(p => `
                    <a href="${p.url}" class="post-item">
                        <div class="post-meta">
                            <span class="post-tag">${p.tag}</span>
                            <span>• ${p.author}</span>
                            <span>• ${p.time}</span>
                        </div>
                        <div class="post-title">${p.title}</div>
                        <div class="post-excerpt">${p.excerpt}</div>
                    </a>
                `).join('');

                document.getElementById('forumSearchInput').addEventListener('input', function(){
                    const kw = this.value.toLowerCase().trim();
                    let visible = false;
                    list.querySelectorAll('.post-item').forEach(item => {
                        const title = item.querySelector('.post-title').textContent.toLowerCase();
                        const excerpt = item.querySelector('.post-excerpt').textContent.toLowerCase();
                        const show = title.includes(kw) || excerpt.includes(kw);
                        item.style.display = show ? 'block' : 'none';
                        if(show) visible = true;
                    });
                    document.getElementById('noResults').classList.toggle('show', !visible);
                });
            }catch(e){
                list.innerHTML = '<div class="no-results show"><div class="no-results-icon">⚠️</div><div class="no-results-text">帖子加载失败，请检查网络或文件路径</div></div>';
            }
        }
        loadPosts();
    </script>
</body>
</html>
