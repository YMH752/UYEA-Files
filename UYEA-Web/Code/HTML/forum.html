<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>悠野社区 | UYEA | 悠野导航</title>
    <meta name="description" content="悠野社区 - 分享想法、互帮互助、共同成长的技术社区平台。">
    <meta name="theme-color" content="#000000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://raw.githubusercontent.com">
    <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Outfit:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Outfit:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"></noscript>
    <link rel="stylesheet" href="/Code/CSS/style.css">
</head>
<body data-lang="zh-CN">
    <header class="top-header">
        <div class="header-container">
            <div class="logo-section">
                <a href="index.html" class="logo-text">UYEA</a>
            </div>
            <div class="header-right">
                <div class="lang-selector" id="langSelector">
                    <div class="lang-highlight" id="langHighlight"></div>
                    <button class="lang-btn active" data-lang="zh-CN">中文</button>
                    <button class="lang-btn" data-lang="zh-TW">繁中</button>
                    <button class="lang-btn" data-lang="en">English</button>
                </div>
                <button class="menu-toggle" id="menuToggleBtn">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <div class="dropdown-menu" id="dropdownMenu">
        <nav class="menu-nav">
            <a href="index.html" class="menu-item" data-i18n="nav.home">网站导航</a>
            <div class="menu-divider"></div>
            <a href="tools.html" class="menu-item" data-i18n="nav.tools">线上工具</a>
            <div class="menu-divider"></div>
            <a href="forum.html" class="menu-item active" data-i18n="nav.forum">悠野社区</a>
        </nav>
        <div class="menu-auth-section">
            <button class="register-btn" onclick="alert('注册功能开发中...')"><span data-i18n="btn.register">注册</span></button>
        </div>
    </div>

    <main class="main-content">
        <div class="content-wrapper">
            <div class="section-header">
                <h1 class="section-title" data-i18n="nav.forum">悠野社区</h1>
            </div>
            <div class="forum-toolbar">
                <button class="post-btn" onclick="alert('发帖功能开发中...')">＋ 发布新帖子</button>
                <div class="forum-search">
                    <span>🔍</span>
                    <input type="text" id="forumSearchInput" placeholder="搜索帖子、话题或用户...">
                </div>
            </div>
            <div class="post-list" id="postList"></div>
            <div class="no-results" id="noResults">
                <div class="no-results-icon">🔍</div>
                <div class="no-results-text">未找到匹配的帖子</div>
            </div>
        </div>
    </main>

    <script src="/Code/JS/script.js" defer></script>
    <script>
        // 加载帖子并渲染
        async function loadPosts() {
            try {
                const resp = await fetch('/Data/JSON/posts.json');
                const posts = await resp.json();
                const postList = document.getElementById('postList');
                postList.innerHTML = posts.map(post => `
                    <a href="${post.url}" class="post-item">
                        <div class="post-meta">
                            <span class="post-tag">${post.tag}</span>
                            <span>• ${post.author}</span>
                            <span>• ${post.time}</span>
                        </div>
                        <div class="post-title">${post.title}</div>
                        <div class="post-excerpt">${post.excerpt}</div>
                    </a>
                `).join('');

                // 论坛搜索功能
                const forumSearchInput = document.getElementById('forumSearchInput');
                const noResults = document.getElementById('noResults');
                forumSearchInput.addEventListener('input', function() {
                    const keyword = this.value.toLowerCase().trim();
                    const items = postList.querySelectorAll('.post-item');
                    let hasVisible = false;
                    items.forEach(post => {
                        const title = post.querySelector('.post-title').textContent.toLowerCase();
                        const excerpt = post.querySelector('.post-excerpt').textContent.toLowerCase();
                        if (title.includes(keyword) || excerpt.includes(keyword)) {
                            post.style.display = 'block';
                            hasVisible = true;
                        } else {
                            post.style.display = 'none';
                        }
                    });
                    noResults.classList.toggle('show', !hasVisible);
                });
            } catch (e) {}
        }
        loadPosts();
    </script>
</body>
</html>
