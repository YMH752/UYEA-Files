<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="悠野社区 - 分享AI使用心得、工具作品和生活点滴">
    <meta name="theme-color" content="#000000">
    <title>悠野社区 | UYEA</title>
    <link rel="stylesheet" href="/CSS/style.css?v=0.2.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet"></noscript>
    
    <style>
        html { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    </style>
</head>
<body data-lang="zh-CN">
    <header class="top-header">
        <div class="header-container">
            <a href="index.html" class="logo-text">UYEA</a>
            <div class="header-right">
                <div class="lang-selector" id="langSelector">
                    <div class="lang-highlight" id="langHighlight"></div>
                    <button class="lang-btn active" data-lang="zh-CN">中文</button>
                    <button class="lang-btn" data-lang="zh-TW">繁中</button>
                    <button class="lang-btn" data-lang="en">English</button>
                </div>
                <button class="menu-toggle" id="menuToggleBtn"><span></span><span></span><span></span></button>
            </div>
        </div>
    </header>
    
    <div class="dropdown-menu" id="dropdownMenu">
        <nav class="menu-nav">
            <a href="index.html" class="menu-item" data-i18n="nav.home">网站导航</a>
            <div class="menu-divider"></div>
            <a href="tools.html" class="menu-item" data-i18n="nav.tools">线上工具</a>
            <div class="menu-divider"></div>
            <a href="forum.html" class="menu-item active" data-i18n="nav.forum">悠野社区</a>
        </nav>
        <div class="menu-auth-section">
            <button class="register-btn" onclick="alert('注册功能开发中...')"><span data-i18n="btn.register">注册</span></button>
        </div>
    </div>

    <main class="main-content">
        <div class="content-wrapper">
            <div class="section-header">
                <h1 class="section-title" data-i18n="nav.forum">悠野社区</h1>
            </div>
            
            <div class="forum-toolbar">
                <button class="post-btn" onclick="alert('发帖功能开发中...')">＋ 发布新帖子</button>
                <div class="forum-search">
                    <span>🔍</span>
                    <input type="text" id="forumSearchInput" placeholder="搜索帖子、话题或用户...">
                </div>
            </div>
            
            <div class="post-list" id="postList">
                <div class="no-results show">
                    <div class="no-results-icon">⏳</div>
                    <div class="no-results-text">加载中...</div>
                </div>
            </div>
            
            <div class="no-results" id="noResults">
                <div class="no-results-icon">🔍</div>
                <div class="no-results-text">未找到匹配的帖子</div>
            </div>
        </div>
    </main>

    <script src="/JS/script.js?v=0.2.0" defer></script>
    <script>
        // 论坛帖子加载与搜索（增强版，含详细调试日志）
        async function loadPosts() {
            const list = document.getElementById('postList');
            const noResults = document.getElementById('noResults');
            
            console.log('开始加载帖子数据...');
            
            try {
                // 显示加载中
                list.innerHTML = '<div class="no-results show"><div class="no-results-icon">⏳</div><div class="no-results-text">加载中...</div></div>';
                
                const res = await fetch('/JSON/posts.json');
                console.log('HTTP响应状态:', res.status, res.statusText);
                
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                }
                
                const posts = await res.json();
                console.log('成功加载帖子数据:', posts);
                console.log('帖子数量:', Array.isArray(posts) ? posts.length : '不是数组');
                
                if (!Array.isArray(posts) || posts.length === 0) {
                    throw new Error('无帖子数据');
                }
                
                // 渲染帖子列表
                list.innerHTML = posts.map((p, index) => {
                    console.log(`渲染帖子 ${index + 1}:`, p.title);
                    return `
                        <a href="${p.url}" class="post-item">
                            <div class="post-meta">
                                <span class="post-tag">${p.tag}</span>
                                <span>• ${p.author}</span>
                                <span>• ${p.time}</span>
                            </div>
                            <div class="post-title">${p.title}</div>
                            <div class="post-excerpt">${p.excerpt}</div>
                        </a>
                    `;
                }).join('');
                
                console.log('✅ 帖子渲染完成');

                // 搜索功能
                const searchInput = document.getElementById('forumSearchInput');
                searchInput.addEventListener('input', function() {
                    const keyword = this.value.toLowerCase().trim();
                    let hasVisible = false;
                    
                    list.querySelectorAll('.post-item').forEach(item => {
                        const title = item.querySelector('.post-title').textContent.toLowerCase();
                        const excerpt = item.querySelector('.post-excerpt').textContent.toLowerCase();
                        const author = item.querySelector('.post-meta').textContent.toLowerCase();
                        
                        const show = title.includes(keyword) || excerpt.includes(keyword) || author.includes(keyword);
                        item.style.display = show ? 'block' : 'none';
                        if (show) hasVisible = true;
                    });
                    
                    noResults.classList.toggle('show', !hasVisible && keyword.length > 0);
                });
                
            } catch (e) {
                console.error('❌ 帖子加载失败:', e.message);
                console.error('完整错误:', e);
                
                list.innerHTML = `
                    <div class="no-results show">
                        <div class="no-results-icon">⚠️</div>
                        <div class="no-results-text">帖子数据加载失败: ${e.message}</div>
                        <div style="font-size: 12px; margin-top: 10px; color: var(--text-muted); text-align: center;">
                            请检查: /JSON/posts.json 文件是否存在<br/>
                            错误详情请查看浏览器开发者工具 Console
                        </div>
                    </div>
                `;
            }
        }
        
        // DOM加载完成后加载帖子
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadPosts);
        } else {
            loadPosts();
        }
    </script>
</body>
</html>
