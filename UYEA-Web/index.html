<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="悠野工作室(UYEA) - 开始探索，分享AI使用心得、工具作品和生活点滴">
    <meta name="theme-color" content="#000000">
    <title>UYEA | 开始探索</title>

    <link rel="stylesheet" href="/CSS/style.css?v=0.2.0">
    <link rel="stylesheet" href="/CSS/landing.css?v=0.3.0">

    <style>
        html { font-family: 'Alibaba Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', system-ui, sans-serif; }
    </style>
</head>
<body data-lang="zh-CN">
    <!-- 顶部导航栏 -->
    <header class="landing-header">
        <div class="landing-header-container">
            <div class="landing-logo">UYEA</div>
            <div class="landing-header-right">
                <div class="landing-lang-selector" role="group" aria-label="语言选择">
                    <button class="landing-lang-item active" data-lang="zh-CN" aria-label="简体中文" aria-pressed="true">CN</button>
                    <button class="landing-lang-item" data-lang="zh-HK" aria-label="繁体中文（香港）" aria-pressed="false">HK</button>
                    <button class="landing-lang-item" data-lang="en" aria-label="English" aria-pressed="false">EN</button>
                </div>
                <button class="landing-search-btn" aria-label="搜索">
                    <svg class="landing-search-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <circle cx="11" cy="11" r="6"></circle>
                        <line x1="16" y1="16" x2="21" y2="21"></line>
                    </svg>
                </button>

                <button class="landing-user-btn" aria-label="用户中心">
                    <svg class="landing-user-icon" viewBox="0 0 32 32" fill="none" aria-hidden="true">
                        <circle cx="16" cy="8" r="6"></circle>
                        <path d="M4 29 C4 20 9 18 16 18 C23 18 28 20 28 29"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 主页面 -->
    <main class="landing-main">
        <!-- 时钟/日期区域 -->
        <section class="landing-clock-section" aria-label="时钟和日期显示">
            <div class="landing-clock-display" id="clockDisplay">
                <div class="landing-time" id="clockTime" aria-label="当前时间">00:00</div>
                <div class="landing-date" id="clockDate" aria-label="当前日期">2026-1-1 星期一</div>
            </div>
        </section>

        <!-- 卡片区域 -->
        <section class="landing-cards-container" aria-label="功能导航">
            <div class="landing-cards-grid" id="cardsGrid">
                <!-- 网站导航 -->
                <a href="navigation.html" class="landing-card landing-card-enabled" data-card="nav">
                    <div class="landing-card-content">
                        <div class="landing-card-title" data-i18n="landing.nav_title">网站导航</div>
                        <div class="landing-card-desc" data-i18n="landing.nav_desc">分享实用网站</div>
                    </div>
                    <div class="landing-card-arrow" aria-hidden="true">→</div>
                </a>

                <!-- 线上工具 -->
                <a href="tools.html" class="landing-card landing-card-enabled" data-card="tools">
                    <div class="landing-card-content">
                        <div class="landing-card-title" data-i18n="landing.tools_title">线上工具</div>
                        <div class="landing-card-desc" data-i18n="landing.tools_desc">在线工具，提高效率</div>
                    </div>
                    <div class="landing-card-arrow" aria-hidden="true">→</div>
                </a>

                <!-- 社区论坛 -->
                <a href="forum.html" class="landing-card landing-card-enabled" data-card="forum">
                    <div class="landing-card-content">
                        <div class="landing-card-title" data-i18n="landing.forum_title">社区论坛</div>
                        <div class="landing-card-desc" data-i18n="landing.forum_desc">解答疑问，分享经验</div>
                    </div>
                    <div class="landing-card-arrow" aria-hidden="true">→</div>
                </a>

                <!-- 桌面宠物 -->
                <button class="landing-card landing-card-disabled" data-card="pet" id="petCard" type="button" disabled>
                    <div class="landing-card-content">
                        <div class="landing-card-title" data-i18n="landing.pet_title">桌面宠物</div>
                        <div class="landing-card-desc" data-i18n="landing.pet_desc">增添趣味，放松身心</div>
                    </div>
                    <div class="landing-card-arrow" aria-hidden="true">→</div>
                </button>

                <!-- 实时聊天 -->
                <button class="landing-card landing-card-disabled" data-card="chat" id="chatCard" type="button" disabled>
                    <div class="landing-card-content">
                        <div class="landing-card-title" data-i18n="landing.chat_title">实时聊天</div>
                        <div class="landing-card-desc" data-i18n="landing.chat_desc">随时随地，在线交流</div>
                    </div>
                    <div class="landing-card-arrow" aria-hidden="true">→</div>
                </button>
            </div>
        </section>
    </main>

    <!-- 开发中模态框 -->
    <div class="landing-modal-overlay" id="devModalOverlay" role="presentation"></div>
    <div class="landing-modal" id="devModal" role="dialog" aria-modal="true" aria-labelledby="devModalTitle">
        <div class="landing-modal-icon" aria-hidden="true">🚀</div>
        <h2 class="landing-modal-title" id="devModalTitle">功能开发中</h2>
        <div class="landing-modal-text" id="devModalText">敬请期待更新！</div>
        <button class="landing-modal-btn" id="devModalCloseBtn" type="button">关闭</button>
    </div>

    <!-- 脚本加载：顺序很重要！ -->
    <script src="/JS/config.js?v=0.3.0"></script>
    <script src="/JS/i18n.js?v=1.0.0"></script>
    <script src="/JS/script.js?v=0.2.0"></script>
    <script src="/JS/landing.js?v=0.3.0"></script>
</body>
</html>
