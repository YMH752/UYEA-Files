<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实用工具箱 | UYEA</title>
    <link rel="stylesheet" href="/CSS/style.css?v=0.0.2">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body data-lang="zh-CN">
    <header class="top-header">
        <div class="header-container">
            <a href="index.html" class="logo-text">UYEA</a>
            <div class="header-right">
                <div class="lang-selector" id="langSelector">
                    <div class="lang-highlight" id="langHighlight"></div>
                    <button class="lang-btn active" data-lang="zh-CN">中文</button>
                    <button class="lang-btn" data-lang="zh-TW">繁中</button>
                    <button class="lang-btn" data-lang="en">English</button>
                </div>
                <button class="menu-toggle" id="menuToggleBtn"><span></span><span></span><span></span></button>
            </div>
        </div>
    </header>
    <div class="dropdown-menu" id="dropdownMenu">
        <nav class="menu-nav">
            <a href="index.html" class="menu-item" data-i18n="nav.home">网站导航</a>
            <div class="menu-divider"></div>
            <a href="tools.html" class="menu-item active" data-i18n="nav.tools">线上工具</a>
            <div class="menu-divider"></div>
            <a href="forum.html" class="menu-item" data-i18n="nav.forum">悠野社区</a>
        </nav>
        <div class="menu-auth-section"><button class="register-btn" onclick="alert('注册功能开发中...')"><span data-i18n="btn.register">注册</span></button></div>
    </div>

    <main class="main-content">
        <div class="content-wrapper">
            <div class="section-header"><h1 class="section-title" data-i18n="nav.tools">实用工具箱</h1></div>
            <div class="category-tabs" id="categoryTabs">
                <div class="tab-item active" data-category="all">全部</div>
                <div class="tab-item" data-category="dev">💻 开发者工具</div>
                <div class="tab-item" data-category="design">🎨 设计美化</div>
                <div class="tab-item" data-category="office">📂 办公效率</div>
                <div class="tab-item" data-category="media">🎥 多媒体处理</div>
            </div>

            <div class="tool-group" data-category="dev">
                <div class="section-header"><h2 class="section-title">💻 开发者工具</h2></div>
                <div class="grid-container">
                    <a href="#" class="card-item"><div class="card-icon">🗂️</div><div class="card-info"><div class="card-title">JSON 格式化</div></div></a>
                    <a href="#" class="card-item"><div class="card-icon">🔣</div><div class="card-info"><div class="card-title">Base64 编解码</div></div></a>
                    <a href="#" class="card-item"><div class="card-icon">🔍</div><div class="card-info"><div class="card-title">正则表达式测试</div></div></a>
                    <a href="#" class="card-item"><div class="card-icon">⏱️</div><div class="card-info"><div class="card-title">时间戳转换</div></div></a>
                </div>
            </div>
            <div class="tool-group" data-category="design">
                <div class="section-header"><h2 class="section-title">🎨 设计美化</h2></div>
                <div class="grid-container">
                    <a href="#" class="card-item"><div class="card-icon">🎨</div><div class="card-info"><div class="card-title">在线调色板</div></div></a>
                    <a href="#" class="card-item"><div class="card-icon">🖼️</div><div class="card-info"><div class="card-title">SVG 图标库</div></div></a>
                    <a href="#" class="card-item"><div class="card-icon">🌈</div><div class="card-info"><div class="card-title">渐变颜色生成</div></div></a>
                </div>
            </div>
            <div class="tool-group" data-category="office">
                <div class="section-header"><h2 class="section-title">📂 办公效率</h2></div>
                <div class="grid-container">
                    <a href="#" class="card-item"><div class="card-icon">📄</div><div class="card-info"><div class="card-title">PDF 转 Word</div></div></a>
                    <a href="#" class="card-item"><div class="card-icon">📊</div><div class="card-info"><div class="card-title">流程图绘制</div></div></a>
                </div>
            </div>
            <div class="tool-group" data-category="media">
                <div class="section-header"><h2 class="section-title">🎥 多媒体处理</h2></div>
                <div class="grid-container">
                    <a href="#" class="card-item"><div class="card-icon">🖼️</div><div class="card-info"><div class="card-title">图片压缩</div></div></a>
                    <a href="#" class="card-item"><div class="card-icon">🎞️</div><div class="card-info"><div class="card-title">视频转 GIF</div></div></a>
                </div>
            </div>
        </div>
    </main>
    <script src="/JS/script.js?v=0.0.2" defer></script>
    <script>
        document.querySelectorAll('.tab-item').forEach(tab => {
            tab.addEventListener('click', function(){
                document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const cat = this.dataset.category;
                document.querySelectorAll('.tool-group').forEach(g => {
                    g.style.display = (cat === 'all' || g.dataset.category === cat) ? 'block' : 'none';
                });
            });
        });
    </script>
</body>
</html>
